    const gm = SOC_GAME_META[p.game] || {};
    const likes = likeMap[p.id] || 0;
    const isLiked = !!myLikes[p.id];
    const commentCount = commentCountMap[p.id] || 0;
    const expanded = !!state._socExpandedComments[p.id];

    h += '<div class="soc-post" data-pid="' + p.id + '">';
    const _uf = (state._streakCache && state._streakCache[p.user_id]) ? state._streakCache[p.user_id].flame_level : 'none';
    const _avatarInner = '<div class="soc-post-avatar' + avatarBorderClass((state._socProfiles[p.user_id]||{}).tier) + '" data-viewuid="' + p.user_id + '" style="cursor:pointer" title="View profile">' + socProfileAvatar(p.user_id) + '</div>';
    h += '<div class="soc-post-hdr">' + (_uf && _uf !== 'none' ? flameAvatar(_avatarInner, _uf) : _avatarInner);
    h += '<div class="soc-post-meta"><div class="soc-post-author" data-viewuid="' + p.user_id + '" style="cursor:pointer">' + socProfileName(p.user_id) + socProfileBadge(p.user_id) + '</div>';
    h += '<div class="soc-post-time">' + socTimeAgo(p.created_at) + '</div></div>';
    if (p.user_id === state.user.id) h += '<button class="soc-post-del" data-delpid="' + p.id + '" title="Delete">✕</button>';
    h += '</div>';

    if (p.text_content) h += '<div class="soc-post-text">' + p.text_content.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    if (p.gif_url) h += '<div class="soc-post-gif"><img src="' + p.gif_url + '" alt="GIF" loading="lazy"></div>';

    // Quiz data card
    if (qd.result_name) {
      h += '<div class="soc-post-quiz">';
      h += '<div class="soc-post-quiz-game" style="color:' + (gm.color || '#aaa') + '">' + (gm.icon || '') + ' ' + (gm.label || p.game || '') + '</div>';
      h += '<div class="soc-post-quiz-name">' + qd.result_name + '</div>';
      const heroes = [qd.top_hero_1, qd.top_hero_2, qd.top_hero_3].filter(Boolean);
      if (heroes.length) {
        h += '<div class="soc-post-quiz-heroes">';
        heroes.forEach(he => { h += '<span class="soc-post-quiz-hero">' + he + '</span>'; });
        h += '</div>';
      }
      h += '</div>';
    }

    // Inline poll
    var linkedPoll = linkedPolls[p.id];
    if (linkedPoll) {
      var pollOpts; try { pollOpts = typeof linkedPoll.options === 'string' ? JSON.parse(linkedPoll.options) : linkedPoll.options; } catch(e) { pollOpts = []; }
      var pVotes = linkedPollVotes[linkedPoll.id] || [];
      var pTotal = pVotes.length;
      var pMyVote = state.user ? pVotes.find(function(v){return v.user_id === state.user.id;}) : null;
      var pCounts = {}; pollOpts.forEach(function(_,i) { pCounts[i] = pVotes.filter(function(v){return v.option_index === i;}).length; });
      var pMax = Math.max.apply(null, Object.values(pCounts).concat([0]));
      var pUps = linkedPollUpvotes[linkedPoll.id] || [];
      var pUpCount = pUps.length;
      var pMyUp = state.user ? pUps.some(function(u){return u.user_id === state.user.id;}) : false;
      
      h += '<div class="poll-card" style="margin:8px 0 4px">';
      h += '<div class="poll-body">';
      pollOpts.forEach(function(opt, i) {
        var c = pCounts[i] || 0, pct = pTotal > 0 ? Math.round(c / pTotal * 100) : 0;
        var isW = c === pMax && c > 0;
        h += '<div class="poll-opt' + (pMyVote ? ' voted' : '') + (isW && pMyVote ? ' winner' : '') + '" data-pollid="' + linkedPoll.id + '" data-optidx="' + i + '">';
        if (pMyVote) h += '<div class="poll-opt-bar" style="width:' + pct + '%"></div>';
        h += '<div class="poll-opt-content"><span class="poll-opt-label">' + (pMyVote && pMyVote.option_index === i ? '✓ ' : '') + opt + '</span>';
        if (pMyVote) h += '<span class="poll-opt-pct">' + pct + '%</span>';
        h += '</div></div>';
      });
      h += '</div>';
      h += '<div class="poll-footer"><div class="poll-total">' + pTotal + ' vote' + (pTotal !== 1 ? 's' : '') + '</div>';
      h += '<button class="poll-upvote' + (pMyUp ? ' upvoted' : '') + '" data-pollupid="' + linkedPoll.id + '">⬆ ' + pUpCount + '</button></div>';
      h += '</div>';
    }

    h += '<div class="soc-post-actions">';
    h += '<button class="soc-act-btn' + (isLiked ? ' liked' : '') + '" data-likepid="' + p.id + '"><span class="soc-act-icon">' + (isLiked ? '❤️' : '🤍') + '</span> ' + (likes || '') + '</button>';
    h += '<button class="soc-act-btn" data-cmtpid="' + p.id + '"><span class="soc-act-icon">💬</span> ' + (commentCount || '') + '</button>';
    h += '</div>';

    // Comments section (expandable)
    if (expanded) {
      h += '<div class="soc-comments" id="socCmt_' + p.id + '">Loading...</div>';
    }
    h += '</div>';
  });

  // Store data for event handlers
  state._socFeedPosts = posts;
  state._socLatestQuiz = latestQuiz;

  return h;
}

// === TRENDING POLLS ===
async function socRenderTrending() {
  var h = '';
  h += '<div style="padding:14px 0">';
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:16px">🔥</span><span style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#f0f2f7">Trending Polls</span><span style="font-size:10px;color:#6c7590">Most upvoted community polls</span></div>';
  
  // Fetch all polls with upvote counts
  var polls = await socFetch('community_polls?order=created_at.desc&limit=30&select=*');
  if (!polls.length) { return h + '<div style="text-align:center;padding:30px;color:#6c7590;font-size:12px">No polls yet. Create one in the Feed!</div></div>'; }
  
  var pollIds = polls.map(function(p){return p.id;});
  var allVotes = []; var allUpvotes = [];
  try { allVotes = await socFetch('poll_votes?poll_id=in.(' + pollIds.join(',') + ')&select=*'); } catch(e){}
  try { allUpvotes = await socFetch('poll_upvotes?poll_id=in.(' + pollIds.join(',') + ')&select=*'); } catch(e){}
  await socFetchProfiles([...new Set(polls.map(function(p){return p.user_id;}))]);
  
  // Sort by upvotes descending
  var upCounts = {};
  allUpvotes.forEach(function(u){ upCounts[u.poll_id] = (upCounts[u.poll_id]||0) + 1; });
  polls.sort(function(a,b){ return (upCounts[b.id]||0) - (upCounts[a.id]||0); });
  
  polls.forEach(function(p){
    var opts; try { opts = typeof p.options === 'string' ? JSON.parse(p.options) : p.options; } catch(e) { opts = []; }
    var votes = allVotes.filter(function(v){return v.poll_id === p.id;});
    var total = votes.length;
    var myV = state.user ? votes.find(function(v){return v.user_id === state.user.id;}) : null;
    var ct = {}; opts.forEach(function(_,i){ ct[i] = votes.filter(function(v){return v.option_index === i;}).length; });
    var mx = Math.max.apply(null, Object.values(ct).concat([0]));
    var ups = allUpvotes.filter(function(u){return u.poll_id === p.id;});
    var upCount = ups.length;
    var myUp = state.user ? ups.some(function(u){return u.user_id === state.user.id;}) : false;
    
    h += '<div class="poll-card">';
    h += '<div class="poll-hdr"><span class="poll-hdr-icon">📊</span><div class="poll-hdr-info"><div class="poll-hdr-q">' + p.question.replace(/</g,'&lt;') + '</div><div class="poll-hdr-meta">by ' + socProfileName(p.user_id) + ' · ' + socTimeAgo(p.created_at) + '</div></div></div>';
    h += '<div class="poll-body">';
    opts.forEach(function(opt, i){
      var c = ct[i]||0, pct = total > 0 ? Math.round(c/total*100) : 0;
      var isW = c === mx && c > 0;
      h += '<div class="poll-opt' + (myV ? ' voted' : '') + (isW && myV ? ' winner' : '') + '" data-pollid="' + p.id + '" data-optidx="' + i + '">';
      if (myV) h += '<div class="poll-opt-bar" style="width:' + pct + '%"></div>';
      h += '<div class="poll-opt-content"><span class="poll-opt-label">' + (myV && myV.option_index === i ? '✓ ' : '') + opt + '</span>';
      if (myV) h += '<span class="poll-opt-pct">' + pct + '%</span>';
      h += '</div></div>';
    });
    h += '</div>';
    h += '<div class="poll-footer"><div class="poll-total">' + total + ' vote' + (total !== 1 ? 's' : '') + '</div>';
    h += '<button class="poll-upvote' + (myUp ? ' upvoted' : '') + '" data-pollupid="' + p.id + '">⬆ ' + upCount + '</button></div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

}


function socAttachFeedEvents(app) {
  // Post button
  const postBtn = document.getElementById('socPostBtn');
  const postInput = document.getElementById('socPostInput');
  async function submitPost() {
    const text = (postInput?.value || '').trim();
    var hasPollOpts = false;
    var pollOptsEl = document.getElementById('pollComposeOpts');
    if (pollOptsEl && pollOptsEl.classList.contains('open')) {
      hasPollOpts = [...pollOptsEl.querySelectorAll('.poll-opt-inp')].filter(function(i){return i.value.trim();}).length >= 2;
    }
    if (!text && !state._socShareQuiz && !_selectedGif && !hasPollOpts) return;
    if (postBtn) postBtn.disabled = true;
    const currentFilter = state._socFeedFilter || 'all';
    const body = { user_id: state.user.id, text_content: text || '' };
    if (_selectedGif) body.gif_url = _selectedGif;
    // Auto-tag with channel
    if (currentFilter === 'lounge') body.game = 'lounge';
    else if (currentFilter !== 'all') body.game = currentFilter;
    if (state._socShareQuiz && state._socLatestQuiz) {
      const q = state._socLatestQuiz;
      // Keep lounge tag if posting from lounge — quiz data still attaches but post stays in lounge
      if (currentFilter !== 'lounge') body.game = q.game;
      body.quiz_data = { result_name: q.result_name, top_hero_1: q.top_hero_1, top_hero_2: q.top_hero_2, top_hero_3: q.top_hero_3, archetype: (q.score_data||{}).archetype };
    }
    // Create post (need return=representation to get the id for poll linking)
    var postRes = await socFetch('social_posts', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
    var newPostId = Array.isArray(postRes) && postRes[0] ? postRes[0].id : null;
    
    // If poll mode active, create linked poll
    var pollOpts = document.getElementById('pollComposeOpts');
    if (pollOpts && pollOpts.classList.contains('open') && newPostId) {
      var opts = [...pollOpts.querySelectorAll('.poll-opt-inp')].map(function(i){return i.value.trim();}).filter(Boolean);
      if (opts.length >= 2) {
        var cFilt = state._socFeedFilter || 'all';
        await socFetch('community_polls', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({
          user_id: state.user.id, question: text || 'Poll', options: JSON.stringify(opts), game: cFilt !== 'all' ? cFilt : null, post_id: newPostId
        })});
        logActivity('poll', { question: text });
      }
    }
    
    trackEngagement('post');
    logActivity('post', {});
    state._socShareQuiz = false;
    _selectedGif = null;
    renderSocial(app);
  }
  if (postBtn) postBtn.addEventListener('click', submitPost);
  if (postInput) postInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitPost(); }
  });

  // Share toggle
  const shareBtn = document.getElementById('socShareToggle');
  if (shareBtn) shareBtn.addEventListener('click', () => {
    state._socShareQuiz = !state._socShareQuiz;
    shareBtn.classList.toggle('active', state._socShareQuiz);
  });

  // GIF picker
  _selectedGif = null;
  const gifToggle = document.getElementById('gifToggle');
  const gifPicker = document.getElementById('gifPicker');
  const gifSearch = document.getElementById('gifSearch');
  const gifGrid = document.getElementById('gifGrid');
  if (gifToggle && gifPicker) {
    gifToggle.addEventListener('click', async () => {
      const isOpen = gifPicker.classList.toggle('open');
      gifToggle.classList.toggle('active', isOpen);
      if (isOpen && gifGrid && gifGrid.querySelector('.gif-loading')) {
        const gifs = await searchGifs('');
        renderGifGrid(gifs, gifGrid);
      }
    });
  }
  if (gifSearch && gifGrid) {
    gifSearch.addEventListener('input', () => {
      clearTimeout(_gifSearchTimeout);
      _gifSearchTimeout = setTimeout(async () => {
        gifGrid.innerHTML = '<div class="gif-loading">Searching...</div>';
        const gifs = await searchGifs(gifSearch.value);
        renderGifGrid(gifs, gifGrid);
      }, 400);
    });
  }
  // Quick-pick tags
  const gifTags = document.getElementById('gifTags');
  if (gifTags && gifSearch && gifGrid) {
    gifTags.querySelectorAll('.gif-tag').forEach(tag => {
      tag.addEventListener('click', async () => {
        const q = tag.dataset.q;
        gifSearch.value = q;
        gifGrid.innerHTML = '<div class="gif-loading">Searching...</div>';
        const gifs = await searchGifs(q);
        renderGifGrid(gifs, gifGrid);
      });
    });
  }

  // Poll compose toggle
  var pollToggle = document.getElementById('pollComposeToggle');
  var pollLockedBtn = document.getElementById('pollComposeLocked');
  if (pollLockedBtn) pollLockedBtn.addEventListener('click', function() { showUpgradeModal(); });
  var pollOpts = document.getElementById('pollComposeOpts');
  if (pollToggle && pollOpts) {
    pollToggle.addEventListener('click', function() {
      pollOpts.classList.toggle('open');
      pollToggle.classList.toggle('active', pollOpts.classList.contains('open'));
    });
  }
  var pollAddBtn = document.getElementById('pollComposeAdd');
  if (pollAddBtn && pollOpts) {
    pollAddBtn.addEventListener('click', function() {
      if (pollOpts.querySelectorAll('.poll-compose-opt').length >= 4) return;
      var row = document.createElement('div'); row.className = 'poll-compose-opt';
      var num = pollOpts.querySelectorAll('.poll-compose-opt').length + 1;
      row.innerHTML = '<input class="poll-opt-inp" placeholder="Option ' + num + '" maxlength="50"><button class="poll-compose-opt-rm">✕</button>';
      row.querySelector('.poll-compose-opt-rm').addEventListener('click', function() { row.remove(); });
      pollOpts.insertBefore(row, pollAddBtn);
    });
  }

  // Lounge upgrade CTA
  const loungeCta = document.getElementById('socLoungeCta');
  if (loungeCta) loungeCta.addEventListener('click', () => showUpgradeModal());

  // Lounge button (standalone)
  const loungeBtn = document.getElementById('socLoungeBtn');
  if (loungeBtn) loungeBtn.addEventListener('click', () => {
    state._socFeedFilter = 'lounge';
    renderSocial(app);
  });

  // Game filter dropdown
  const filterBtn = document.getElementById('socFilterBtn');
  const filterDrop = document.getElementById('socFilterDrop');
  if (filterBtn && filterDrop) {
    filterBtn.addEventListener('click', () => {
      filterBtn.classList.toggle('open');
      filterDrop.classList.toggle('open');
    });
    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
      if (!filterBtn.contains(e.target) && !filterDrop.contains(e.target)) {
        filterBtn.classList.remove('open');
        filterDrop.classList.remove('open');
      }
    }, { once: false });
  }
  app.querySelectorAll('.soc-filter-opt').forEach(b => b.addEventListener('click', () => {
    state._socFeedFilter = b.dataset.gf;
    renderSocial(app);
  }));

  // Like buttons
  app.querySelectorAll('[data-likepid]').forEach(b => b.addEventListener('click', async () => {
    const pid = b.dataset.likepid;
    const isLiked = b.classList.contains('liked');
    if (isLiked) {
      await socFetch('social_likes?post_id=eq.' + pid + '&user_id=eq.' + state.user.id, { method: 'DELETE' });
    } else {
      await socFetch('social_likes', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({ post_id: pid, user_id: state.user.id }) });
    }
    renderSocial(app);
  }));

  // Comment toggle
  app.querySelectorAll('[data-cmtpid]').forEach(b => b.addEventListener('click', async () => {

    renderSocial(app);
  }));

  // Delete post
  app.querySelectorAll('[data-delpid]').forEach(b => b.addEventListener('click', async () => {

    await socFetch('social_posts?id=eq.' + b.dataset.delpid, { method: 'DELETE' });

  // Clickable avatars/names → user profile
  app.querySelectorAll('[data-viewuid]').forEach(el => el.addEventListener('click', () => {

  }));

  // Load expanded comments

  app.querySelectorAll('.poll-opt:not(.voted)').forEach(function(opt){opt.addEventListener('click',async function(){if(!state.user){showAuthModal();return;}try{await socFetch('poll_votes',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({poll_id:opt.dataset.pollid,user_id:state.user.id,option_index:parseInt(opt.dataset.optidx)})});trackEngagement('like');}catch(e){}renderSocial(app);});});

    const cUserIds = comments.map(c => c.user_id);
    await socFetchProfiles(cUserIds);
    const topLevel = comments.filter(c => !c.parent_id);

    let ch = '';
    function renderComment(c, isReply) {

      const childReplies = replies.filter(r => r.parent_id === c.id);
      if (childReplies.length > 0) {
        h += '<div class="soc-replies">';
        childReplies.forEach(r => { h += renderComment(r, true); });
        h += '</div>';
      }
      h += '</div></div>';
      return h;
    }
    topLevel.forEach(c => { ch += renderComment(c, false); });
    ch += '<div class="soc-comment-input-row"><input class="soc-comment-input" placeholder="Write a comment..." id="socCmtInput_' + pid + '"/>';
    ch += '<div class="soc-cmt-actions"><button class="soc-cmt-gif-btn" id="socCmtGifBtn_' + pid + '">GIF</button>';
    ch += '<button class="soc-comment-submit" data-submitcmt="' + pid + '">Send</button></div></div>';
    ch += '<div id="socCmtGifPreview_' + pid + '"></div>';
    ch += '<div class="soc-cmt-gif-picker" id="socCmtGifPicker_' + pid + '"><input class="soc-cmt-gif-search" id="socCmtGifSearch_' + pid + '" placeholder="Search GIFs..." autocomplete="off"><div class="soc-cmt-gif-tags" id="socCmtGifTags_' + pid + '"><span class="soc-cmt-gif-tag" data-cq="gaming">🎮 Gaming</span><span class="soc-cmt-gif-tag" data-cq="reaction">😂 React</span><span class="soc-cmt-gif-tag" data-cq="gg">🏆 GG</span><span class="soc-cmt-gif-tag" data-cq="fail">😭 Fail</span><span class="soc-cmt-gif-tag" data-cq="clutch">🔥 Clutch</span><span class="soc-cmt-gif-tag" data-cq="anime reaction">⚔️ Anime</span></div><div class="soc-cmt-gif-grid" id="socCmtGifGrid_' + pid + '"></div></div>';
    el.innerHTML = ch;

    // Attach comment events
    const cmtSubmitBtn = el.querySelector('[data-submitcmt]');
    let _cmtGif = null;
    async function submitComment() {
      const inp = document.getElementById('socCmtInput_' + pid);
      const txt = (inp?.value || '').trim();
      if (!txt && !_cmtGif) return;
      const parentId = el.dataset.replyTo || null;
      const body = { post_id: pid, user_id: state.user.id, text_content: txt || '', parent_id: parentId };
      if (_cmtGif) body.gif_url = _cmtGif;
      await socFetch('social_comments', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify(body) });
      trackEngagement('comment');
      _cmtGif = null;
      el.dataset.replyTo = '';
      renderSocial(app);
    }
    if (cmtSubmitBtn) cmtSubmitBtn.addEventListener('click', submitComment);
    const cmtInp = document.getElementById('socCmtInput_' + pid);
    if (cmtInp) cmtInp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); } });

    // Comment GIF picker
    const cmtGifBtn = document.getElementById('socCmtGifBtn_' + pid);
    const cmtGifPicker = document.getElementById('socCmtGifPicker_' + pid);
    const cmtGifSearch = document.getElementById('socCmtGifSearch_' + pid);
    const cmtGifGrid = document.getElementById('socCmtGifGrid_' + pid);
    const cmtGifPreview = document.getElementById('socCmtGifPreview_' + pid);
    if (cmtGifBtn && cmtGifPicker) {
      cmtGifBtn.addEventListener('click', async () => {
        const isOpen = cmtGifPicker.classList.toggle('open');
        cmtGifBtn.classList.toggle('active', isOpen);
        if (isOpen && cmtGifGrid && !cmtGifGrid.hasChildNodes()) {
          const gifs = await searchGifs('');
          renderCmtGifGrid(gifs, cmtGifGrid, pid);
        }
      });
    }
    if (cmtGifSearch && cmtGifGrid) {
      let _cmtGifTimeout;
      cmtGifSearch.addEventListener('input', () => {
        clearTimeout(_cmtGifTimeout);
        _cmtGifTimeout = setTimeout(async () => {
          cmtGifGrid.innerHTML = '<div style="text-align:center;padding:12px;color:#6c7590;font-size:10px">Searching...</div>';
          const gifs = await searchGifs(cmtGifSearch.value);
          renderCmtGifGrid(gifs, cmtGifGrid, pid);
        }, 400);
      });
    }
    // Comment GIF quick-pick tags
    const cmtGifTags = document.getElementById('socCmtGifTags_' + pid);
    if (cmtGifTags && cmtGifSearch && cmtGifGrid) {
      cmtGifTags.querySelectorAll('.soc-cmt-gif-tag').forEach(tag => {
        tag.addEventListener('click', async () => {
          const q = tag.dataset.cq;
          cmtGifSearch.value = q;
          cmtGifGrid.innerHTML = '<div style="text-align:center;padding:12px;color:#6c7590;font-size:10px">Searching...</div>';
          const gifs = await searchGifs(q);
          renderCmtGifGrid(gifs, cmtGifGrid, pid);
        });
      });
    }

    function renderCmtGifGrid(gifs, container, postId) {
      if (!gifs.length) { container.innerHTML = '<div style="text-align:center;padding:12px;color:#6c7590;font-size:10px">No GIFs found</div>'; return; }
      container.innerHTML = gifs.slice(0, 15).map(g =>
        '<div class="soc-cmt-gif-item" data-cgif="' + g.url + '"><img src="' + g.preview + '" loading="lazy"></div>'
      ).join('');
      container.querySelectorAll('.soc-cmt-gif-item').forEach(item => {
        item.addEventListener('click', () => {
          _cmtGif = item.dataset.cgif;
          if (cmtGifPreview) {
            cmtGifPreview.innerHTML = '<div class="soc-cmt-gif-preview"><img src="' + _cmtGif + '"><button class="soc-cmt-gif-preview-x" id="socCmtGifX_' + postId + '">✕</button></div>';
            cmtGifPreview.querySelector('#socCmtGifX_' + postId).addEventListener('click', () => { _cmtGif = null; cmtGifPreview.innerHTML = ''; });
          }
          cmtGifPicker.classList.remove('open');
          cmtGifBtn.classList.remove('active');
        });
      });
    }

    el.querySelectorAll('[data-replycid]').forEach(b => b.addEventListener('click', () => {
      el.dataset.replyTo = b.dataset.replycid;
      const inp = document.getElementById('socCmtInput_' + b.dataset.replypid);
      if (inp) { inp.placeholder = 'Replying...'; inp.focus(); }
    }));

    el.querySelectorAll('[data-delcid]').forEach(b => b.addEventListener('click', async () => {
      await socFetch('social_comments?id=eq.' + b.dataset.delcid, { method: 'DELETE' });
      renderSocial(app);
    }));
  });
}

// ═══ FRIENDS ═══
async function socRenderFriends() {
  // Fetch all friendships involving this user
  const sent = await socFetch('social_friends?user_id=eq.' + state.user.id + '&select=*');
  const received = await socFetch('social_friends?friend_id=eq.' + state.user.id + '&select=*');
  const allIds = [...sent.map(f => f.friend_id), ...received.map(f => f.user_id)];
  await socFetchProfiles(allIds);

  const accepted = [];
  const pendingIn = [];
  const pendingOut = [];

  sent.forEach(f => {
    if (f.status === 'accepted') accepted.push({ userId: f.friend_id, fId: f.id });
    else if (f.status === 'pending') pendingOut.push({ userId: f.friend_id, fId: f.id });
  });
  received.forEach(f => {
    if (f.status === 'accepted') {
      if (!accepted.find(a => a.userId === f.user_id)) accepted.push({ userId: f.user_id, fId: f.id });
    }
    else if (f.status === 'pending') pendingIn.push({ userId: f.user_id, fId: f.id });
  });

  let h = '';
  // Add friend input
  h += '<div class="soc-add-row"><input class="soc-add-input" id="socAddUser" placeholder="Add friend by username..."/>';
  h += '<button class="soc-add-btn" id="socAddBtn">Add</button></div>';
  h += '<div id="socFriendMsg"></div>';

  // Pending incoming
  if (pendingIn.length > 0) {
    h += '<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#f5c161;font-weight:700;margin:10px 0 8px">Friend Requests</div>';
    h += '<div class="soc-friends">';
    pendingIn.forEach(f => {
      h += '<div class="soc-friend"><div class="soc-friend-avatar">' + socProfileAvatar(f.userId) + '</div>';
      h += '<div class="soc-friend-info"><div class="soc-friend-name">' + socProfileName(f.userId) + '</div>';
      h += '<div class="soc-friend-status">Wants to be friends</div></div>';
      h += '<div class="soc-friend-btns"><button class="sfb sfb-accept" data-acceptfid="' + f.fId + '">Accept</button>';
      h += '<button class="sfb sfb-decline" data-declinefid="' + f.fId + '">Decline</button></div></div>';
    });
    h += '</div>';
  }

  // Accepted friends
  h += '<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#5ee8b0;font-weight:700;margin:14px 0 8px">Friends · ' + accepted.length + '</div>';
  if (accepted.length === 0) {
    h += '<div class="soc-empty">No friends yet. Add someone by username!</div>';
  } else {
    h += '<div class="soc-friends">';
    accepted.forEach(f => {
      h += '<div class="soc-friend"><div class="soc-friend-avatar">' + socProfileAvatar(f.userId) + '</div>';
      h += '<div class="soc-friend-info"><div class="soc-friend-name">' + socProfileName(f.userId) + '</div></div>';
      h += '<div class="soc-friend-btns"><button class="sfb sfb-dm" data-dmuid="' + f.userId + '">Message</button></div></div>';
    });
    h += '</div>';
  }

  // Pending outgoing
  if (pendingOut.length > 0) {
    h += '<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#8890a4;font-weight:700;margin:14px 0 8px">Pending</div>';
    h += '<div class="soc-friends">';
    pendingOut.forEach(f => {
      h += '<div class="soc-friend"><div class="soc-friend-avatar">' + socProfileAvatar(f.userId) + '</div>';
      h += '<div class="soc-friend-info"><div class="soc-friend-name">' + socProfileName(f.userId) + '</div>';
      h += '<div class="soc-friend-status">Request sent</div></div>';
      h += '<div class="soc-friend-btns"><span class="sfb sfb-pending">Pending</span></div></div>';
    });
    h += '</div>';
  }

  state._socAcceptedFriends = accepted;
  return h;
}

function socAttachFriendEvents(app) {
  // Add friend
  const addBtn = document.getElementById('socAddBtn');
  if (addBtn) addBtn.addEventListener('click', async () => {
    const username = (document.getElementById('socAddUser')?.value || '').trim().replace(/^@/, '');
    const msgEl = document.getElementById('socFriendMsg');
    if (!username) return;
    if (username.toLowerCase() === (state._userUsername || '').toLowerCase()) {
      if (msgEl) msgEl.innerHTML = '<div class="soc-msg soc-msg-err">That\'s your own username!</div>';
      return;
    }
    try {
      // Look up user by username
      const profiles = await socFetch('user_profiles?username=eq.' + encodeURIComponent(username) + '&select=user_id,avatar,username');
      if (profiles.length === 0) {
        if (msgEl) msgEl.innerHTML = '<div class="soc-msg soc-msg-err">No user found with username "' + username + '"</div>';
        return;
      }
      const friendUid = profiles[0].user_id;
      // Check if friendship already exists
      const existing = await socFetch('social_friends?or=(and(user_id.eq.' + state.user.id + ',friend_id.eq.' + friendUid + '),and(user_id.eq.' + friendUid + ',friend_id.eq.' + state.user.id + '))&select=id,status');
      if (existing.length > 0) {
        const s = existing[0].status;
        if (msgEl) msgEl.innerHTML = '<div class="soc-msg soc-msg-err">Friend request already ' + (s === 'accepted' ? 'accepted' : s === 'pending' ? 'pending' : 'sent') + '</div>';
        return;
      }
      await socFetch('social_friends', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({ user_id: state.user.id, friend_id: friendUid }) });
      if (msgEl) msgEl.innerHTML = '<div class="soc-msg soc-msg-ok">Friend request sent to @' + profiles[0].username + '!</div>';
      setTimeout(() => renderSocial(app), 1000);
    } catch(e) {
      if (msgEl) msgEl.innerHTML = '<div class="soc-msg soc-msg-err">Something went wrong</div>';
    }
  });

  // Accept/decline
  app.querySelectorAll('[data-acceptfid]').forEach(b => b.addEventListener('click', async () => {
    await socFetch('social_friends?id=eq.' + b.dataset.acceptfid, { method: 'PATCH', body: JSON.stringify({ status: 'accepted' }) });
    renderSocial(app);
  }));
  app.querySelectorAll('[data-declinefid]').forEach(b => b.addEventListener('click', async () => {
    await socFetch('social_friends?id=eq.' + b.dataset.declinefid, { method: 'PATCH', body: JSON.stringify({ status: 'declined' }) });
    renderSocial(app);
  }));

  // DM shortcut
  app.querySelectorAll('[data-dmuid]').forEach(b => b.addEventListener('click', () => {
    state._socTab = 'dms'; state._socDmFriend = b.dataset.dmuid;
    renderSocial(app);
  }));
}

// ═══ DIRECT MESSAGES ═══
async function socRenderDMs() {
  const sub = state._socDmSub || 'dm';
  let h = '';

  // Sub-tabs: DMs | Group Chats
  h += '<div class="dm-subtabs">';
  h += '<div class="dm-subtab' + (sub === 'dm' ? ' active' : '') + '" data-dmsub="dm">💬 DMs</div>';
  h += '<div class="dm-subtab' + (sub === 'groups' ? ' active' : '') + '" data-dmsub="groups">👥 Groups' + (!isPro() ? '<span class="sub-lock">🔒</span>' : '') + '</div>';
  if (sub === 'groups' && isPro()) h += '<button class="gc-create-btn" id="gcCreateBtn">+ New Group</button>';
  h += '</div>';

  if (sub === 'groups') {
    if (!isPro()) {
      h += '<div style="text-align:center;padding:40px 20px">';
      h += '<div style="font-size:28px;margin-bottom:8px">👥</div>';
      h += '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#d4b5ff;margin-bottom:6px">Group Chats</div>';
      h += '<div style="font-size:12px;color:#8890a4;margin-bottom:14px;max-width:300px;margin-left:auto;margin-right:auto;line-height:1.5">Create group chats with friends. Available for Elite and Legend members.</div>';
      h += '<button class="soc-lounge-cta" id="gcUpgradeBtn">Upgrade to Unlock</button>';
      h += '</div>';
      return h;
    }
    h += await socRenderGroups();
    return h;
  }

  // Regular DMs
  const sent = await socFetch('social_friends?user_id=eq.' + state.user.id + '&status=eq.accepted&select=friend_id');
  const received = await socFetch('social_friends?friend_id=eq.' + state.user.id + '&status=eq.accepted&select=user_id');
  const friendIds = [...new Set([...sent.map(f => f.friend_id), ...received.map(f => f.user_id)])];
  await socFetchProfiles(friendIds);

  let unreadDms = [];
  if (friendIds.length > 0) {
    unreadDms = await socFetch('social_dms?receiver_id=eq.' + state.user.id + '&is_read=eq.false&select=sender_id');
  }
  const unreadFrom = {};
  unreadDms.forEach(d => { unreadFrom[d.sender_id] = true; });

  const activeFriend = state._socDmFriend;
  h += '<div class="soc-dm-wrap">';
  h += '<div class="soc-dm-sidebar">';
  if (friendIds.length === 0) h += '<div style="font-size:11px;color:#6c7590;padding:10px">Add friends to start chatting</div>';
  friendIds.forEach(fid => {
    h += '<div class="soc-dm-contact' + (activeFriend === fid ? ' active' : '') + '" data-dmcontact="' + fid + '">';
    h += '<div class="soc-dm-contact-av">' + socProfileAvatar(fid) + '</div>';
    h += '<div class="soc-dm-contact-name">' + socProfileName(fid) + '</div>';
    if (unreadFrom[fid]) h += '<div class="soc-dm-unread"></div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div class="soc-dm-chat">';
  if (!activeFriend) {
    h += '<div class="soc-dm-empty">Select a friend to start chatting</div>';
  } else {
    const msgs = await socFetch('social_dms?or=(and(sender_id.eq.' + state.user.id + ',receiver_id.eq.' + activeFriend + '),and(sender_id.eq.' + activeFriend + ',receiver_id.eq.' + state.user.id + '))&order=created_at.asc&limit=100');
    if (msgs.some(m => m.receiver_id === state.user.id && !m.is_read)) {
      socFetch('social_dms?receiver_id=eq.' + state.user.id + '&sender_id=eq.' + activeFriend + '&is_read=eq.false', { method: 'PATCH', body: JSON.stringify({ is_read: true }) }).catch(() => {});
    }
    h += '<div class="soc-dm-messages" id="socDmMsgs">';
    if (msgs.length === 0) h += '<div class="soc-dm-empty">Start the conversation!</div>';
    msgs.forEach(m => {
      const isSent = m.sender_id === state.user.id;
      h += '<div class="soc-dm-msg ' + (isSent ? 'sent' : 'received') + '">';
      if (m.text_content) h += m.text_content.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      h += '<div class="soc-dm-msg-time">' + socTimeAgo(m.created_at) + '</div></div>';
    });
    h += '</div>';
    h += '<div class="soc-dm-input-row"><input class="soc-dm-input" id="socDmInput" placeholder="Type a message..."/>';
    h += '<button class="soc-dm-send" id="socDmSend">Send</button></div>';
  }
  h += '</div></div>';
  return h;
}

async function socRenderGroups() {
  // Fetch groups I'm a member of
  const myMemberships = await socFetch('group_chat_members?user_id=eq.' + state.user.id + '&select=group_id');
  const groupIds = myMemberships.map(m => m.group_id);
  let groups = [];
  if (groupIds.length > 0) {
    groups = await socFetch('group_chats?id=in.(' + groupIds.join(',') + ')&select=*&order=created_at.desc');
  }

  // Count members per group
  const memberCounts = {};
  if (groupIds.length > 0) {
    const allMembers = await socFetch('group_chat_members?group_id=in.(' + groupIds.join(',') + ')&select=group_id');
    allMembers.forEach(m => { memberCounts[m.group_id] = (memberCounts[m.group_id] || 0) + 1; });
  }

  const activeGroupId = state._socGroupId;
  let h = '<div class="soc-dm-wrap">';

  // Sidebar - group list
  h += '<div class="soc-dm-sidebar">';
  if (groups.length === 0) h += '<div style="font-size:11px;color:#6c7590;padding:10px">No groups yet. Create one!</div>';
  groups.forEach(g => {
    h += '<div class="gc-contact' + (activeGroupId === g.id ? ' active' : '') + '" data-gcselect="' + g.id + '">';
    h += '<div class="gc-contact-icon">' + (g.icon || '👥') + '</div>';
    h += '<div class="gc-contact-info"><div class="gc-contact-name">' + g.name + '</div>';
    h += '<div class="gc-contact-members">' + (memberCounts[g.id] || 1) + ' members</div></div>';
    h += '</div>';
  });
  h += '</div>';

  // Chat area
  h += '<div class="soc-dm-chat">';
  if (!activeGroupId) {
    h += '<div class="soc-dm-empty">Select a group to chat</div>';
  } else {
    const group = groups.find(g => g.id === activeGroupId);
    if (group) {
      // Header
      h += '<div class="gc-header">';
      h += '<span class="gc-header-icon">' + (group.icon || '👥') + '</span>';
      h += '<span class="gc-header-name">' + group.name + '</span>';
      h += '<span class="gc-header-count">' + (memberCounts[group.id] || 1) + ' members</span>';
      if (group.owner_id === state.user.id) {
        h += '<button class="gc-header-leave" id="gcDeleteBtn" data-gcdelete="' + group.id + '">Delete</button>';
      } else {
        h += '<button class="gc-header-leave" id="gcLeaveBtn" data-gcleave="' + group.id + '">Leave</button>';
      }
      h += '</div>';

      // Messages
      const msgs = await socFetch('group_chat_messages?group_id=eq.' + activeGroupId + '&order=created_at.asc&limit=100');
      const msgUserIds = [...new Set(msgs.map(m => m.user_id))];
      await socFetchProfiles(msgUserIds);

      h += '<div class="soc-dm-messages" id="socGcMsgs">';
      if (msgs.length === 0) h += '<div class="soc-dm-empty">No messages yet. Say something!</div>';
      msgs.forEach(m => {
        const isSent = m.user_id === state.user.id;
        h += '<div class="gc-msg' + (isSent ? ' sent' : '') + '">';
        if (!isSent) h += '<div class="gc-msg-sender">' + socProfileName(m.user_id) + '</div>';
        h += '<div class="gc-msg-bubble">';
        if (m.text_content) h += m.text_content.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        if (m.gif_url) h += '<div class="gc-msg-gif"><img src="' + m.gif_url + '" loading="lazy"></div>';
        h += '</div>';
        h += '<div class="gc-msg-time">' + socTimeAgo(m.created_at) + '</div>';
        h += '</div>';
      });
      h += '</div>';

      // Input
      h += '<div class="soc-dm-input-row"><input class="soc-dm-input" id="socGcInput" placeholder="Message ' + group.name + '..."/>';
      h += '<button class="soc-dm-send" id="socGcSend">Send</button></div>';
    }
  }
  h += '</div></div>';
  return h;
}

function showCreateGroupModal(app) {
  // Fetch friends for member selection
  (async () => {
    const sent = await socFetch('social_friends?user_id=eq.' + state.user.id + '&status=eq.accepted&select=friend_id');
    const received = await socFetch('social_friends?friend_id=eq.' + state.user.id + '&status=eq.accepted&select=user_id');
    const friendIds = [...new Set([...sent.map(f => f.friend_id), ...received.map(f => f.user_id)])];
    await socFetchProfiles(friendIds);

    const overlay = document.createElement('div');
    overlay.className = 'gc-modal';
    let mh = '<div class="gc-modal-card">';
    mh += '<div class="gc-modal-title">Create Group Chat</div>';
    mh += '<div class="gc-modal-label">Group Name</div>';
    mh += '<input class="gc-modal-input" id="gcNameInput" placeholder="e.g. Squad Goals" maxlength="40">';
    mh += '<div class="gc-modal-label">Add Friends</div>';
    mh += '<div class="gc-friend-list">';
    if (friendIds.length === 0) mh += '<div style="font-size:11px;color:#6c7590;padding:8px">Add friends first to create a group</div>';
    friendIds.forEach(fid => {
      mh += '<div class="gc-friend-opt" data-gcfriend="' + fid + '">';
      mh += '<span class="gc-friend-opt-check"></span>';
      mh += '<span class="gc-friend-opt-av">' + socProfileAvatar(fid) + '</span>';
      mh += '<span class="gc-friend-opt-name">' + socProfileName(fid) + '</span>';
      mh += '</div>';
    });
    mh += '</div>';
    mh += '<div class="gc-modal-btns">';
    mh += '<button class="gc-modal-cancel" id="gcCancel">Cancel</button>';
    mh += '<button class="gc-modal-submit" id="gcSubmit">Create Group</button>';
    mh += '</div></div>';
    overlay.innerHTML = mh;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);

    const selectedFriends = new Set();
    overlay.querySelectorAll('.gc-friend-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        const fid = opt.dataset.gcfriend;
        if (selectedFriends.has(fid)) { selectedFriends.delete(fid); opt.classList.remove('selected'); opt.querySelector('.gc-friend-opt-check').textContent = ''; }
        else { selectedFriends.add(fid); opt.classList.add('selected'); opt.querySelector('.gc-friend-opt-check').textContent = '✓'; }
      });
    });

    document.getElementById('gcCancel').addEventListener('click', () => overlay.remove());
    document.getElementById('gcSubmit').addEventListener('click', async () => {

      if (!name) { document.getElementById('gcNameInput').style.borderColor = '#f87171'; return; }
      // Create group
      const groupRes = await socFetch('group_chats', { method: 'POST', headers: { 'Prefer': 'return=representation' }, body: JSON.stringify({ name, owner_id: state.user.id }) });
      const groupId = Array.isArray(groupRes) && groupRes[0] ? groupRes[0].id : null;
      if (!groupId) { overlay.remove(); return; }
      // Add self as member
      await socFetch('group_chat_members', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({ group_id: groupId, user_id: state.user.id }) });
      // Add selected friends
      for (const fid of selectedFriends) {
        await socFetch('group_chat_members', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({ group_id: groupId, user_id: fid }) });
      }
      overlay.remove();
      state._socGroupId = groupId;
      renderSocial(app);
    });
  })();
}

function socAttachDmEvents(app) {
  // Subtab clicks
  app.querySelectorAll('[data-dmsub]').forEach(t => t.addEventListener('click', () => {
    state._socDmSub = t.dataset.dmsub;
    renderSocial(app);
  }));

  // Group upgrade gate
  const gcUpBtn = document.getElementById('gcUpgradeBtn');
  if (gcUpBtn) gcUpBtn.addEventListener('click', () => showUpgradeModal());

  // Create group button
  const gcCreateBtn = document.getElementById('gcCreateBtn');
  if (gcCreateBtn) gcCreateBtn.addEventListener('click', () => showCreateGroupModal(app));

  // Group selection
  app.querySelectorAll('[data-gcselect]').forEach(c => c.addEventListener('click', () => {
    state._socGroupId = c.dataset.gcselect;
    renderSocial(app);
  }));

  // Group send
  const gcSendBtn = document.getElementById('socGcSend');
  const gcInput = document.getElementById('socGcInput');
  if (gcSendBtn && gcInput) {
    async function sendGcMsg() {
      const txt = gcInput.value.trim();
      if (!txt || !state._socGroupId) return;
      gcSendBtn.disabled = true;
      await socFetch('group_chat_messages', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({
        group_id: state._socGroupId, user_id: state.user.id, text_content: txt
      })});
      trackEngagement('comment');
      renderSocial(app);
    }
    gcSendBtn.addEventListener('click', sendGcMsg);
    gcInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGcMsg(); } });
  }

  // Group delete/leave
  const gcDelBtn = document.getElementById('gcDeleteBtn');
  if (gcDelBtn) gcDelBtn.addEventListener('click', async () => {
    if (!confirm('Delete this group? This cannot be undone.')) return;
    await socFetch('group_chats?id=eq.' + gcDelBtn.dataset.gcdelete, { method: 'DELETE' });
    state._socGroupId = null;
    renderSocial(app);
  });
  const gcLeaveBtn = document.getElementById('gcLeaveBtn');
  if (gcLeaveBtn) gcLeaveBtn.addEventListener('click', async () => {
    await socFetch('group_chat_members?group_id=eq.' + gcLeaveBtn.dataset.gcleave + '&user_id=eq.' + state.user.id, { method: 'DELETE' });
    state._socGroupId = null;
    renderSocial(app);
  });

  // DM contact clicks
  app.querySelectorAll('[data-dmcontact]').forEach(c => c.addEventListener('click', () => {
    state._socDmFriend = c.dataset.dmcontact;
    renderSocial(app);
  }));

  // DM send
  const sendBtn = document.getElementById('socDmSend');
  if (sendBtn) sendBtn.addEventListener('click', async () => {
    const inp = document.getElementById('socDmInput');
    const txt = (inp?.value || '').trim();
    if (!txt || !state._socDmFriend) return;
    sendBtn.disabled = true;
    await socFetch('social_dms', { method: 'POST', headers: { 'Prefer': 'return=minimal' }, body: JSON.stringify({
      sender_id: state.user.id, receiver_id: state._socDmFriend, text_content: txt
    })});
    renderSocial(app);
  });

  const dmInput = document.getElementById('socDmInput');
  if (dmInput) dmInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn?.click(); } });

  // Auto-scroll
  const msgsEl = document.getElementById('socDmMsgs') || document.getElementById('socGcMsgs');
  if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
}

function goBack() {
  if (state.qIdx === 0) { state.screen = 'home'; }
  else { state.qIdx--; state.answers = state.answers.slice(0, -1); state.selected = null; }
  render();
}

function restart() {
  state.screen = 'home'; state.game = null; state.qIdx = 0;
  state.answers = []; state.results = []; state.selected = null; state.archetype = null;
  state.heroPool = null; state.allRanked = []; state._allScoredByRole = []; state._radarProfiles = null; state._radarProfilesGame = null; state.baseTraits = null;
  state.sliders = { aggression: 50, teamplay: 50, complexity: 50, risk: 50 };
  state.slidersLocked = false;
  state.filters = { role: 'all', lane: 'all', maxDiff: 0, dmgType: 'all' };
  render();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
// 1. Check for email confirmation redirect tokens in URL hash
// 2. Fall back to restoring session from localStorage
// 3. Render the app
const hasHashTokens = sbCaptureHashTokens();
if (!hasHashTokens) {
  sbRefreshSession().then(async (ok) => {
    if (ok) { await fetchUserAvatar(); await fetchMyStreak(); }
    render();
  });
}
</script>
