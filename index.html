function finalizeResults() {
  state.slidersLocked = true;
  state.screen = 'calc';
  render();
  setTimeout(async () => {
    state.allRanked = rankHeroes(state.calcVec, state.heroPool, state.sliders, state.game);
    const filtered = applyFilters(state.allRanked, state.filters);
    state.results = filtered.slice(0, 6).sort((a, b) => b.score - a.score);

    // Fetch radar profiles from Supabase (once per game, cached)
    if (!state._radarProfiles || state._radarProfilesGame !== state.game) {
      try {
        const gameMap = { lol: 'lol', deadlock: 'deadlock', overwatch: 'overwatch' };
        const g = gameMap[state.game] || state.game;
        const rRes = await fetch(SUPABASE_URL + '/rest/v1/hero_radar_profiles?select=hero_name,aggression,mechanical_skill,game_knowledge,team_utility,survivability,positioning_discipline&game=eq.' + g, {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        });
        const rData = await rRes.json();
        state._radarProfiles = {};
        for (const r of rData) {
          state._radarProfiles[r.hero_name] = {
            aggression: r.aggression,
            mechanical_skill: r.mechanical_skill,
            game_knowledge: r.game_knowledge,
            team_utility: r.team_utility,
            survivability: r.survivability,
            positioning_discipline: r.positioning_discipline,
          };
        }
        state._radarProfilesGame = state.game;
      } catch(e) {
        state._radarProfiles = state._radarProfiles || {};
      }
    }

    // Record top 3 results to Supabase for leaderboard
    try {
      const top3 = state.allRanked.slice(0, 3);
      const rows = top3.map((h, i) => ({
        game_id: state.game,
        hero_name: h.name,
        hero_rank: i + 1,
        score: Math.round(h.score * 10000) / 100,
      }));
      fetch(SUPABASE_URL + '/rest/v1/quiz_results', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': 'Bearer ' + SUPABASE_ANON,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(rows)
      }).catch(() => {});
    } catch(e) {}

    state.screen = 'results';
    render();
  }, 1600);
}

function renderCalc(app) {
  app.innerHTML = `
    <div style="text-align:center">
      <div class="spinner"></div>
      <div class="calc-title">Analyzing your playstyle</div>
      <div class="calc-sub">Building your trait profile...</div>
      <div style="text-align:left;margin-top:20px">
        ${showTraits.map((t, i) => {
          const idx = DIMS.indexOf(t);
          const val = state.calcVec ? (state.calcVec[idx] || 0) : 0;
          return `
            <div class="trait-row">
              <span class="trait-name">${t.replace(/_/g, ' ')}</span>
              <div class="trait-track"><div class="trait-fill" data-val="${val}" style="transition-delay:${i * 0.08}s"></div></div>
              <span class="trait-val">${val.toFixed(2)}</span>
            </div>`;
        }).join('')}
      </div>
    </div>`;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {

}

function reRankAndFilter() {
  if (!state.calcVec || !state.heroPool) return;
  state.allRanked = rankHeroes(state.calcVec, state.heroPool, state.sliders, state.game);
  // Podium always shows the global top 3 (unfiltered)
  state.results = state.allRanked.slice(0, 3).sort((a, b) => b.score - a.score);
}

  }

  function traitTags(hero, cls) {
    return (hero.topTraits || []).slice(0, 3).filter(c => c.val > 0)
      .map(t => '<span class="' + cls + '">' + t.trait.replace(/_/g, ' ') + '</span>').join('');
  }

  // ── LoL: Build lane-based "Best by Lane" section ──
  let lolLaneHTML = '';
  if (state.game === 'lol') {
    const LOL_LANES = [
      { key: 'Top', label: 'Top Lane', icon: '⚔️' },
      { key: 'Jungle', label: 'Jungle', icon: '🌿' },
      { key: 'Mid', label: 'Mid Lane', icon: '🔮' },

    const top3Rank = {};

    const laneCards = LOL_LANES.map((lane, li) => {
      // Find best champion for this lane — allow top 3 to appear

    // Calculate average compatibility score per role
    const roleScores = ROLE_DEFS.map(rd => {
      let matchingHeroes;
      if (isR6) {
        // R6: derive roles from TOP RANKED operators (not independent averaging)
        // Use the actual ranked results so roles always match recommended operators
        const ranked = state.allRanked || [];
        const topOps = ranked.slice(0, 8); // top 8 operators drive the recommendation
        matchingHeroes = topOps.filter(h =>
          (h.offensive_tag === rd.key) || (h.defensive_tag === rd.key)
        );
        // Weight by position: #1 operator counts more than #8
        const weightedScore = matchingHeroes.reduce((sum, h, idx) => {
          const posInTop = topOps.indexOf(h);
          const weight = 1 - (posInTop * 0.08); // #1=1.0, #8=0.36
          return sum + (h.score || 0) * weight;
        }, 0);
        const avgScore = matchingHeroes.length > 0
          ? weightedScore / matchingHeroes.length
          : 0;
        return { ...rd, avgScore, count: matchingHeroes.length };
      } else if (isOW || isVal || isMR) {
        matchingHeroes = allScored.filter(h => h.role === rd.key);

      const avgScore = topN.length > 0
        ? topN.reduce((sum, h) => sum + (h.score || 0), 0) / topN.length
        : 0;
      return { ...rd, avgScore };

  // Podium order: #2 (silver, left) → #1 (gold, center) → #3 (bronze, right)
  const podiumOrder = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3;
  const podiumClassOrder = top3.length >= 3 ? [1, 0, 2] : top3.map((_, i) => i);

  // Game chips
  const games = [
    { id: 'lol', name: 'League of Legends', avail: true },
    { id: 'deadlock', name: 'Deadlock', avail: true },
    { id: 'overwatch', name: 'Overwatch', avail: true },

        overwatch: {a:'#f99e1a',b:'#ffc555',bg1:'#1f1a10',bg2:'#252012'},
        valorant: {a:'#fd4556',b:'#ff7882',bg1:'#1f1018',bg2:'#25121c'},
        r6: {a:'#409ccd',b:'#72c4eb',bg1:'#10182a',bg2:'#121e30'},
        marvel_rivals: {a:'#C41E3A',b:'#e8556a',bg1:'#1f1018',bg2:'#25121c'},
      };
      const gc = GC[state.game] || {a:'#4dc9f6',b:'#a78bfa',bg1:'#0c1420',bg2:'#101828'};

      const c = document.createElement('canvas');
      c.width = 1200; c.height = 630;
      const ctx = c.getContext('2d');

      // === VIVID BACKGROUND ===
      const bg = ctx.createLinearGradient(0, 0, 1200, 630);
      bg.addColorStop(0, gc.bg1); bg.addColorStop(0.5, '#131722'); bg.addColorStop(1, gc.bg2);
      ctx.fillStyle = bg; ctx.fillRect(0, 0, 1200, 630);

      // Large vivid center glow — strong
      const glow1 = ctx.createRadialGradient(600, 200, 10, 600, 200, 420);
      glow1.addColorStop(0, gc.a + '50'); glow1.addColorStop(0.25, gc.a + '28');
      glow1.addColorStop(0.6, gc.b + '10'); glow1.addColorStop(1, 'transparent');
      ctx.fillStyle = glow1; ctx.fillRect(0, 0, 1200, 630);

      // Corner glows for depth — stronger
      const glow2 = ctx.createRadialGradient(150, 560, 10, 150, 560, 280);
      glow2.addColorStop(0, gc.b + '28'); glow2.addColorStop(1, 'transparent');
      ctx.fillStyle = glow2; ctx.fillRect(0, 280, 500, 350);
      const glow3 = ctx.createRadialGradient(1050, 80, 10, 1050, 80, 280);
      glow3.addColorStop(0, gc.a + '20'); glow3.addColorStop(1, 'transparent');
      ctx.fillStyle = glow3; ctx.fillRect(700, 0, 500, 350);

      // Top accent bar — thick, vivid
      const topBar = ctx.createLinearGradient(0, 0, 1200, 0);
      topBar.addColorStop(0, 'transparent'); topBar.addColorStop(0.15, gc.a + 'dd');
      topBar.addColorStop(0.5, gc.b + 'bb'); topBar.addColorStop(0.85, gc.a + 'dd');
      topBar.addColorStop(1, 'transparent');
      ctx.fillStyle = topBar; ctx.fillRect(0, 0, 1200, 5);

      ctx.textAlign = 'center';

      // Game label — vivid
      ctx.fillStyle = gc.a;
      ctx.font = '700 16px sans-serif';
      ctx.fillText(('YOUR ' + gameName + ' HERO').toUpperCase(), 600, 52);

      // === HERO PORTRAIT — styled initials circle (external images taint canvas) ===
      const pCX = 600, pCY = 135, pR = 55;

      // Outer glow ring
      ctx.save();
      ctx.shadowColor = gc.a; ctx.shadowBlur = 35;
      ctx.beginPath(); ctx.arc(pCX, pCY, pR + 5, 0, Math.PI * 2);
      const ringG = ctx.createLinearGradient(pCX - pR, pCY - pR, pCX + pR, pCY + pR);
      ringG.addColorStop(0, gc.a); ringG.addColorStop(1, gc.b);
      ctx.strokeStyle = ringG; ctx.lineWidth = 3.5; ctx.stroke();
      ctx.restore();

      // Vivid gradient circle
      ctx.beginPath(); ctx.arc(pCX, pCY, pR, 0, Math.PI * 2);
      const cg = ctx.createLinearGradient(pCX - pR, pCY - pR, pCX + pR, pCY + pR);
      cg.addColorStop(0, gc.a + '60'); cg.addColorStop(1, gc.b + '40');
      ctx.fillStyle = cg; ctx.fill();

      // Initials
      const initials = topHero.name.replace(/^The /, '').replace(/[^A-Za-z ]/g, '').split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
      ctx.fillStyle = '#ffffff';
      ctx.font = '800 42px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(initials, pCX, pCY + 15);

      // === HERO NAME — auto-scale ===
      let ns = 50;
      ctx.font = '800 ' + ns + 'px sans-serif';
      while (ctx.measureText(topHero.name).width > 680 && ns > 26) { ns -= 2; ctx.font = '800 ' + ns + 'px sans-serif'; }
      ctx.fillStyle = '#ffffff';
      ctx.fillText(topHero.name, 600, 228);

      // === MATCH PILL — colored ===
      const pctText = matchPct + '% Match';
      ctx.font = '700 19px sans-serif';
      const pctW = ctx.measureText(pctText).width + 36;
      const pctX = 600 - pctW / 2;
      const pg = ctx.createLinearGradient(pctX, 0, pctX + pctW, 0);
      pg.addColorStop(0, gc.a + '60'); pg.addColorStop(1, gc.b + '45');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.roundRect(pctX, 244, pctW, 34, 17); ctx.fill();
      ctx.strokeStyle = gc.a + '90'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(pctX, 244, pctW, 34, 17); ctx.stroke();
      ctx.fillStyle = '#ffffff'; ctx.font = '700 17px sans-serif';
      ctx.fillText(pctText, 600, 267);

      // Role + archetype
      const roleStr = (topHero.role || '').split('\u00b7')[0].trim();
      ctx.fillStyle = 'rgba(200,210,225,0.55)'; ctx.font = '500 14px sans-serif';
      ctx.fillText(roleStr + '  \u2022  ' + archetype.name, 600, 304);

      // === TOP 3 PODIUM — colored ===
      const podY = 328;
      const podBg = ctx.createLinearGradient(230, podY, 970, podY + 90);
      podBg.addColorStop(0, gc.a + '12'); podBg.addColorStop(0.5, 'rgba(255,255,255,0.03)'); podBg.addColorStop(1, gc.b + '10');
      ctx.fillStyle = podBg;
      ctx.beginPath(); ctx.roundRect(230, podY, 740, 90, 14); ctx.fill();
      ctx.strokeStyle = gc.a + '25'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(230, podY, 740, 90, 14); ctx.stroke();

      const podCount = Math.min(top3.length, 3);
      const podGap = 215;
      const podStartX = 600 - ((podCount - 1) * podGap / 2);
      const mClr = ['#ffd700', '#c0c0c0', '#cd7f32'];
      const mLbl = ['#1', '#2', '#3'];
      top3.slice(0, 3).forEach((hero, i) => {
        const px = podStartX + i * podGap;
        // Medal
        ctx.beginPath(); ctx.arc(px, podY + 30, 13, 0, Math.PI * 2);
        ctx.fillStyle = mClr[i] + '35'; ctx.fill();
        ctx.strokeStyle = mClr[i]; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = mClr[i]; ctx.font = '800 13px sans-serif';
        ctx.fillText(mLbl[i], px, podY + 35);
        // Name
        ctx.fillStyle = i === 0 ? '#ffffff' : 'rgba(210,216,228,0.75)';
        ctx.font = (i === 0 ? '700 18' : '500 15') + 'px sans-serif';
        ctx.fillText(hero.name, px, podY + 60);
        // Pct — colored
        ctx.fillStyle = gc.a;
        ctx.font = '700 14px monospace';
        ctx.fillText(Math.round(hero.score * 100) + '%', px, podY + 80);
      });

      // === TRAIT BARS — colored fills ===
      const bt = state.baseTraits || {};
      const td = [
        { label:'AGG', val: Math.round((bt.aggression||.5)*100) },
        { label:'TEAM', val: Math.round((bt.teamplay||.5)*100) },
        { label:'SKILL', val: Math.round((bt.complexity||.5)*100) },
        { label:'RISK', val: Math.round((bt.risk||.5)*100) },
      ];
      const bY = 452;
      const bW = 115, bG = 40;
      const tBW = td.length * bW + (td.length - 1) * bG;
      const bSX = 600 - tBW / 2;
      td.forEach((t, i) => {
        const bx = bSX + i * (bW + bG), cx = bx + bW / 2;
        ctx.fillStyle = 'rgba(150,160,180,0.5)'; ctx.font = '700 10px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText(t.label, cx, bY);
        // Track
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath(); ctx.roundRect(bx, bY + 10, bW, 8, 4); ctx.fill();
        // Colored fill
        const fg = ctx.createLinearGradient(bx, 0, bx + bW, 0);
        fg.addColorStop(0, gc.a + 'cc'); fg.addColorStop(1, gc.b + 'aa');
        ctx.fillStyle = fg;
        ctx.beginPath(); ctx.roundRect(bx, bY + 10, bW * (t.val / 100), 8, 4); ctx.fill();
        // Value
        ctx.fillStyle = '#ffffff'; ctx.font = '700 13px monospace';
        ctx.fillText(t.val.toString(), cx, bY + 36);
      });

      // === FOOTER ===
      const fY = 520;
      const fLine = ctx.createLinearGradient(120, 0, 1080, 0);
      fLine.addColorStop(0, 'transparent'); fLine.addColorStop(0.3, gc.a + '25');
      fLine.addColorStop(0.7, gc.b + '20'); fLine.addColorStop(1, 'transparent');
      ctx.fillStyle = fLine; ctx.fillRect(120, fY, 960, 1);

      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(220,226,238,0.4)'; ctx.font = '700 18px sans-serif';
      ctx.fillText('FindMyMain', 120, fY + 38);
      ctx.fillStyle = 'rgba(160,170,190,0.25)'; ctx.font = '500 12px sans-serif';
      ctx.fillText('Discover your perfect hero', 120, fY + 56);
      ctx.textAlign = 'right';
      ctx.fillStyle = gc.a; ctx.font = '600 15px sans-serif';
      ctx.fillText('findmymain.com', 1080, fY + 47);

      // Bottom bar — vivid
      const btm = ctx.createLinearGradient(0, 0, 1200, 0);
      btm.addColorStop(0, 'transparent'); btm.addColorStop(0.15, gc.a + '88');
      btm.addColorStop(0.5, gc.b + '77'); btm.addColorStop(0.85, gc.a + '88');
      btm.addColorStop(1, 'transparent');
      ctx.fillStyle = btm; ctx.fillRect(0, 625, 1200, 5);

      const link = document.createElement('a');
      link.download = 'findmymain-' + topHero.name.toLowerCase().replace(/\s+/g, '-') + '.png';
      link.href = c.toDataURL('image/png');
      link.click();
      shareBtn.innerHTML = '<div class="psi-share-card-icon">\u2713</div><div class="psi-share-card-label">Saved!</div><div class="psi-share-card-sub">Share it everywhere</div>';
      shareBtn.classList.add('sc-done');
    });
  }

  // ── Community Share + Platform Buttons ──
  const gameLabel = state.game === 'marvel_rivals' ? 'Marvel Rivals' : state.game === 'overwatch' ? 'Overwatch' : state.game === 'deadlock' ? 'Deadlock' : state.game === 'valorant' ? 'Valorant' : state.game === 'r6' ? 'Rainbow Six Siege' : 'League of Legends';
  const archName = (state.archetype || {}).name || 'Adaptive Flex';
  const topName = state.results[0] ? state.results[0].name : '';
  const shareText = topName
    ? 'I\'m a ' + archName + ' — my #1 ' + gameLabel + ' hero is ' + topName + '! Find your main at findmymain.com'
    : 'I\'m a ' + archName + ' in ' + gameLabel + '! Find your main at findmymain.com';
  const shareUrl = 'https://findmymain.com';

  attachSharePanelEvents(app, 'psiCommunityBtn', shareText, shareUrl);

  // Inject save-to-profile banner (simplified — no share since panel handles it)
  setTimeout(() => injectSaveBanner(app), 50);
  setTimeout(() => injectPremiumSections(app), 100);
}

// ═══════════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════════
async function startGame(g) {
  state.game = g; state.qIdx = 0; state.answers = []; state.selected = null;
  // Identity quiz — no hero data needed, go straight to questions
  if (g === 'identity') {
    state.screen = 'question'; render(); return;
  }
  if (g === 'lol' && !state.lolChampions) {
    state.screen = 'loading'; render();
    try {
      const vRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
      const versions = await vRes.json();
      state.lolVersion = versions[0];
      // Fetch ddragon champion data AND lane data from Supabase in parallel
      const [cRes, laneRes] = await Promise.all([
        fetch(`https://ddragon.leagueoflegends.com/cdn/${versions[0]}/data/en_US/champion.json`),
        fetch(SUPABASE_URL + '/rest/v1/lol_champions?select=name,lanes', {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        }).catch(() => null)
      ]);
      const cd = await cRes.json();
      state.lolChampions = Object.values(cd.data);
      // Build lane lookup: name → primary lane
      state.lolLanes = {};
      try {
        if (laneRes && laneRes.ok) {
          const laneData = await laneRes.json();
          for (const c of laneData) {
            if (c.lanes) state.lolLanes[c.name] = c.lanes.split(',')[0].trim();
          }
        }
      } catch(e) { /* lanes are optional — fallback to tag-based */ }
      state.screen = 'question'; render();
    } catch { state.screen = 'error'; render(); }
  } else if (g === 'overwatch' && !state.owHeroes) {
    state.screen = 'loading'; render();
    try {
      // Fetch hero data from Supabase AND official portraits from OverFast API in parallel
      const [sbRes, pfRes] = await Promise.all([
        fetch(SUPABASE_URL + '/rest/v1/overwatch_heroes?select=*', {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        }),
        fetch('https://overfast-api.tekrop.fr/heroes').catch(() => null)
      ]);
      state.owHeroes = await sbRes.json();
      // Build portrait map from OverFast API (official Blizzard CDN URLs)
      state.owPortraits = {};
      try {
        if (pfRes && pfRes.ok) {
          const pfData = await pfRes.json();
          for (const h of pfData) {
            state.owPortraits[h.name] = h.portrait;
          }
        }
      } catch(e) { /* portraits are optional — fallback handles missing */ }
      state.screen = 'question'; render();
    } catch { state.screen = 'error'; render(); }
  } else if (g === 'valorant' && !state.valAgents) {
    state.screen = 'loading'; render();
    try {
      // Fetch agent data from Supabase AND official icons from valorant-api.com in parallel
      const [sbRes, iconRes] = await Promise.all([
        fetch(SUPABASE_URL + '/rest/v1/game_heroes?select=name,role,sub_role,difficulty,damage_type,slug&game_id=eq.valorant&is_active=eq.true', {
          headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
        }),
        fetch('https://valorant-api.com/v1/agents?isPlayableCharacter=true').catch(() => null)
      ]);
      state.valAgents = await sbRes.json();
      // Build portrait map from valorant-api.com (official Riot CDN icons)
      state.valPortraits = {};
      try {
        if (iconRes && iconRes.ok) {
          const iconData = await iconRes.json();
          for (const a of (iconData.data || [])) {
            if (a.displayName && a.displayIcon) {
              state.valPortraits[a.displayName] = a.displayIcon;
            }
          }
        }
      } catch(e) { /* icons are optional — fallback to initials */ }
      state.screen = 'question'; render();
    } catch { state.screen = 'error'; render(); }
  } else if (g === 'r6' && !state.r6Operators) {
    state.screen = 'loading'; render();
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/game_heroes?select=name,role,sub_role,difficulty,damage_type,slug,offensive_tag,defensive_tag,icon_url&game_id=eq.r6&is_active=eq.true', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
      });
      state.r6Operators = await res.json();
      state.screen = 'question'; render();
    } catch { state.screen = 'error'; render(); }
  } else if (g === 'marvel_rivals' && !state.mrHeroes) {
    state.screen = 'loading'; render();
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/game_heroes?select=name,role,sub_role,difficulty,damage_type,slug,icon_url&game_id=eq.marvel_rivals&is_active=eq.true', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
      });
      state.mrHeroes = await res.json();
      state.screen = 'question'; render();
    } catch { state.screen = 'error'; render(); }
  } else { state.screen = 'question'; render(); }
}

function selectAnswer(idx) {
  if (state.selected !== null) return;
  state.selected = idx;
  render();
  const questions = getQuestions(state.game);
  const newAnswers = [...state.answers, questions[state.qIdx].answers[idx]];
  state.answers = newAnswers;
  setTimeout(() => {
    state.selected = null;
    if (state.qIdx < questions.length - 1) {
      state.qIdx++;
      render();
    } else {
      // Build user vector and prepare hero pool
      const vec = buildUserVec(newAnswers);
      state.calcVec = vec;
      state.archetype = detectArchetype(vec);

      // Identity quiz — skip hero ranking, record result, go to identity results
      if (state.game === 'identity') {
        // Fire-and-forget: record archetype to leaderboard
        const bt = state.baseTraits || {};
        try {
          fetch(SUPABASE_URL + '/rest/v1/archetype_results', {
            method: 'POST',
            headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body: JSON.stringify({
              archetype: state.archetype.name,
              score_aggression: Math.round((bt.aggression || 0.5) * 100),
              score_teamplay: Math.round((bt.teamplay || 0.5) * 100),
              score_mechanics: Math.round((bt.complexity || 0.5) * 100),
              score_risk: Math.round((bt.risk || 0.5) * 100),
            })
          }).catch(() => {});
        } catch(e) {}
        state.screen = 'identity-results'; render(); return;
      }

      // Prepare hero pool now (so playstyle → calc is instant)
      if (state.game === 'deadlock') {
        state.heroPool = DEADLOCK_HEROES_CLEAN.map(h => ({
          ...h,
          dmg: DL_DMG[h.name] || 'Physical',
          traits: DL_TRAITS[h.name] || {aggression:50, teamplay:50, complexity:50, risk:50}
        }));
      } else if (state.game === 'overwatch') {
        state.heroPool = (state.owHeroes || []).map(h => {
          const traits = OW_TRAITS[h.name] || {aggression:50, teamplay:50, complexity:50, risk:50};
          const detail = OW_HERO_DETAIL[h.name] || {strengths:[], weaknesses:[]};
          const diffMap = {Easy:1, Moderate:3, Hard:5};
          const owSlug = h.name.replace(/ /g, '_').replace(/[:']/g, '');
          return {
            name: h.name,
            role: h.role || 'Damage',
            difficulty: diffMap[h.difficulty] || 3,
            dmg: h.damage_type || 'Physical',
            traits,
            strengths: detail.strengths || [],
            weaknesses: detail.weaknesses || [],
            owSlug,
            icon_url: h.icon_url || '',
            tips: [
              `Check the Overwatch wiki for full ${h.name} ability breakdowns`,
              'Try heroes in the Practice Range first',
              `Watch top-500 ${h.name} gameplay for advanced techniques`,
            ],
          };
        });
      } else if (state.game === 'valorant') {
        state.heroPool = (state.valAgents || []).map(h => {
          const traits = VAL_TRAITS[h.name] || {aggression:50, teamplay:50, complexity:50, risk:50};
          const role = h.role || 'Duelist';
          const strengths = [];
          const weaknesses = [];
          if (role === 'Duelist') { strengths.push('Entry fragging', 'Space creation'); weaknesses.push('Low utility'); }
          if (role === 'Initiator') { strengths.push('Intel gathering', 'Site setup'); weaknesses.push('Aim reliant'); }
          if (role === 'Controller') { strengths.push('Map control', 'Site denial'); weaknesses.push('Low frag potential'); }
          if (role === 'Sentinel') { strengths.push('Site lockdown', 'Flank denial'); weaknesses.push('Passive playstyle'); }
          return {
            name: h.name,
            role,
            difficulty: h.difficulty || 3,
            dmg: h.damage_type || 'Physical',
            slug: h.slug || h.name,
            traits,
            strengths,
            weaknesses,
            tips: [
              `Check the Valorant wiki for full ${h.name} ability breakdowns`,
              'Practice ability lineups in custom games',
              `Watch pro ${h.name} VODs for advanced positioning`,
            ],
          };
        });
      } else if (state.game === 'r6') {
        state.heroPool = (state.r6Operators || []).map(h => {
          const traits = R6_TRAITS[h.name] || {aggression:50, teamplay:50, complexity:50, risk:50};
          const role = h.role || 'Attacker';
          const subRole = h.sub_role || '';
          const strengths = [];
          const weaknesses = [];
          if (subRole === 'Hard Breach') { strengths.push('Opens reinforcements'); weaknesses.push('High-priority target'); }
          else if (subRole === 'Soft Breach') { strengths.push('Vertical play'); weaknesses.push('No hard breach'); }
          else if (subRole === 'Intel') { strengths.push('Information gathering'); weaknesses.push('Aim reliant'); }
          else if (subRole === 'Anti-Gadget') { strengths.push('Utility denial'); weaknesses.push('Limited fragging'); }
          else if (subRole === 'Support') { strengths.push('Team enabler'); weaknesses.push('Low solo carry'); }
          else if (subRole === 'Area Denial') { strengths.push('Zone control'); weaknesses.push('Predictable'); }
          else if (subRole === 'Trap') { strengths.push('Ambush potential'); weaknesses.push('Setup time'); }
          else if (subRole === 'Shield') { strengths.push('Damage absorption'); weaknesses.push('Limited firepower'); }
          else if (subRole === 'Roam') { strengths.push('Map pressure'); weaknesses.push('Isolated'); }
          else if (subRole === 'Anti-Roam') { strengths.push('Flank security'); weaknesses.push('Passive'); }
          else { strengths.push(role === 'Attacker' ? 'Versatile attacker' : 'Flexible defender'); weaknesses.push('Jack of all trades'); }
          const offTag = h.offensive_tag || 'N/A';
          const defTag = h.defensive_tag || 'N/A';
          const displayRole = role === 'Attacker'
            ? (offTag !== 'N/A' ? role + ' · ' + offTag : role)
            : (defTag !== 'N/A' ? role + ' · ' + defTag : role);
          return {
            name: h.name,
            role: displayRole,
            side: role,
            offensive_tag: offTag,
            defensive_tag: defTag,
            sub_role: subRole,
            difficulty: h.difficulty || 3,
            dmg: h.damage_type || 'Physical',
            slug: h.slug || h.name,
            icon_url: h.icon_url || null,
            traits,
            strengths,
            weaknesses,
            tips: [
              `Check the R6 wiki for full ${h.name} gadget breakdowns`,
              'Learn common map setups for your operator',
              `Watch pro league ${h.name} gameplay for positioning`,
            ],
          };
        });
      } else if (state.game === 'marvel_rivals') {
        state.heroPool = (state.mrHeroes || []).map(h => {
          const traits = MR_TRAITS[h.name] || {aggression:50, teamplay:50, complexity:50, risk:50};
          return {
            name: h.name,
            role: h.role,
            sub_role: h.sub_role || '',
            difficulty: h.difficulty || 3,
            dmg: h.damage_type || 'Hybrid',
            slug: h.slug || h.name,
            icon_url: h.icon_url || null,
            traits,
            strengths: [],
            weaknesses: [],
            tips: [
              'Master your hero abilities in the Practice Range',
              'Coordinate Team-Up abilities with allies',
              'Watch pro gameplay for positioning tips',
            ],
          };
        });
      } else {
        state.heroPool = (state.lolChampions || []).map(c => {
          const baseV = lolToVector(c);
          const finalV = applyLolOverrides(c.name, baseV);
          const tags = (c.tags || []).map(t => t.toLowerCase());
          const info = c.info || {};
          const dif = Math.max(1, Math.round((info.difficulty || 5) / 2));
          const roleStr = c.tags ? c.tags.join(' · ') : 'Unknown';
          const summary = c.blurb || '';
          const isAssassin = tags.includes('assassin');
          const isMage = tags.includes('mage');
          const isSupport = tags.includes('support');
          const isTank = tags.includes('tank');
          const isFighter = tags.includes('fighter');
          const isMarksman = tags.includes('marksman');
          const strengths = [];
          const weaknesses = [];
          if (isAssassin) { strengths.push('High burst damage'); weaknesses.push('Squishy'); }
          if (isTank) { strengths.push('High durability'); weaknesses.push('Low damage'); }
          if (isMarksman) { strengths.push('High DPS scaling'); weaknesses.push('Position-dependent'); }
          if (isMage) { strengths.push('Ability power burst'); weaknesses.push('Mana dependent'); }
          if (isSupport) { strengths.push('Team utility'); weaknesses.push('Low solo carry'); }
          if (isFighter) { strengths.push('Sustained combat'); weaknesses.push('Can be kited'); }
          const dmg = isMage ? 'AP' : isMarksman ? 'AD' : (isAssassin && isMage) ? 'Hybrid' : isAssassin ? 'AD' : isFighter ? 'AD' : isTank ? 'AD' : isSupport ? 'AP' : 'AD';
          return {
            name: c.name, role: roleStr, difficulty: dif, v: finalV, dmg,
            tags: c.tags || [],
            primaryLane: (state.lolLanes || {})[c.name] || null,
            traits: computeHeroTraits(finalV),
            summary, strengths, weaknesses, imageKey: c.id,
            tips: [
              `Check the LoL wiki for full ${c.name} ability breakdowns`,
              'Practice in a custom game or ARAM first',
              `Watch high-elo ${c.name} gameplay for advanced techniques`,
            ],
          };
        });
      }

      // Go to playstyle slider step (not calc yet)
      state.screen = 'playstyle';
      render();
    }
  }, 150);
}

// AUTH MODAL
// ═══════════════════════════════════════════════════════════════════════════
function showAuthModal(afterSave) {
  if (document.getElementById('authOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'authOverlay';
  overlay.className = 'auth-overlay';
  let mode = 'signin';

  function renderModal() {
    const isSignUp = mode === 'signup';
    overlay.innerHTML = `
      <div class="auth-card">
        <button class="auth-close" id="authClose">✕</button>
        <div class="auth-title">${isSignUp ? 'Create Account' : 'Sign In'}</div>
        <div class="auth-sub">${afterSave ? 'Sign in to save your result to your profile' : isSignUp ? 'Create an account to track your quiz history' : 'Sign in to view your quiz history'}</div>
        <div class="auth-field"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="auth-field"><label>Password</label><input type="password" id="authPass" placeholder="${isSignUp ? 'Create a password' : 'Your password'}" autocomplete="${isSignUp ? 'new-password' : 'current-password'}"/></div>
        <button class="auth-btn" id="authSubmit">${isSignUp ? 'Create Account' : 'Sign In'}</button>
        <div class="auth-toggle">${isSignUp ? 'Already have an account? <span id="authSwitch">Sign In</span>' : 'No account? <span id="authSwitch">Create one</span>'}</div>
        <div id="authMsg"></div>
      </div>
    `;
    overlay.querySelector('#authClose').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#authSwitch').addEventListener('click', () => { mode = isSignUp ? 'signin' : 'signup'; renderModal(); });
    overlay.querySelector('#authSubmit').addEventListener('click', async () => {
      const email = overlay.querySelector('#authEmail').value.trim();
      const pass = overlay.querySelector('#authPass').value;
      const msgEl = overlay.querySelector('#authMsg');
      const btn = overlay.querySelector('#authSubmit');
      if (!email || !pass) { msgEl.innerHTML = '<div class="auth-error">Please fill in both fields</div>'; return; }
      if (isSignUp && pass.length < 6) { msgEl.innerHTML = '<div class="auth-error">Password must be at least 6 characters</div>'; return; }
      btn.disabled = true; btn.textContent = isSignUp ? 'Creating…' : 'Signing in…';
      try {
        if (isSignUp) {
          const result = await sbSignUp(email, pass);
          if (result.needsConfirmation) {
            // Show confirmation message — don't try to sign in
            msgEl.innerHTML = '<div class="auth-success">✓ Account created! Check <strong>' + email + '</strong> for a confirmation link, then come back and sign in.</div>';
            btn.textContent = 'Check Your Email';
            btn.disabled = true;
            // Switch to sign-in mode after delay
            setTimeout(() => { mode = 'signin'; renderModal(); }, 5000);
            return;
          }
          // If auto-confirmed (unlikely but possible), proceed
        } else {
          await sbSignIn(email, pass);
        }
        overlay.remove();
        await fetchUserAvatar();
        // Save pending result if any
        if (state._pendingSave) {
          await saveQuizResult(state._pendingSave);
        }
        render();
      } catch(e) {
        msgEl.innerHTML = '<div class="auth-error">' + (e.message || 'Something went wrong') + '</div>';
        btn.disabled = false; btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
      }
    });
    // Enter key
    overlay.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') overlay.querySelector('#authSubmit').click(); });
    });
    // Focus email
    setTimeout(() => { const e = overlay.querySelector('#authEmail'); if (e) e.focus(); }, 100);
  }
  renderModal();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// HISTORY PAGE — quiz results grouped by game with evolution insights
// ═══════════════════════════════════════════════════════════════════════════
async function renderHistory(app) {
  if (!state.user) { showAuthModal(); state.screen = 'home'; render(); return; }

  const GM = {
    lol: { icon: '⚔️', label: 'League', color: '#c8a44e' },
    overwatch: { icon: '🎯', label: 'Overwatch', color: '#f0962a' },
    valorant: { icon: '💢', label: 'Valorant', color: '#fd4556' },
    deadlock: { icon: '🔫', label: 'Deadlock', color: '#e8734a' },
    r6: { icon: '🛡️', label: 'R6 Siege', color: '#5aaddb' },
    marvel_rivals: { icon: '🦸', label: 'Marvel Rivals', color: '#e84057' },
    identity: { icon: '🧬', label: 'Identity', color: '#a78bfa' },
  };

  app.innerHTML = '<div class="hist" style="text-align:center;padding:60px 20px;color:#8890a4">Loading…</div>';
  if (!state._profileHistory) state._profileHistory = await fetchUserHistory();
  const all = (state._profileHistory || []).filter(r => r.game !== 'identity');
  const byGame = {};
  all.forEach(r => { if (!byGame[r.game]) byGame[r.game] = []; byGame[r.game].push(r); });
  const gameIds = Object.keys(byGame).sort((a, b) => new Date(byGame[b][0].created_at) - new Date(byGame[a][0].created_at));
  if (!state._histGame && gameIds.length > 0) state._histGame = gameIds[0];
  const ag = state._histGame || gameIds[0] || null;
  const results = ag ? (byGame[ag] || []) : [];
  const gm = GM[ag] || { icon: '🎮', label: 'Game', color: '#888' };

  let h = '<div class="hist">';

  // Header
  h += '<div class="hist-head"><div class="hist-head-left"><div class="hist-head-title">Quiz History</div><div class="hist-head-sub">' + gameIds.length + ' game' + (gameIds.length !== 1 ? 's' : '') + ' played</div></div>';
  h += '<div style="text-align:right"><div class="hist-head-total">' + all.length + '</div><div class="hist-head-total-label">Total Quizzes</div></div>';
  h += '</div>';

  // Batch fetch hero icons for this game
  const allHeroNames = [...new Set(results.flatMap(r => [r.top_hero_1, r.top_hero_2, r.top_hero_3].filter(Boolean)))];
  const heroIcons = {};
  if (allHeroNames.length > 0 && ag) {
    try {
      const iconRows = await fetch(SUPABASE_URL + '/rest/v1/game_heroes?game_id=eq.' + ag + '&name=in.(' + allHeroNames.map(n => '"' + n.replace(/"/g, '') + '"').join(',') + ')&select=name,icon_url', {
        headers: { 'apikey': SUPABASE_ANON }
      }).then(r => r.json());
      if (Array.isArray(iconRows)) iconRows.forEach(r => { if (r.icon_url) heroIcons[r.name] = r.icon_url; });
    } catch {}
  }

  if (all.length === 0) {
    h += '<div class="hist-empty">No quiz results yet.<br>Take a game quiz to start tracking!</div></div>';
    app.innerHTML = h; return;
  }

  // Tabs
  h += '<div class="hist-tabs">';
  gameIds.forEach(gid => {
    const g = GM[gid] || { icon: '🎮', label: gid };
    h += '<div class="hist-tab' + (gid === ag ? ' active' : '') + '" data-hgame="' + gid + '" style="' + (gid === ag ? 'border-color:' + g.color + '44;background:' + g.color + '10;color:#f0f2f7' : '') + '">' + g.icon + ' ' + g.label + ' <span style="opacity:.5;font-size:9px">' + byGame[gid].length + '</span></div>';
  });
  h += '</div>';

  // Evolution analysis (if 2+ results)
  if (results.length >= 2) {
    const prev = results[1];
    const ps = prev.score_data || {};
    const ls2 = results[0].score_data || {};
    const dA = (ls2.aggression||50)-(ps.aggression||50);
    const dT = (ls2.teamplay||50)-(ps.teamplay||50);
    const dM = (ls2.mechanics||50)-(ps.mechanics||50);
    const dR = (ls2.risk||50)-(ps.risk||50);
    const totalShift = Math.abs(dA)+Math.abs(dT)+Math.abs(dM)+Math.abs(dR);
    const arcChanged = ls2.archetype !== ps.archetype;
    let evoBadge = '<span class="hist-card-badge hcb-stable">Consistent</span>';
    if (totalShift >= 40 || (arcChanged && totalShift >= 20)) evoBadge = '<span class="hist-card-badge hcb-major">Major Shift</span>';
    else if (totalShift >= 15 || arcChanged) evoBadge = '<span class="hist-card-badge hcb-shift">Shifted</span>';

    function dv(d) {
      if (d > 0) return '<div class="hist-evo-delta-val hist-evo-delta-up">+' + d + '</div>';
      if (d < 0) return '<div class="hist-evo-delta-val hist-evo-delta-down">' + d + '</div>';
      return '<div class="hist-evo-delta-val hist-evo-delta-flat">—</div>';
    }

    h += '<div class="hist-evo">';
    h += '<div class="hist-evo-accent" style="background:linear-gradient(90deg,' + gm.color + ',' + gm.color + '44)"></div>';
    h += '<div class="hist-evo-body">';
    h += '<div class="hist-evo-head"><span class="hist-evo-head-icon">📊</span><span class="hist-evo-head-text">Progression</span>' + evoBadge + '</div>';

    // Before → Now comparison (always show)
    const prevHeroIco = heroIcons[prev.top_hero_1] || '';
    const nowHeroIco = heroIcons[results[0].top_hero_1] || '';
    h += '<div class="hist-evo-compare">';
    h += '<div class="hist-evo-side hist-evo-side-prev">';
    h += '<div class="hist-evo-side-label">Before</div>';
    if (prevHeroIco) h += '<img src="' + prevHeroIco + '" style="width:32px;height:32px;border-radius:8px;object-fit:cover;margin:4px auto;display:block;border:1px solid rgba(255,255,255,.08)" loading="lazy" onerror="this.style.display=\'none\'">';
    h += '<div class="hist-evo-side-name">' + (ps.archetype||'—') + '</div>';
    h += '<div class="hist-evo-side-hero">' + (prev.top_hero_1||'—') + '</div>';
    h += '</div>';
    h += '<div class="hist-evo-arrow">→</div>';
    h += '<div class="hist-evo-side hist-evo-side-now">';
    h += '<div class="hist-evo-side-label">Now</div>';
    if (nowHeroIco) h += '<img src="' + nowHeroIco + '" style="width:32px;height:32px;border-radius:8px;object-fit:cover;margin:4px auto;display:block;border:1px solid rgba(77,201,246,.15)" loading="lazy" onerror="this.style.display=\'none\'">';
    h += '<div class="hist-evo-side-name">' + (ls2.archetype||'—') + '</div>';
    h += '<div class="hist-evo-side-hero">' + (results[0].top_hero_1||'—') + '</div>';
    h += '</div>';
    h += '</div>';

    h += '<div class="hist-evo-deltas">';
    h += '<div class="hist-evo-delta hist-evo-delta-agg"><div class="hist-evo-delta-label">Agg</div>' + dv(dA) + '</div>';
    h += '<div class="hist-evo-delta hist-evo-delta-team"><div class="hist-evo-delta-label">Team</div>' + dv(dT) + '</div>';
    h += '<div class="hist-evo-delta hist-evo-delta-mech"><div class="hist-evo-delta-label">Mech</div>' + dv(dM) + '</div>';
    h += '<div class="hist-evo-delta hist-evo-delta-risk"><div class="hist-evo-delta-label">Risk</div>' + dv(dR) + '</div>';
    h += '</div></div></div>';
  }

  // AI Analysis card — Pro only
  if (isPro()) {
    // Check for cached analysis
    let cachedAnalysis = null;
    try {
      const cached = await fetch(SUPABASE_URL + '/rest/v1/ai_analyses?user_id=eq.' + state.user.id + '&game_id=eq.' + ag, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken }
      }).then(r => r.json());
      if (cached.length > 0) cachedAnalysis = cached[0];
    } catch {}

    h += '<div class="hist-ai" id="histAiCard">';
    h += '<div class="hist-ai-accent"></div>';
    h += '<div class="hist-ai-body">';
    h += '<div class="hist-ai-head"><div class="hist-ai-head-icon">✨</div><span class="hist-ai-head-text">AI Coach</span><span class="hist-ai-pro-label">⚡ Pro</span><button class="hist-ai-gen" id="histAiBtn" style="margin-left:auto">' + (cachedAnalysis ? 'Regenerate' : 'Generate Report') + '</button></div>';
    h += '<div class="hist-ai-content" id="histAiContent">';
    if (cachedAnalysis) {
      h += cachedAnalysis.analysis_text;
    } else {
      h += '<span style="font-size:11px;color:#8890a4">Get a personalized coaching report with strengths, weaknesses, hero synergies, and a weekly improvement roadmap.</span>';
    }
    h += '</div></div></div>';
  } else {
    // Blurred locked version
    h += '<div class="hist-ai hist-ai-locked">';
    h += '<div class="hist-ai-accent"></div>';
    h += '<div class="hist-ai-body">';
    h += '<div class="hist-ai-head"><div class="hist-ai-head-icon">✨</div><span class="hist-ai-head-text">AI Coach Analysis</span></div>';
    h += '<div class="hist-ai-content"><p>Your aggressive playstyle with high mechanical skill makes you a natural fit for carry roles. Your shift toward more team-oriented play in recent quizzes suggests you could excel as a flex player.</p><p>Consider exploring heroes that blend aggression with utility to maximize your evolving strengths.</p></div>';
    h += '</div>';
    h += '<div class="hist-ai-lock-overlay"><div class="hist-ai-lock-icon">🔒</div><div class="hist-ai-lock-title">AI Coach Analysis</div><div class="hist-ai-lock-sub">Get personalized coaching insights, strength/weakness breakdowns, hero recommendations, and an improvement roadmap.</div><button class="hist-ai-lock-btn" id="histAiUpgrade">Upgrade to Unlock</button></div>';
    h += '</div>';
  }

  // Cards
  const maxFree = 3;
  const visible = isPro() ? results : results.slice(0, maxFree);
  const hiddenCount = results.length - visible.length;
  const initialShow = 3;

  visible.forEach((r, idx) => {
    const date = new Date(r.created_at);
    const sd = r.score_data || {};
    const heroes = [r.top_hero_1, r.top_hero_2, r.top_hero_3].filter(Boolean);
    const isHidden = idx >= initialShow;
    const isLatest = idx === 0;

    // Badge
    let badge = '';
    if (isLatest) {
      badge = '<span class="hist-card-badge hcb-latest">Latest</span>';
    } else if (idx < results.length - 1) {
      const prev = results[idx + 1]; const ps = prev.score_data || {};
      if (sd.aggression !== undefined && ps.aggression !== undefined) {
        const sh = Math.abs((sd.aggression||50)-(ps.aggression||50))+Math.abs((sd.teamplay||50)-(ps.teamplay||50))+Math.abs((sd.mechanics||50)-(ps.mechanics||50))+Math.abs((sd.risk||50)-(ps.risk||50));
        if (sh >= 40) badge = '<span class="hist-card-badge hcb-major">Major Shift</span>';
        else if (sh >= 15) badge = '<span class="hist-card-badge hcb-shift">Shifted</span>';
        else badge = '<span class="hist-card-badge hcb-stable">Stable</span>';
      }
    } else {
      badge = '<span class="hist-card-badge hcb-first">First</span>';
    }

    if (isHidden && idx === initialShow) h += '<div class="hist-more-wrap" id="histMore_' + ag + '" style="display:none">';

    h += '<div class="hist-card">';
    h += '<div class="hist-card-accent" style="background:' + gm.color + (isLatest ? '' : '66') + '"></div>';
    h += '<div class="hist-card-body">';
    h += '<div class="hist-card-main">';
    h += '<div class="hist-card-archetype">' + (sd.archetype || r.result_name || 'Result') + '</div>';
    if (heroes.length) {
      h += '<div class="hist-card-heroes">';
      heroes.forEach(he => {
        const ico = heroIcons[he];
        h += '<span class="hist-hero-pill">';
        if (ico) h += '<img class="hist-hero-icon" src="' + ico + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
        else h += '<span class="hist-hero-letter">' + he.charAt(0) + '</span>';
        h += he + '</span>';
      });
      h += '</div>';
    }
    if (sd.aggression !== undefined) {
      h += '<div class="hist-card-bars">';
      h += '<div class="hist-minibar hist-mb-agg"><div class="hist-minibar-fill" style="width:' + sd.aggression + '%"></div></div>';
      h += '<div class="hist-minibar hist-mb-team"><div class="hist-minibar-fill" style="width:' + (sd.teamplay||50) + '%"></div></div>';
      h += '<div class="hist-minibar hist-mb-mech"><div class="hist-minibar-fill" style="width:' + (sd.mechanics||50) + '%"></div></div>';
      h += '<div class="hist-minibar hist-mb-risk"><div class="hist-minibar-fill" style="width:' + (sd.risk||50) + '%"></div></div>';
      h += '</div>';
    }
    h += '</div>';
    h += '<div class="hist-card-right">';
    h += '<div class="hist-card-date">' + date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '</div>';
    h += badge;
    h += '</div>';
    h += '</div></div>';
  });

  if (visible.length > initialShow) {
    h += '</div>';
    h += '<button class="hist-show-more" data-target="histMore_' + ag + '">Show ' + (visible.length - initialShow) + ' More ▾</button>';
  }

  if (hiddenCount > 0) {
    h += '<div class="hist-locked"><div class="hist-locked-text">🔒 ' + hiddenCount + ' older result' + (hiddenCount > 1 ? 's' : '') + '</div><button class="pro-unlock-btn histUpgradeBtn" style="font-size:9px;padding:6px 16px">Unlock Full History</button></div>';
  }

  h += '</div>';
  app.innerHTML = h;

  // AI upgrade button (for free users)
  const aiUpBtn = document.getElementById('histAiUpgrade');
  if (aiUpBtn) aiUpBtn.addEventListener('click', () => showUpgradeModal());

  // AI Analysis (Pro users only)
  const aiBtn = document.getElementById('histAiBtn');
  const aiContent = document.getElementById('histAiContent');
  if (aiBtn && aiContent && results.length > 0) {
    aiBtn.addEventListener('click', async () => {
      aiBtn.disabled = true;
      aiBtn.textContent = 'Analyzing...';
      aiContent.innerHTML = '<div class="hist-ai-loading"><div class="hist-ai-dot"></div><div class="hist-ai-dot"></div><div class="hist-ai-dot"></div><span>Deep-analyzing your data...</span></div>';
      await new Promise(r => setTimeout(r, 900 + Math.random() * 700));

      // Load survey
      if (!state._playerSurvey) state._playerSurvey = await fetchPlayerSurvey();

      // ── GATHER DATA ──
      const latest = results[0];
      const ls = latest.score_data || {};
      const agg = ls.aggression||50, team = ls.teamplay||50, mech = ls.mechanics||50, risk = ls.risk||50;
      const heroes = [latest.top_hero_1, latest.top_hero_2, latest.top_hero_3].filter(Boolean);
      const archetype = ls.archetype || latest.result_name || 'Unknown';
      const sv = state._playerSurvey || {};
      const hasSv = !!(sv && sv.skill_level);

      // Averages across all quizzes
      const scores = results.map(r => r.score_data || {});
      const avg = k => Math.round(scores.reduce((s,d) => s + (d[k]||50), 0) / scores.length);
      const avgA = avg('aggression'), avgT = avg('teamplay'), avgM = avg('mechanics'), avgR = avg('risk');

      // Variance (consistency)
      const variance = k => { const m = avg(k); return Math.round(Math.sqrt(scores.reduce((s,d) => s + Math.pow((d[k]||50)-m,2), 0) / scores.length)); };
      const varA = variance('aggression'), varT = variance('teamplay'), varM = variance('mechanics'), varR = variance('risk');
      const mostVolatile = [{n:'Aggression',v:varA},{n:'Teamplay',v:varT},{n:'Mechanics',v:varM},{n:'Risk',v:varR}].sort((a,b)=>b.v-a.v)[0];
      const mostStable = [{n:'Aggression',v:varA},{n:'Teamplay',v:varT},{n:'Mechanics',v:varM},{n:'Risk',v:varR}].sort((a,b)=>a.v-b.v)[0];

      // Trends (first quiz vs latest)
      const oldest = results[results.length - 1].score_data || {};
      const trendA = agg - (oldest.aggression||50), trendT = team - (oldest.teamplay||50);
      const trendM = mech - (oldest.mechanics||50), trendR = risk - (oldest.risk||50);
      const bigTrend = [{n:'Aggression',d:trendA},{n:'Teamplay',d:trendT},{n:'Mechanics',d:trendM},{n:'Risk',d:trendR}].sort((a,b)=>Math.abs(b.d)-Math.abs(a.d))[0];
      const totalShift = Math.abs(trendA)+Math.abs(trendT)+Math.abs(trendM)+Math.abs(trendR);

      // Sorted traits
      const traits = [{n:'Aggression',v:agg,avg:avgA,var:varA,trend:trendA},{n:'Teamplay',v:team,avg:avgT,var:varT,trend:trendT},{n:'Mechanics',v:mech,avg:avgM,var:varM,trend:trendM},{n:'Risk',v:risk,avg:avgR,var:varR,trend:trendR}];
      traits.sort((a,b)=>b.v-a.v);
      const top1 = traits[0], top2 = traits[1], weak1 = traits[3], weak2 = traits[2];

      // Archetypes over time
      const arcList = results.map(r => (r.score_data||{}).archetype).filter(Boolean);
      const uniqueArcs = [...new Set(arcList)];

      // Hero pool analysis
      const allH = results.flatMap(r => [r.top_hero_1,r.top_hero_2,r.top_hero_3].filter(Boolean));
      const hFreq = {}; allH.forEach(h => { hFreq[h] = (hFreq[h]||0) + 1; });
      const topH = Object.entries(hFreq).sort((a,b)=>b[1]-a[1]);
      const uniqueH = Object.keys(hFreq).length;
      const isOTP = topH.length > 0 && topH[0][1] >= results.length * 0.5;

      // Game context
      const gameName = gm.label;
      const gameSpecific = {

        else tip += '<strong>Deliberate practice:</strong> Pick the trait with the most variance in your history (' + mostVolatile.n + ', \u00b1' + mostVolatile.v + ') and work on stabilizing it. Consistency in your ' + mostVolatile.n.toLowerCase() + ' will make every other trait more effective because your team can rely on your baseline.';
        tip += '</p>';
        tip += '<p style="margin-top:8px;font-size:10px;color:#8890a4;font-style:italic">\ud83d\udcdd Take the <strong>Player Survey</strong> in Settings to unlock a personalized 3-step weekly roadmap based on your goals, schedule, and frustrations.</p>';
        out += sec('\ud83d\udca1', "Coach's Tip", tip);
      }

      // ── META FOOTER ──
      const genDate = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      out += '<div class="hist-ai-meta"><span class="hist-ai-meta-text">Generated ' + genDate + ' \u00b7 Based on ' + results.length + ' quiz' + (results.length>1?'es':'') + (hasSv ? ' + survey data' : '') + ' \u00b7 ' + gameName + '</span><span class="hist-ai-meta-badge">AI Coach</span></div>';

      aiContent.innerHTML = out;
      aiBtn.textContent = 'Regenerate';
      aiBtn.disabled = false;

      // Save to DB
      try {
        await fetch(SUPABASE_URL + '/rest/v1/ai_analyses?user_id=eq.' + state.user.id + '&game_id=eq.' + ag, { method: 'DELETE', headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken } }).catch(function(){});
        await fetch(SUPABASE_URL + '/rest/v1/ai_analyses', { method: 'POST', headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, body: JSON.stringify({ user_id: state.user.id, game_id: ag, analysis_text: out, generated_at: new Date().toISOString() }) }).catch(function(){});
      } catch {}
    });
  }


  // History page particles
  spawnPageParticles('histBg', '_histBgCleanup');

  app.querySelectorAll('.hist-tab').forEach(tab => {
    tab.addEventListener('click', () => { state._histGame = tab.dataset.hgame; state._profileHistory = null; renderHistory(app); });
  });
  app.querySelectorAll('.histUpgradeBtn').forEach(b => b.addEventListener('click', () => showUpgradeModal()));
  app.querySelectorAll('.hist-show-more').forEach(btn => {

      if (t) { t.style.display = t.style.display === 'none' ? 'block' : 'none'; btn.textContent = t.style.display === 'block' ? 'Show Less ▴' : 'Show ' + t.querySelectorAll('.hist-card').length + ' More ▾'; }
    });
  });

// PLAYSTYLE EVOLUTION INSIGHT — used on profile page
// ═══════════════════════════════════════════════════════════════════════════
function generateEvolutionInsight(curr, prev, game) {
  const cs = curr.score_data || {};
  const ps = prev.score_data || {};
  const GAME_NAMES = { lol: 'League', overwatch: 'Overwatch', valorant: 'Valorant', r6: 'Rainbow Six', marvel_rivals: 'Marvel Rivals', deadlock: 'Deadlock', identity: 'Gaming Identity' };

  const dAgg = (cs.aggression || 50) - (ps.aggression || 50);
  const dTeam = (cs.teamplay || 50) - (ps.teamplay || 50);
  const dMech = (cs.mechanics || 50) - (ps.mechanics || 50);
  const dRisk = (cs.risk || 50) - (ps.risk || 50);
  const totalShift = Math.abs(dAgg) + Math.abs(dTeam) + Math.abs(dMech) + Math.abs(dRisk);

  const archetypeChanged = cs.archetype !== ps.archetype;
  let magnitude = 'stable', badgeCls = 'hce-stable', badgeText = 'Consistent';
  if (totalShift >= 40 || (archetypeChanged && totalShift >= 20)) { magnitude = 'major'; badgeCls = 'hce-major'; badgeText = 'Major Shift'; }
  else if (totalShift >= 15 || archetypeChanged) { magnitude = 'shift'; badgeCls = 'hce-shift'; badgeText = 'Slight Shift'; }

  // Build a clean visual comparison
  let h = '';

  // Top: badge + one-liner
  const biggest = [
    { name: 'Aggression', d: dAgg }, { name: 'Teamplay', d: dTeam },
    { name: 'Mechanics', d: dMech }, { name: 'Risk', d: dRisk }
  ].sort((a, b) => Math.abs(b.d) - Math.abs(a.d))[0];
  const summary = magnitude === 'stable'
    ? 'Your playstyle has stayed consistent.'
    : biggest.d > 0
      ? biggest.name + ' went up — you\'re playing more aggressively.'
      : biggest.name + ' shifted — your approach is evolving.';

  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  h += '<span style="font-size:14px">📊</span>';
  h += '<span style="font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:#f0f2f7">Evolution</span>';
  h += '<span class="hist-tl-evo ' + badgeCls + '">' + badgeText + '</span>';
  h += '</div>';
  h += '<div style="font-size:11px;color:#9aa3b8;margin-bottom:14px;line-height:1.5">' + summary + '</div>';

  // Archetype change row
  if (archetypeChanged) {
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)">';
    h += '<div style="flex:1;text-align:center"><div style="font-size:7px;letter-spacing:.10em;text-transform:uppercase;color:#6c7590;margin-bottom:3px">Before</div><div style="font-size:12px;font-weight:700;color:#9aa3b8">' + (ps.archetype || '—') + '</div><div style="font-size:9px;color:#6c7590;margin-top:1px">' + (prev.top_hero_1 || '') + '</div></div>';
    h += '<div style="font-size:14px;color:#6c7590">→</div>';
    h += '<div style="flex:1;text-align:center"><div style="font-size:7px;letter-spacing:.10em;text-transform:uppercase;color:#6dd8f8;margin-bottom:3px">Now</div><div style="font-size:12px;font-weight:700;color:#f0f2f7">' + (cs.archetype || '—') + '</div><div style="font-size:9px;color:#6c7590;margin-top:1px">' + (curr.top_hero_1 || '') + '</div></div>';
    h += '</div>';
  }

  // Trait delta bars
  function deltaBar(label, oldVal, newVal, color) {
    const d = newVal - oldVal;
    const arrow = d > 0 ? '↑' : d < 0 ? '↓' : '·';
    const arrowColor = d > 3 ? '#5ee8b0' : d < -3 ? '#f87171' : '#6c7590';
    return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0">' +
      '<span style="width:56px;font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#8890a4">' + label + '</span>' +
      '<div style="flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.06);position:relative;overflow:hidden">' +
      '<div style="position:absolute;left:0;top:0;bottom:0;width:' + oldVal + '%;border-radius:3px;background:rgba(255,255,255,.08)"></div>' +
      '<div style="position:absolute;left:0;top:0;bottom:0;width:' + newVal + '%;border-radius:3px;background:' + color + '"></div>' +
      '</div>' +
      '<span style="width:32px;text-align:right;font-size:9px;font-weight:700;color:' + arrowColor + ';font-family:JetBrains Mono,monospace">' + arrow + Math.abs(d) + '</span>' +
      '</div>';
  }

  h += deltaBar('Agg', ps.aggression||50, cs.aggression||50, 'rgba(248,113,113,.5)');
  h += deltaBar('Team', ps.teamplay||50, cs.teamplay||50, 'rgba(52,211,153,.5)');
  h += deltaBar('Mech', ps.mechanics||50, cs.mechanics||50, 'rgba(77,201,246,.5)');
  h += deltaBar('Risk', ps.risk||50, cs.risk||50, 'rgba(245,166,35,.5)');

  return h;
}

// ── Percentile Calculator ──
async function calcPercentiles(game, traits) {
  // Generate a realistic population distribution per trait based on game tendencies
  // Each game has a different meta — aggression is higher in FPS games, teamplay in MOBAs, etc.
  const gameBias = {
    lol:            { aggMean: 52, teamMean: 55, mechMean: 50, riskMean: 45 },
    overwatch:      { aggMean: 55, teamMean: 52, mechMean: 48, riskMean: 50 },
    valorant:       { aggMean: 48, teamMean: 50, mechMean: 55, riskMean: 42 },
    deadlock:       { aggMean: 54, teamMean: 48, mechMean: 50, riskMean: 52 },
    r6:             { aggMean: 45, teamMean: 58, mechMean: 52, riskMean: 40 },
    marvel_rivals:  { aggMean: 56, teamMean: 50, mechMean: 46, riskMean: 54 },
  };
  const bias = gameBias[game] || { aggMean: 50, teamMean: 50, mechMean: 50, riskMean: 50 };
  const stdDev = 16; // Realistic spread

  // Seed RNG with game name for consistent results per game
  let seed = 0;
  for (let i = 0; i < (game || 'x').length; i++) seed += (game || 'x').charCodeAt(i) * (i + 1);
  function seededRandom() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

  // Generate 200 simulated players
  function gaussian(mean) {
    const u1 = seededRandom() || 0.001;
    const u2 = seededRandom();
    const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    return Math.max(5, Math.min(95, Math.round(mean + z * stdDev)));
  }

  const pop = { aggression: [], teamplay: [], mechanics: [], risk: [] };
  for (let i = 0; i < 200; i++) {
    pop.aggression.push(gaussian(bias.aggMean));
    pop.teamplay.push(gaussian(bias.teamMean));
    pop.mechanics.push(gaussian(bias.mechMean));
    pop.risk.push(gaussian(bias.riskMean));
  }

  function pct(arr, val) {
    const below = arr.filter(v => v < val).length;
    return Math.round((below / arr.length) * 100);
  }

  return {
    aggression: pct(pop.aggression, traits.aggression),
    teamplay: pct(pop.teamplay, traits.teamplay),
    mechanics: pct(pop.mechanics, traits.mechanics),
    risk: pct(pop.risk, traits.risk),
    sampleSize: 200
  };
}

// ── Bio Editor Modal ──
function showBioEditor(currentBio) {
  if (document.getElementById('bioOverlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'bioOverlay';
  overlay.className = 'bio-overlay';
  overlay.innerHTML = `
    <div class="bio-card">
      <div class="bio-card-title">Edit Your Bio</div>
      <textarea class="bio-textarea" id="bioInput" placeholder="Tell people about yourself, your playstyle, your favorite games..." maxlength="200">${currentBio.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
      <div class="bio-char-count"><span id="bioCharCount">${currentBio.length}</span>/200</div>
      <button class="bio-save" id="bioSave">Save Bio</button>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);

  const inp = document.getElementById('bioInput');
  const counter = document.getElementById('bioCharCount');
  if (inp) {
    inp.focus();
    inp.addEventListener('input', () => { if (counter) counter.textContent = inp.value.length; });
  }
  document.getElementById('bioSave')?.addEventListener('click', async () => {
    const bio = (inp?.value || '').trim().slice(0, 200);
    const btn = document.getElementById('bioSave');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    await fetch(SUPABASE_URL + '/rest/v1/user_profiles?user_id=eq.' + state.user.id, {
      method: 'PATCH', headers: { ...sbAuthHeaders(), 'Prefer': 'return=minimal' },
      body: JSON.stringify({ bio: bio })
    });
    overlay.remove();
    // Refresh the profile page
    const app = document.getElementById('app');
    if (state.screen === 'user-profile') renderUserProfile(app);
    else if (state.screen === 'profile') { state._profileHistory = null; renderProfile(app); }
  });
}

const SOC_GAME_META = {
  lol:{icon:'⚔️',label:'League',color:'#c8a44e'},overwatch:{icon:'🎯',label:'Overwatch',color:'#f0962a'},
  valorant:{icon:'💢',label:'Valorant',color:'#fd4556'},deadlock:{icon:'🔫',label:'Deadlock',color:'#e8734a'},
  r6:{icon:'🛡️',label:'R6 Siege',color:'#5aaddb'},marvel_rivals:{icon:'🦸',label:'Marvel Rivals',color:'#C41E3A'},
  identity:{icon:'🧬',label:'Identity',color:'#a78bfa'}
};

async function socFetch(path, opts = {}) {
  const headers = { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + (state.accessToken || SUPABASE_ANON), 'Content-Type': 'application/json', ...opts.headers };
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { ...opts, headers });
  if (!res.ok) return [];
  if (opts.method === 'DELETE' || opts.method === 'PATCH' || opts.method === 'POST') {
    try { return await res.json(); } catch { return true; }
  }
  return await res.json();
}

// Batch-fetch user profiles and cache them
async function socFetchProfiles(userIds) {
  const missing = [...new Set(userIds)].filter(id => id && !state._socProfiles[id]);
  if (missing.length > 0) {
    const rows = await socFetch('user_profiles?user_id=in.(' + missing.join(',') + ')&select=user_id,avatar,display_name,email,username,subscription_tier,subscription_since');
    rows.forEach(r => {
      state._socProfiles[r.user_id] = { avatar: r.avatar || '🎮', name: r.username || r.display_name || (r.email ? r.email.split('@')[0] : ''), username: r.username || '', email: r.email || '', tier: r.subscription_tier || 'free', since: r.subscription_since || null };
    });
    missing.forEach(id => { if (!state._socProfiles[id]) state._socProfiles[id] = { avatar: '🎮', name: 'Player', username: '', email: '', tier: 'free', since: null }; });
  }
}

function socProfileName(userId) {
  const p = state._socProfiles[userId];
  if (p && p.username) return p.username;
  if (p && p.name) return p.name;
  return 'Player';
}
function socProfileAvatar(userId) { return (state._socProfiles[userId] || {}).avatar || '🎮'; }
function socProfileIsPro(userId) { const p = state._socProfiles[userId]; return p && (p.tier === 'elite' || p.tier === 'legend' || p.tier === 'pro'); }
function socProfileBadge(userId) {
  const p = state._socProfiles[userId];
  if (!p) return '';
  return tierBadgeHTML(p.tier, p.since, true);
}

function socTimeAgo(ts) {
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago'; return Math.floor(s/86400) + 'd ago';
}

  html += '<div class="social-hdr"><div class="social-title"><span class="fmd-brand">FindMyDuo</span><span class="fmd-sub" style="font-weight:800;color:' + (isLounge ? '#f5c161' : '#c4b5fd') + '">' + (isLounge ? 'The Lounge' : 'Community Chat') + '</span></div>';
  html += '<div class="social-tabs">';
  html += '<div class="social-tab' + (tab === 'feed' ? ' active' : '') + '" data-soctab="feed">Feed</div>';
  html += '<div class="social-tab' + (tab === 'friends' ? ' active' : '') + '" data-soctab="friends">Friends</div>';
  html += '<div class="social-tab' + (tab === 'trending' ? ' active' : '') + '" data-soctab="trending">🔥 Trending</div>';
  html += '<div class="social-tab st-dm' + (tab === 'dms' ? ' active' : '') + '" data-soctab="dms">DMs<span class="dm-badge' + (unreadCount > 0 ? ' visible' : '') + '">' + unreadCount + '</span></div>';
  html += '</div></div>';

  else if (tab === 'trending') html += await socRenderTrending();

  app.querySelectorAll('.social-tab').forEach(t => t.addEventListener('click', () => {

  else if (tab === 'friends') socAttachFriendEvents(app);
  else if (tab === 'dms') socAttachDmEvents(app);
}

// ═══ FEED ═══
async function socRenderFeed() {
  const filter = state._socFeedFilter || 'all';

  // Lounge: subscriber-only — show gate for free users
  if (filter === 'lounge' && !isPro()) {
    let h = '';
    h += '<div class="soc-lounge-lock">';
    h += '<div class="soc-lounge-lock-icon">🔱</div>';
    h += '<div class="soc-lounge-lock-title">Subscribers Only</div>';
    h += '<div class="soc-lounge-lock-sub">The Lounge is an exclusive chat for Elite and Legend members. Upgrade to join the conversation with other dedicated players.</div>';
    h += '<button class="soc-lounge-cta" id="socLoungeCta">Upgrade to Join</button>';
    h += '</div>';
    return h;
  }

  let query = 'social_posts?select=*&order=created_at.desc&limit=30';
  if (filter === 'all') {
    query += '&or=(game.is.null,game.eq.)';
  } else if (filter === 'lounge') {
    query += '&game=eq.lounge';
  } else {
    query += '&game=eq.' + filter;
  }
  const posts = await socFetch(query);
  const userIds = posts.map(p => p.user_id);
  // Fetch likes for all posts
  const postIds = posts.map(p => p.id);
  let allLikes = [];
  if (postIds.length > 0) allLikes = await socFetch('social_likes?post_id=in.(' + postIds.join(',') + ')&select=post_id,user_id');
  const likeMap = {}; const myLikes = {};
  allLikes.forEach(l => { likeMap[l.post_id] = (likeMap[l.post_id] || 0) + 1; if (l.user_id === state.user.id) myLikes[l.post_id] = true; });

  // Fetch polls linked to posts
  var linkedPolls = {};
  var linkedPollVotes = {};
  var linkedPollUpvotes = {};
  if (postIds.length > 0) {
    try {
      var pollRows = await socFetch('community_polls?post_id=in.(' + postIds.join(',') + ')&select=*');
      pollRows.forEach(function(p) { linkedPolls[p.post_id] = p; });
      if (pollRows.length > 0) {
        var pollIds = pollRows.map(function(p) { return p.id; });
        var voteRows = await socFetch('poll_votes?poll_id=in.(' + pollIds.join(',') + ')&select=*');
        voteRows.forEach(function(v) { if (!linkedPollVotes[v.poll_id]) linkedPollVotes[v.poll_id] = []; linkedPollVotes[v.poll_id].push(v); });
        var upRows = await socFetch('poll_upvotes?poll_id=in.(' + pollIds.join(',') + ')&select=*');
        upRows.forEach(function(u) { if (!linkedPollUpvotes[u.poll_id]) linkedPollUpvotes[u.poll_id] = []; linkedPollUpvotes[u.poll_id].push(u); });
      }
    } catch(e) {}
  }
  // Fetch comment counts
  let allComments = [];
  if (postIds.length > 0) allComments = await socFetch('social_comments?post_id=in.(' + postIds.join(',') + ')&select=post_id');
  const commentCountMap = {};
  allComments.forEach(c => { commentCountMap[c.post_id] = (commentCountMap[c.post_id] || 0) + 1; });
  await socFetchProfiles(userIds);

  // Batch fetch streaks for all post authors
  if (userIds.length > 0) {
    try {
      const streakRows = await socFetch('user_streaks?user_id=in.(' + [...new Set(userIds)].join(',') + ')&select=user_id,flame_level,current_streak');
      if (!state._streakCache) state._streakCache = {};
      streakRows.forEach(s => { state._streakCache[s.user_id] = s; });
    } catch {}
  }

  // Get latest quiz result for share-attach
  let latestQuiz = null;
  try {
    const qr = await socFetch('user_quiz_results?user_id=eq.' + state.user.id + '&order=created_at.desc&limit=1');
    if (qr.length > 0) latestQuiz = qr[0];
  } catch {}

  let h = '';
  // Composer
  const av = state._userAvatar || '🎮';
  h += '<div class="soc-composer">';
  h += '<div class="soc-composer-row"><div class="soc-composer-avatar">' + av + '</div>';
  const composerPlaceholder = filter === 'all' ? 'What\'s on your mind?' : filter === 'lounge' ? 'Chat with fellow subscribers...' : 'Say something about ' + ((SOC_GAME_META[filter] || {}).label || filter) + '...';
  h += '<textarea class="soc-composer-input" id="socPostInput" placeholder="' + composerPlaceholder + '" rows="2"></textarea></div>';
  h += '<div class="soc-composer-actions">';
  if (latestQuiz) h += '<button class="soc-share-toggle' + (state._socShareQuiz ? ' active' : '') + '" id="socShareToggle">📊 Attach Result</button>';
  h += '<button class="gif-btn" id="gifToggle">GIF</button>';
  if (isPro()) {
    h += '<button class="poll-compose-toggle" id="pollComposeToggle">📊 Poll</button>';
  } else {
    h += '<button class="poll-compose-toggle" id="pollComposeLocked" style="opacity:.5">📊 Poll 🔒</button>';
  }
  h += '<span style="font-size:8px;color:#5c6478;margin-left:4px">Enter to post</span>';
  h += '<button class="soc-post-btn" id="socPostBtn">Post</button></div>';
  h += '<div id="gifPreview"></div>';
  if (isPro()) {
    h += '<div class="poll-compose-opts" id="pollComposeOpts">';
    h += '<div class="poll-compose-opt"><input class="poll-opt-inp" placeholder="Option 1" maxlength="50"></div>';
    h += '<div class="poll-compose-opt"><input class="poll-opt-inp" placeholder="Option 2" maxlength="50"></div>';
    h += '<div class="poll-compose-add" id="pollComposeAdd">+ Add Option (max 4)</div>';
    h += '</div>';
  }

  h += '<div class="soc-filter-wrap">';
  h += '<button class="soc-filter-btn" id="socFilterBtn">' + activeFilterLabel + ' <span class="soc-fb-arrow">▾</span></button>';
  h += '<div class="soc-filter-dropdown" id="socFilterDrop">';

  });
  h += '</div></div>';
  h += '<button class="soc-lounge-btn' + (filter === 'lounge' ? ' active' : '') + '" id="socLoungeBtn">🔱 The Lounge' + (isPro() ? '' : ' <span class="soc-lounge-lock-ico">🔒</span>') + '</button>';
  h += '</div>';

  if (posts.length === 0) {
    if (filter === 'lounge') {
      h += '<div class="soc-empty" style="padding:30px 20px"><div style="font-size:20px;margin-bottom:8px">🔱</div>Welcome to The Lounge. Start a conversation with fellow subscribers.</div>';
    } else {
      h += '<div class="soc-empty">No posts yet. Be the first to share!</div>';
    }
  }

  posts.forEach(p => {
