  background:rgba(255,70,85,.06);border:1px solid rgba(255,70,85,.15);
}
.val-agent-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:14px;
  padding:14px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;
  gap:5px;position:relative;overflow:hidden;cursor:pointer;
  transition:all .35s cubic-bezier(.22,1,.36,1);
  opacity:0;transform:translateY(12px);
  box-shadow:var(--card-shadow);
}
.val-agent-card.visible{opacity:1;transform:translateY(0)}
.val-agent-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.4;
  background:linear-gradient(90deg,transparent,#fd4556,transparent);
}
.val-agent-card:hover{border-color:rgba(253,69,86,.25);transform:translateY(-4px) scale(1.02);box-shadow:var(--card-hover-shadow)}
.val-agent-card:hover.visible{transform:translateY(-4px) scale(1.02)}
.val-agent-card .pod-img,.val-agent-card .ow-portrait-wrap.pod-img{
  width:48px!important;height:48px!important;border-radius:10px!important;margin:0!important;
}
.val-agent-card .ow-avatar-fb.pod-img{
  width:48px!important;height:48px!important;border-radius:10px!important;margin:0!important;
  font-size:14px!important;
}
.val-agent-name{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;
}
.val-agent-score{
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--val-red);
}
.val-agent-score-sub{
  font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:-3px;
}
.val-agent-details{
  font-size:8px;color:var(--txt3);font-family:'Chakra Petch',monospace;
  letter-spacing:.04em;transition:color .2s;
}
.val-agent-card:hover .val-agent-details{color:var(--txt)}
.val-agent-card.radar-active{border-color:rgba(255,70,85,.40);box-shadow:0 0 16px rgba(255,70,85,.10)}

.no-results-msg{text-align:center;padding:20px;color:var(--txt2);font-size:12px;font-style:italic}

/* ── Playstyle Preference Scale ── */
.playstyle-wrap{animation:fadeUp .35s ease both}
.playstyle-title{font-family:'Syne',sans-serif;font-size:clamp(20px,5vw,26px);font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:2px}
.playstyle-sub{font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;color:var(--txt2);line-height:1.45;margin-bottom:6px}
.ps-intro{font-size:11px;color:var(--txt3);margin-bottom:22px;line-height:1.5}

/* Slider block */
.ps-sliders-block{
  background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
  padding:24px 22px 18px;margin-bottom:24px;
}
/* Individual row */
.ps-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ps-row:last-child{border-bottom:none;padding-bottom:6px}
.ps-row-left,.ps-row-right{
  display:flex;align-items:center;gap:5px;min-width:85px;
  font-size:12px;font-weight:600;color:var(--txt3);opacity:.55;
  transition:color .2s,opacity .2s;white-space:nowrap;
}
.ps-row-left{justify-content:flex-end}
.ps-row-left span,.ps-row-right span{font-size:12px}
.ps-row-left.ps-lit,.ps-row-right.ps-lit{color:#f0f2f7;opacity:1}
.ps-row-track{flex:1;min-width:0}
.ps-slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:3px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,rgba(77,201,246,.12) 0%,rgba(255,255,255,.06) 50%,rgba(167,139,250,.12) 100%);
}
.ps-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:24px;height:24px;
  border-radius:50%;border:2.5px solid rgba(255,255,255,.15);
  background:var(--bg2);cursor:pointer;
  transition:border-color .2s,box-shadow .2s,transform .15s;
}
.ps-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.ps-slider.ps-moved::-webkit-slider-thumb{border-color:rgba(77,201,246,.5);box-shadow:0 0 10px rgba(77,201,246,.2)}
.ps-slider::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);
  background:var(--bg2);cursor:pointer;
}
.ps-slider.ps-moved::-moz-range-thumb{border-color:rgba(77,201,246,.5)}

/* Finalize button */
.ps-finalize-area{text-align:center}
.ps-finalize-hint{font-size:9px;color:var(--txt3);margin-bottom:10px;font-weight:500}
.finalize-btn{
  width:100%;padding:16px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--cyan) 0%,var(--purple) 100%);
  color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.04em;cursor:pointer;
  transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .3s;
  animation:btnGlow 3s ease infinite;
}
.finalize-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(77,201,246,.25),0 0 0 1px rgba(77,201,246,.1)}
.finalize-btn:active{transform:translateY(0);animation:none}

@media(max-width:480px){
  .ps-row-left,.ps-row-right{min-width:62px;font-size:10px}
  .ps-row{gap:8px;padding:12px 0}
  .ps-sliders-block{padding:18px 14px 12px}
}

/* ── Error ── */
.err-msg{color:var(--red);font-size:13px;margin-bottom:16px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--txt3)}

/* ══════════════════════════════════════════════════════════════
   RESULTS PAGE — Radar + Trophy Podium
   ══════════════════════════════════════════════════════════════ */
.results-wrap{width:100%;margin:0 auto}

/* Side-by-side layout for radar + best role */
.results-top-row{
  display:grid;grid-template-columns:1fr 1fr;gap:var(--section-gap);margin-bottom:var(--section-gap);
  align-items:stretch;
}
@media(max-width:800px){.results-top-row{grid-template-columns:1fr;gap:var(--card-gap)}}
.results-top-row .radar-hero-section{margin-bottom:0}
.results-top-row .best-role-section{margin-bottom:0;display:flex;flex-direction:column;justify-content:center}

/* ── Your Best Role Recommendation ── */
.best-role-section{
  background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
  padding:20px 28px;margin-bottom:var(--section-gap);text-align:center;position:relative;overflow:hidden;
  box-shadow:var(--card-shadow);
}
.best-role-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.best-role-section.br-lol::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.best-role-section.br-ow::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.best-role-section.br-dl::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.best-role-section.br-val::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.br-label{
  font-size:8px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;
  color:var(--txt3);margin-bottom:10px;
}
.br-main{display:flex;flex-direction:column;align-items:center;gap:4px}
.br-icon{font-size:32px;line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.br-name{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:.02em;text-transform:uppercase;
}
.br-lol .br-name{color:var(--lol-gold)}
.br-ow .br-name{color:#C8AA6E}
.br-dl .br-name{color:#C8AA6E}
.br-val .br-name{color:#C8AA6E}
.br-desc{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;
  color:var(--txt2);line-height:1.55;max-width:420px;margin:0 auto;
}
@media(max-width:500px){
  .best-role-section{padding:14px 16px}
  .br-name{font-size:17px}
  .br-desc{font-size:11px}
}

/* ── Radar Hero Section (top, centered) ── */
.radar-hero-section{
  background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
  padding:24px;margin-bottom:var(--section-gap);text-align:center;position:relative;overflow:hidden;
  box-shadow:var(--card-shadow);
}
.radar-hero-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);
}
.radar-hero-section .radar-panel-title{text-align:center;margin-bottom:4px;font-size:10px}
.radar-hero-section .radar-svg{max-width:280px}
.radar-hero-section .radar-legend{margin-top:6px;margin-bottom:0}
/* Interactive radar updates */
.radar-hero-section .radar-svg{transition:opacity .3s ease,transform .3s ease}
.radar-hero-section.radar-updating .radar-svg{opacity:.2;transform:scale(.97)}
.radar-reset-btn{
  display:none;margin:10px auto 0;padding:5px 16px;border-radius:6px;
  font-family:'Chakra Petch',monospace;font-size:8px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  color:var(--txt2);cursor:pointer;transition:all .25s cubic-bezier(.22,1,.36,1);
}
.radar-reset-btn.visible{display:inline-block;animation:fadeIn .3s ease}
.radar-reset-btn:hover{background:rgba(255,255,255,.07);color:#fff;border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.2)}
/* Active card ring when selected for radar comparison */
.pod-card.radar-active{border-color:rgba(77,201,246,.35);box-shadow:0 0 20px rgba(77,201,246,.08)}
.dl-results .pod-card.radar-active{border-color:rgba(200,155,60,.35);box-shadow:0 0 20px rgba(200,155,60,.08)}
.ow-results .pod-card.radar-active{border-color:rgba(200,155,60,.35);box-shadow:0 0 20px rgba(200,155,60,.08)}
.ow-reveal-row.radar-active{background:rgba(255,255,255,.05);border-color:rgba(249,158,26,.20)}
.role-disc-card.radar-active{border-color:rgba(77,201,246,.30);box-shadow:0 0 16px rgba(77,201,246,.06)}
.lol-lane-card.radar-active{border-color:rgba(200,155,60,.40);box-shadow:0 0 24px rgba(200,155,60,.14)}

/* ── Trophy Podium ── */
.podium{
  display:grid;grid-template-columns:1fr 1.18fr 1fr;gap:var(--card-gap);
  align-items:end;margin-bottom:var(--section-gap);
}

  .podium{grid-template-columns:1fr;align-items:stretch}
  .pod-card{order:0!important}
  .pod-card.gold{order:-1!important}
}

.pod-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:16px;
  padding:16px;text-align:center;position:relative;overflow:hidden;
  opacity:0;transform:translateY(16px);
  transition:all .4s cubic-bezier(.22,1,.36,1);cursor:pointer;
  box-shadow:var(--card-shadow);
}
.pod-card:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:var(--card-hover-shadow);
}
.pod-card.visible{opacity:1;transform:translateY(0)}
.pod-card:hover.visible{transform:translateY(-4px) scale(1.02)}

/* Gold — #1 */
.pod-card.gold{
  padding:20px 16px 18px;border-color:rgba(77,201,246,.25);
  background:linear-gradient(180deg,rgba(77,201,246,.04) 0%,var(--card-bg) 40%);
}
.pod-card.gold::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
}
.pod-card.gold .pod-medal{font-size:28px}
.pod-card.gold .pod-img{width:72px;height:72px;border:2px solid var(--cyan);box-shadow:0 0 20px rgba(77,201,246,.15)}
.pod-card.gold .pod-name{font-size:20px}
.pod-card.gold .pod-score{font-size:34px;color:var(--cyan)}
.pod-card.gold:hover{border-color:rgba(77,201,246,.40);box-shadow:var(--card-hover-shadow),0 0 30px rgba(77,201,246,.06)}

/* Silver — #2 */
.pod-card.silver{order:-1;border-color:rgba(167,139,250,.25)}
.pod-card.silver::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.6;
}
.pod-card.silver .pod-medal{font-size:22px}
.pod-card.silver .pod-img{width:56px;height:56px;border:2px solid var(--purple)}
.pod-card.silver .pod-score{color:var(--purple)}

.lol-results .radar-hero-section::after{
  content:'';position:absolute;
  width:340px;height:340px;top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;z-index:0;

  border:1.5px solid rgba(200,155,60,.08);

  box-shadow:

    0 0 80px rgba(200,155,60,.025),

  animation:lolRuneSpin 90s linear infinite;
}

.lol-results .radar-hero-section .radar-panel-title::before{
  content:'';position:absolute;
  width:220px;height:220px;top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;z-index:0;
  border:1px solid rgba(10,200,185,.05);
  background:repeating-conic-gradient(from 15deg, rgba(10,200,185,.015) 0deg 10deg, transparent 10deg 20deg);
  animation:lolRuneSpin 70s linear infinite reverse;
}
@keyframes lolRuneSpin{
  from{transform:translate(-50%,-50%) rotate(0deg)}
  to  {transform:translate(-50%,-50%) rotate(360deg)}
}

/* ── LAYER 5: Nexus glow behind podium ── */
.lol-results .podium{position:relative}

/* ══════════════════════════════════════════════════════════════
   OVERWATCH PORTRAITS — wrapper + role-tinted initials fallback
   ══════════════════════════════════════════════════════════════ */
/* Wrapper: positions img over fallback initials */
.ow-portrait-wrap{
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.ow-portrait-wrap.pod-img{
  width:72px;height:72px;border-radius:10px;margin:0 auto 8px;
}
.ow-portrait-wrap.gc-img{
  width:40px;height:40px;border-radius:7px;flex-shrink:0;
}
.ow-portrait-img{
  position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;z-index:1;
}
/* Initials fallback — sits behind the portrait img */
.ow-avatar-fb{
  display:flex;align-items:center;justify-content:center;width:100%;height:100%;
  font-family:'Chakra Petch',monospace;font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.5);letter-spacing:.04em;border-radius:inherit;
}
.ow-portrait-wrap.pod-img .ow-avatar-fb{font-size:20px}
.ow-portrait-wrap.gc-img .ow-avatar-fb{font-size:13px}
.ow-portrait-wrap.role-disc-img .ow-avatar-fb{font-size:16px}
.ow-portrait-wrap.role-disc-img{border-radius:50%}
/* Standalone fallback (no portrait available) */
.ow-avatar-fb.pod-img{
  width:72px;height:72px;border-radius:10px;font-size:20px;margin:0 auto 8px;
}
.ow-avatar-fb.gc-img{
  width:40px;height:40px;border-radius:7px;font-size:13px;flex-shrink:0;
}
/* ── R6 Operator Badge — hexagonal badge with role coloring ── */
.r6-badge{
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.6);letter-spacing:.06em;
  clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 75%,75% 100%,25% 100%,0% 75%,0% 25%);
  position:relative;
}
.r6-badge::after{
  content:'';position:absolute;inset:2px;
  clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 75%,75% 100%,25% 100%,0% 75%,0% 25%);
  border:1px solid rgba(255,255,255,.08);pointer-events:none;
}
.r6-badge.r6-atk{background:linear-gradient(135deg,#1a3a60,#2a5a8a,#1a3a60)}
.r6-badge.r6-def{background:linear-gradient(135deg,#4a3520,#6a5030,#4a3520)}
.r6-badge.pod-img{width:72px;height:72px;font-size:20px;margin:0 auto 8px}
.r6-badge.lol-lane-img,.r6-badge.val-agent-img{width:48px;height:48px;font-size:14px}
.r6-badge.ow-reveal-img,.r6-badge.role-disc-img{width:52px;height:52px;font-size:16px}
/* R6 badge inside portrait wrap — CDN image overlays the badge */
.ow-portrait-wrap .r6-badge{width:100%;height:100%}
.ow-portrait-wrap .r6-badge + .ow-portrait-img{
  clip-path:polygon(25% 0%,75% 0%,100% 25%,100% 75%,75% 100%,25% 100%,0% 75%,0% 25%);

/* OW role section portraits */

}

window.addEventListener('beforeinstallprompt', function(e) {

});

function showInstallBanner() {

      _deferredInstallPrompt.prompt();
      _deferredInstallPrompt.userChoice.then(function() { _deferredInstallPrompt = null; b.remove(); });
    });

    // iOS — show manual instructions with share icon
    b.innerHTML = '<div class="pwa-banner-content"><div class="pwa-banner-icon">\u{1f3ae}</div><div class="pwa-banner-text"><div class="pwa-banner-title">Install FindMyMain</div><div class="pwa-banner-sub">Tap <svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle;margin:0 2px" fill="none" stroke="#4dc9f6" stroke-width="2" stroke-linecap="round"><path d="M12 3v12M5 10l7-7 7 7"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg> then <strong style="color:#f0f2f7">Add to Home Screen</strong></div></div></div><div class="pwa-banner-btns"><button class="pwa-banner-dismiss" id="pwaBtnDismiss">Got it</button></div>';
    document.body.appendChild(b);

// LOL: EXPANDED VECTOR MAPPING FROM RIOT API DATA
// Maps champion tags + info stats into 30-dim space
// ═══════════════════════════════════════════════════════════════════════════
function lolToVector(champ) {
  const tags = (champ.tags || []).map(t => t.toLowerCase());
  const info = champ.info || {};
  const atk = (info.attack || 5) / 10;
  const def = (info.defense || 5) / 10;
  const mag = (info.magic || 5) / 10;
  const dif = (info.difficulty || 5) / 10;

  const isAssassin = tags.includes('assassin');
  const isMage = tags.includes('mage');
  const isSupport = tags.includes('support');
  const isTank = tags.includes('tank');
  const isFighter = tags.includes('fighter');
  const isMarksman = tags.includes('marksman');

  // Tag-specific base profiles, then fine-tuned by info stats
  const v = new Array(30).fill(0);

  // 0: aggression
  v[0] = isAssassin ? 0.88 + atk*0.1 : isFighter ? 0.7 + atk*0.15 : isMarksman ? 0.55 + atk*0.1 : isMage ? 0.45 + mag*0.15 : isSupport ? 0.2 + atk*0.1 : def*0.3 + atk*0.4;

  // 1: burst_window
  v[1] = isAssassin ? 0.85 + mag*0.08 : isMage ? 0.6 + mag*0.2 : isMarksman ? 0.35 + atk*0.2 : isFighter ? 0.4 + atk*0.2 : isSupport ? 0.15 : def*0.2;

  // 2: dps_ramp
  v[2] = isMarksman ? 0.8 + atk*0.15 : isFighter ? 0.6 + atk*0.2 : isMage ? 0.4 + mag*0.15 : isAssassin ? 0.2 : isSupport ? 0.25 : def*0.3 + atk*0.3;

  // 3: front_to_back
  v[3] = isTank ? 0.9 : isFighter ? 0.7 + def*0.15 : isSupport ? 0.4 + def*0.2 : isAssassin ? 0.15 : isMarksman ? 0.1 : isMage ? 0.3 : 0.35;

  // 4: backline_access
  v[4] = isAssassin ? 0.9 + dif*0.08 : isFighter ? 0.3 + atk*0.2 : isMage ? 0.25 + mag*0.1 : isMarksman ? 0.15 : isSupport ? 0.1 : 0.2;

  // 5: anti_tank
  v[5] = isMarksman ? 0.6 + atk*0.2 : isAssassin ? 0.25 + atk*0.2 : isMage ? 0.4 + mag*0.2 : isFighter ? 0.55 + atk*0.15 : isSupport ? 0.2 : 0.3;

  // 6: waveclear
  v[6] = isMage ? 0.65 + mag*0.2 : isMarksman ? 0.55 + atk*0.2 : isFighter ? 0.5 + atk*0.1 : isAssassin ? 0.3 : isSupport ? 0.3 : def*0.2 + atk*0.2;

  // 7: objective_ctrl
  v[7] = isTank ? 0.65 : isFighter ? 0.6 + atk*0.15 : isMarksman ? 0.55 + atk*0.15 : isMage ? 0.5 + mag*0.1 : isSupport ? 0.5 : isAssassin ? 0.3 : 0.4;

  // 8: sustain
  v[8] = isTank ? 0.75 + def*0.2 : isFighter ? 0.6 + def*0.15 : isSupport && tags.includes('support') ? 0.5 + mag*0.1 : isMarksman ? 0.25 : isMage ? 0.3 : isAssassin ? 0.15 + atk*0.1 : 0.4;

  // 9: mobility
  v[9] = isAssassin ? 0.85 + dif*0.08 : isFighter ? 0.45 + atk*0.15 : isMage ? 0.35 + dif*0.1 : isMarksman ? 0.4 + atk*0.1 : isSupport ? 0.35 + dif*0.1 : def*0.2;

  // 10: durability
  v[10] = isTank ? 0.9 + def*0.08 : isFighter ? 0.6 + def*0.25 : isSupport ? 0.4 + def*0.2 : isMage ? 0.3 + def*0.15 : isMarksman ? 0.2 + def*0.1 : isAssassin ? 0.2 + def*0.1 : def*0.7;

  // 11: peel_strength
  v[11] = isSupport ? 0.85 + mag*0.1 : isTank ? 0.55 + def*0.15 : isMage && mag > 0.7 ? 0.4 : isFighter ? 0.3 : 0.1;

  // 12: patience_req
  v[12] = isMarksman ? 0.7 + def*0.1 : isTank ? 0.65 + def*0.1 : isMage && mag > 0.6 ? 0.6 : isSupport ? 0.55 : isFighter ? 0.35 : isAssassin ? 0.25 : 0.4;

  // 13: confidence_scale
  v[13] = isAssassin ? 0.75 + dif*0.2 : isMage && dif > 0.6 ? 0.7 + dif*0.15 : isFighter && dif > 0.5 ? 0.55 : isMarksman ? 0.6 + dif*0.15 : isSupport ? 0.4 : def*0.3 + 0.2;

  // 14: tilt_risk
  v[14] = isAssassin ? 0.8 + dif*0.15 : isMage && dif > 0.7 ? 0.75 + dif*0.1 : isFighter && dif > 0.6 ? 0.55 : isMarksman ? 0.5 + dif*0.1 : isSupport ? 0.25 : def*0.2 + 0.15;

  // 15: carry_agency
  v[15] = isAssassin ? 0.85 + atk*0.1 : isMarksman ? 0.75 + atk*0.15 : isMage ? 0.65 + mag*0.2 : isFighter ? 0.6 + atk*0.15 : isSupport ? 0.1 : isTank ? 0.2 : 0.35;

  // 16: forgiveness
  v[16] = isTank ? 0.8 + def*0.15 : isFighter && def > 0.5 ? 0.6 + def*0.2 : isSupport ? 0.55 + def*0.1 : isMarksman ? 0.3 : isMage ? 0.35 : isAssassin ? 0.1 : 0.4;

  // 17: punish_severity
  v[17] = isAssassin ? 0.85 + dif*0.1 : isMage && dif > 0.7 ? 0.7 + dif*0.1 : isMarksman ? 0.6 + dif*0.1 : isFighter ? 0.4 : isSupport ? 0.3 : def*0.2;

  // 18: input_density
  v[18] = isAssassin ? 0.7 + dif*0.25 : isMage ? 0.5 + dif*0.3 : isFighter ? 0.4 + dif*0.25 : isMarksman ? 0.45 + dif*0.2 : isSupport ? 0.3 + dif*0.2 : def*0.3 + dif*0.2;

  // 19: combo_strictness
  v[19] = isAssassin ? 0.7 + dif*0.25 : isMage && dif > 0.6 ? 0.65 + dif*0.2 : isFighter && dif > 0.5 ? 0.45 + dif*0.2 : isMarksman ? 0.3 + dif*0.15 : isSupport ? 0.25 + dif*0.15 : 0.2;

  // 20: positioning_req
  v[20] = isMarksman ? 0.9 + dif*0.08 : isAssassin ? 0.65 + dif*0.2 : isMage ? 0.6 + dif*0.15 : isSupport ? 0.5 + dif*0.1 : isFighter ? 0.35 : isTank ? 0.2 : 0.4;

  // 21: anim_cancel
  v[21] = isAssassin ? 0.6 + dif*0.3 : isMage && dif > 0.7 ? 0.5 + dif*0.2 : isFighter && dif > 0.6 ? 0.55 + dif*0.2 : isMarksman ? 0.45 + dif*0.2 : 0.2 + dif*0.15;

  // 22: skillshot_reliance
  v[22] = isMage ? 0.55 + dif*0.25 : isAssassin && dif > 0.6 ? 0.5 + dif*0.2 : isSupport ? 0.45 + dif*0.15 : isMarksman ? 0.4 + dif*0.15 : 0.2 + dif*0.1;

  // 23: draft_flex
  v[23] = isFighter ? 0.7 + def*0.1 : isSupport ? 0.65 + mag*0.1 : isTank ? 0.7 : isMage ? 0.5 : isMarksman ? 0.35 : isAssassin ? 0.35 : 0.45;

  // 24: blind_safety
  v[24] = isTank ? 0.85 + def*0.1 : isFighter && def > 0.4 ? 0.65 + def*0.1 : isSupport && dif < 0.5 ? 0.7 : isMage && dif < 0.5 ? 0.55 : isMarksman && dif < 0.5 ? 0.5 : isAssassin ? 0.2 : def*0.5;

  // 25: roam_strength
  v[25] = isAssassin ? 0.8 + dif*0.1 : isMage && mag > 0.6 ? 0.6 + dif*0.1 : isFighter ? 0.55 + atk*0.1 : isSupport ? 0.55 + dif*0.1 : isMarksman ? 0.25 : isTank ? 0.35 : 0.4;

  // 26: side_lane
  v[26] = isFighter ? 0.75 + atk*0.15 : isAssassin ? 0.65 + atk*0.1 : isMarksman ? 0.5 + atk*0.2 : isMage ? 0.4 + mag*0.1 : isTank ? 0.4 : isSupport ? 0.2 : 0.35;

  // 27: team_fight
  v[27] = isTank ? 0.85 + def*0.1 : isSupport ? 0.82 + mag*0.1 : isMage ? 0.7 + mag*0.15 : isFighter ? 0.6 + def*0.1 : isMarksman ? 0.55 + atk*0.1 : isAssassin ? 0.35 : 0.5;

  // 28: early_power
  v[28] = isAssassin && atk > 0.6 ? 0.7 + atk*0.2 : isFighter && atk > 0.5 ? 0.6 + atk*0.2 : isSupport && dif < 0.5 ? 0.55 : isMage && mag < 0.5 ? 0.4 : isMarksman ? 0.45 + atk*0.1 : isTank ? 0.5 + def*0.1 : atk*0.5;

  // 29: late_power
  v[29] = isMarksman ? 0.85 + atk*0.1 : isMage && mag > 0.6 ? 0.75 + mag*0.15 : isAssassin && dif > 0.6 ? 0.6 + dif*0.15 : isFighter ? 0.55 + atk*0.15 : isTank ? 0.55 + def*0.1 : isSupport ? 0.6 + mag*0.1 : 0.5;

  return v.map(x => Math.max(0, Math.min(1, x)));
}

function applyLolOverrides(name, v) {
  const overrides = LOL_OVERRIDES[name];
  if (!overrides) return v;
  const result = [...v];
  for (const [dim, val] of Object.entries(overrides)) {
    result[parseInt(dim)] = val;
  }
  return result;
}


// ═══════════════════════════════════════════════════════════════════════════
// SCORING ENGINE — centered cosine + archetype diversity slots
// ═══════════════════════════════════════════════════════════════════════════
function l2norm(v) {
  const n = Math.sqrt(v.reduce((s, x) => s + x * x, 0));
  return n < 1e-9 ? v : v.map(x => x / n);
}
function centerVec(v) {
  const mean = v.reduce((s, x) => s + x, 0) / v.length;
  return v.map(x => x - mean);
}
function cosineSim(a, b) {
  let dot = 0;
  for (let i = 0; i < a.length; i++) dot += (a[i] || 0) * (b[i] || 0);
  return dot;
}

// Centered cosine: measures profile SHAPE similarity, not just magnitude overlap
function profileSimilarity(userVec, heroVec) {
  const cu = l2norm(centerVec(userVec));
  const ch = l2norm(centerVec(heroVec));
  return cosineSim(cu, ch);
}

// Top-K dimension match: rewards heroes strong on user's most-cared-about dimensions
function topDimMatch(userVec, heroVec, k) {
  const cu = centerVec(userVec);
  const ch = centerVec(heroVec);
  const ranked = cu.map((v, i) => ({ i, strength: Math.abs(v) }));
  ranked.sort((a, b) => b.strength - a.strength);
  const topDims = ranked.slice(0, k);
  
  let score = 0, total = 0;
  for (const d of topDims) {
    // Agreement: both lean the same direction AND hero is extreme there
    const agreement = cu[d.i] * ch[d.i]; // positive when same direction
    score += Math.max(0, agreement);
    total += d.strength * d.strength;
  }
  return total > 0 ? score / total : 0;
}

// ─── Derive 4 baseline traits from a hero's 30-dim vector ───
// Uses SLIDER_DIM_MAP: positive dims contribute directly, antiDims are inverted
function computeHeroTraits(v) {
  const traits = {};
  for (const [traitName, map] of Object.entries(SLIDER_DIM_MAP)) {
    let score = 0, totalWeight = 0;
    for (const [dim, strength] of Object.entries(map.dims)) {
      const i = DIMS.indexOf(dim);
      if (i >= 0 && v[i] != null) {
        score += v[i] * Math.abs(strength);
        totalWeight += Math.abs(strength);
      }
    }
    for (const [dim, strength] of Object.entries(map.antiDims)) {
      const i = DIMS.indexOf(dim);
      if (i >= 0 && v[i] != null) {
        // antiDims: low value = high trait (e.g. low forgiveness = high risk)
        score += (1 - v[i]) * Math.abs(strength);
        totalWeight += Math.abs(strength);
      }
    }
    // Scale to 0–100
    traits[traitName] = totalWeight > 0 ? Math.round((score / totalWeight) * 100) : 50;
  }
  return traits;
}

// ─── Apply slider multipliers to player base traits → 0–100 scale ───
// Direct multiplier as per spec: FinalTrait = BaseTrait × Multiplier
// Slider 0→0.2×, 50→1.0×, 100→1.8×
// This means slider at 100 nearly doubles a trait; slider at 0 squashes it to 20%
function getPlayerTraits(baseTraits, sliders) {
  const result = {};
  // Start with quiz-derived traits (0-100 scale)
  for (const [trait, base] of Object.entries(baseTraits)) {
    result[trait] = base * 100;
  }
  // Apply slider OFFSETS: slider at 50 = no change, 0 = -30, 100 = +30
  // Each slider maps to specific traits
  const SLIDER_MAP = {
    solo_vs_team:    { teamplay: 1, aggression: -0.4 },
    simple_vs_complex: { complexity: 1 },
    safe_vs_risky:   { risk: 1 },
    close_vs_ranged: { range_pref: 1, mobility: -0.3 },
    sustain_vs_burst: { burst_vs_sustain: 1 },
  };
  for (const [sliderKey, traitMap] of Object.entries(SLIDER_MAP)) {
    const sv = sliders[sliderKey] != null ? sliders[sliderKey] : 50;
    const offset = (sv - 50) / 50 * 12; // -12 to +12 — gentle nudge, not override
    for (const [trait, strength] of Object.entries(traitMap)) {
      if (result[trait] != null) {
        result[trait] = Math.max(0, Math.min(100, result[trait] + offset * strength));
      }
    }
  }
  return result;
}

// For Deadlock: every hero has a unique full role, so use it directly (no artificial caps)
// For LoL: use primary role since many champions share roles
function getDiversityKey(role, game) {
  if (game === 'deadlock') return (role || '').toLowerCase();
  return (role || '').split('·')[0].trim().toLowerCase();
}

function buildUserVec(answers) {
  // 1. Sum 7 traits from quiz answers
  const raw = { aggression: 0, teamplay: 0, complexity: 0, risk: 0, mobility: 0, range_pref: 0, burst_vs_sustain: 0 };
  for (const a of answers) {
    for (const [k, v] of Object.entries(a.w)) {
      if (k in raw) raw[k] += v;
    }
  }

  // 2. Normalize to 0-100 — separate the core 4 (always have quiz data) from bonus 3 (may be zero)
  const core4 = { aggression: raw.aggression, teamplay: raw.teamplay, complexity: raw.complexity, risk: raw.risk };
  const coreVals = Object.values(core4);
  const rawMin = Math.min(...coreVals);
  const rawMax = Math.max(...coreVals);
  const rawRange = rawMax - rawMin;

  const FLOOR = 5;
  const CEIL  = 95;
  const targetRange = CEIL - FLOOR;

  const norm = {};
  // Normalize core 4 with full spread
  for (const k of Object.keys(core4)) {
    if (rawRange > 0) {
      norm[k] = FLOOR + ((raw[k] - rawMin) / rawRange) * targetRange;
    } else {
      norm[k] = 50;
    }
    norm[k] = Math.max(0, Math.min(100, norm[k]));
  }
  // Normalize bonus 3 — if they got quiz data, normalize independently; otherwise default to 50
  const bonus3 = ['mobility', 'range_pref', 'burst_vs_sustain'];
  const b3Vals = bonus3.map(k => raw[k]);
  const b3Min = Math.min(...b3Vals);
  const b3Max = Math.max(...b3Vals);
  const b3Range = b3Max - b3Min;
  for (const k of bonus3) {
    if (b3Range > 0) {
      norm[k] = FLOOR + ((raw[k] - b3Min) / b3Range) * targetRange;
    } else if (raw[k] !== 0) {
      norm[k] = 55; // slight offset from center if they answered but all same
    } else {
      norm[k] = 50; // no quiz data for this trait — neutral
    }
    norm[k] = Math.max(0, Math.min(100, norm[k]));
  }

  // 3. Store base trait scores on 0-1 scale
  state.baseTraits = {};
  for (const k of Object.keys(norm)) {
    state.baseTraits[k] = norm[k] / 100;
  }

  // 4. Compute trait emphasis weights — extreme traits matter more
  const allVals = Object.values(norm);
  const mean = allVals.reduce((s,v) => s+v, 0) / allVals.length;
  state.traitWeights = {};
  for (const k of Object.keys(norm)) {
    const deviation = Math.abs(norm[k] - mean);
    // Core traits: 1.0 to 2.5. Bonus traits: 0.8 to 2.0 (slightly less weight)
    const isBonus = bonus3.includes(k);
    const baseW = isBonus ? 0.8 : 1.0;
    const maxExtra = isBonus ? 1.2 : 1.5;
    state.traitWeights[k] = baseW + (deviation / 50) * maxExtra;
    // If bonus trait has no quiz data (raw=0), reduce weight to 0.3
    if (isBonus && raw[k] === 0) state.traitWeights[k] = 0.3;
  }

  // 5. Initialize preference sliders at neutral (50 = no change)
  state.sliders = { solo_vs_team: 50, simple_vs_complex: 50, safe_vs_risky: 50, close_vs_ranged: 50, sustain_vs_burst: 50 };

  // 6. Expand base traits → 30-dim vector for radar chart display
  return expandTraitsToVec(state.baseTraits);
}

// Expand 4 normalized traits (0–1) → 30-dim vector (for radar chart display only)
function expandTraitsToVec(norm) {
  const vec = new Array(DIMS.length).fill(0.5);
  for (const [trait, val01] of Object.entries(norm)) {
    const deviation = (val01 - 0.5) * 2;
    const map = SLIDER_DIM_MAP[trait];
    if (!map) continue;
    for (const [dim, strength] of Object.entries(map.dims)) {
      const i = DIMS.indexOf(dim);
      if (i >= 0) vec[i] = Math.max(0, Math.min(1, vec[i] + deviation * strength * 0.5));
    }
    for (const [dim, strength] of Object.entries(map.antiDims)) {
      const i = DIMS.indexOf(dim);
      if (i >= 0) vec[i] = Math.max(0, Math.min(1, vec[i] + deviation * strength * 0.5));
    }
  }
  const mean = vec.reduce((s, v) => s + v, 0) / vec.length;
  return vec.map(v => Math.max(0, Math.min(1, mean + (v - mean) * 1.8)));
}

function computeUserExtremity(userVec) {
  const centered = userVec.map(v => Math.abs(v - 0.5));
  return centered.reduce((s, v) => s + v, 0) / userVec.length;
}

function rankHeroes(userVec, heroes, sliders, game) {
  // ═══════════════════════════════════════════════════════════════════
  // 4-TRAIT SCORING — exact formula from spec
  // ═══════════════════════════════════════════════════════════════════

  // Step 1: Player trait profile = base quiz results × slider multipliers
  const pt = state.baseTraits
    ? getPlayerTraits(state.baseTraits, sliders)
    : { aggression: 50, teamplay: 50, complexity: 50, risk: 50 };

  // Step 2: 30-dim adjusted vector (only used for radar chart display)
  const adjusted = sliders ? applySliders(userVec, sliders) : userVec;

  // Step 3: Score every hero using ALL available traits (4 core + 3 bonus)
  const tw = state.traitWeights || { aggression:1, teamplay:1, complexity:1, risk:1, mobility:0.3, range_pref:0.3, burst_vs_sustain:0.3 };
  const ALL_TRAITS = ['aggression','teamplay','complexity','risk','mobility','range_pref','burst_vs_sustain'];
  const scored = heroes.map(h => {
    const ht = h.traits || computeHeroTraits(h.v || []);

    let sumDiffs = 0;
    const traitDiffs = [];
    for (const trait of ALL_TRAITS) {
      const pVal = pt[trait] != null ? pt[trait] : 50;
      const hVal = ht[trait] != null ? ht[trait] : 50;
      const d = Math.abs(pVal - hVal);
      const w = tw[trait] || 0.3;
      sumDiffs += d * w;
      traitDiffs.push({ trait, val: 1 - d / 100 });
    }

    const rawTraitMatch = 300 - sumDiffs;
    const cu = centerVec(adjusted);
    const ch = centerVec(h.v || []);
    const dimContrib = DIMS.slice(0, 22).map((t, i) => ({
      trait: t, val: Math.max(0, cu[i] * ch[i]),
    }));
    const allContrib = [...traitDiffs, ...dimContrib];
    allContrib.sort((a, b) => b.val - a.val);

    return {
      ...h, rawTraitMatch, hv: h.v || [], contrib: allContrib,
      divKey: getDiversityKey(h.role, game),
      playerTraits: pt, heroTraits: ht
    };
  });

  // Step 4: Normalize raw scores to 0–100
  //   Min-max across entire hero pool → best hero ≈ 98, worst ≈ 5
  //   This ensures the full visual range is used regardless of player profile
  const rawScores = scored.map(s => s.rawTraitMatch);
  const rawMin = Math.min(...rawScores);
  const rawMax = Math.max(...rawScores);
  const rawRange = rawMax - rawMin || 1; // avoid /0

  for (const h of scored) {
    // Linear stretch: rawMin → 5, rawMax → 98
    h.normScore = 5 + ((h.rawTraitMatch - rawMin) / rawRange) * 93;
  }

  scored.sort((a, b) => b.normScore - a.normScore);

  // Store full scored list (before diversity filtering) for role exploration
  state._allScoredByRole = scored.map(h => ({
    ...h,
    score: Math.max(0.01, Math.min(1, h.normScore / 100)),
    topTraits: h.contrib.slice(0, 3).filter(c => c.val > 0),
  }));

  // Step 5: Role-aware diversity pick (top 12)
  const finalTop = [];
  const usedRoles = {};

  for (const c of scored) {
    if (finalTop.length >= 12) break;
    const rc = usedRoles[c.divKey] || 0;
    if (rc >= 2) continue;
    // Mild penalty for 2nd hero in same role
    c.finalScore = rc === 1 ? c.normScore * 0.97 : c.normScore;
    finalTop.push(c);
    usedRoles[c.divKey] = rc + 1;
  }

  finalTop.sort((a, b) => b.finalScore - a.finalScore);

  // Tiny jitter for replayability (won't reorder meaningful gaps)
  for (const c of finalTop) {
    c.finalScore += (Math.random() - 0.5) * 2.5;
  }
  finalTop.sort((a, b) => b.finalScore - a.finalScore);

  // Output: score as 0–1 for display (finalScore is 0–100)
  return finalTop.slice(0, 12).map(h => ({
    ...h,
    score: Math.max(0.01, Math.min(1, h.finalScore / 100)),
    topTraits: h.contrib.slice(0, 3).filter(c => c.val > 0),
  }));
}

// SLIDER SYSTEM — trait preference tuning
// ═══════════════════════════════════════════════════════════════════════════
const SLIDER_DIM_MAP = {
  aggression: {
    dims: { aggression: 1.0, burst_window: 0.7, backline_access: 0.6, early_power: 0.5, carry_agency: 0.4 },
    antiDims: { patience_req: -0.5, forgiveness: -0.3, blind_safety: -0.2 }
  },
  teamplay: {
    dims: { team_fight: 1.0, peel_strength: 0.8, objective_ctrl: 0.6, front_to_back: 0.5, roam_strength: 0.4 },
    antiDims: { carry_agency: -0.4, side_lane: -0.3, backline_access: -0.2 }
  },
  complexity: {
    dims: { input_density: 1.0, combo_strictness: 0.9, anim_cancel: 0.7, skillshot_reliance: 0.6, confidence_scale: 0.5 },
    antiDims: { forgiveness: -0.6, blind_safety: -0.4 }
  },
  risk: {
    dims: { tilt_risk: 1.0, punish_severity: 0.8, confidence_scale: 0.7, carry_agency: 0.6, aggression: 0.4 },
    antiDims: { forgiveness: -0.7, durability: -0.4, sustain: -0.3 }
  }
};

// Slider multiplier for radar chart: direct multiplier matching getPlayerTraits
function applySliders(userVec, sliders) {
  if (!state.baseTraits) return userVec;
  const adjusted = {};
  for (const [trait, base] of Object.entries(state.baseTraits)) {
    const sv = sliders[trait] != null ? sliders[trait] : 50;
    const multiplier = 0.2 + (sv / 100) * 1.6; // 0→0.2, 50→1.0, 100→1.8
    adjusted[trait] = Math.max(0, Math.min(1, base * multiplier));
  }
  return expandTraitsToVec(adjusted);
}

function laneScore(heroLanes, preferredLane) {
  if (!preferredLane || preferredLane === 'any' || !heroLanes) return 1.0;
  const lanes = (typeof heroLanes === 'string' ? heroLanes : '').toLowerCase().split(',').map(l => l.trim());
  if (lanes.includes(preferredLane.toLowerCase())) {
    return lanes.length > 1 ? 0.95 : 1.0; // slight flex penalty
  }
  return 0.4;
}

// RADAR CHART — interactive SVG with hover tooltips
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// NEW 6-AXIS RADAR SYSTEM — profiles stored in Supabase hero_radar_profiles
// ═══════════════════════════════════════════════════════════════════════════
const RADAR_AXES = [
  { key: 'aggression', label: 'AGG', full: 'Aggression', desc: 'How aggressively you seek fights' },
  { key: 'mechanical_skill', label: 'MECH', full: 'Mechanical Skill', desc: 'Aim, combos, APM demand' },
  { key: 'game_knowledge', label: 'KNOW', full: 'Game Knowledge', desc: 'Map awareness, macro, cooldown tracking' },
  { key: 'team_utility', label: 'TEAM', full: 'Team Utility', desc: 'Support, peel, team contribution' },
  { key: 'survivability', label: 'SURV', full: 'Survivability', desc: 'Tankiness, self-sustain, durability' },
  { key: 'positioning_discipline', label: 'POS', full: 'Positioning', desc: 'Positional precision required' },
];

// Build user radar profile from quiz 4-trait results (1-10 scale)
function buildUserRadar(baseTraits, sliders) {
  // Use the same getPlayerTraits that scoring uses, so radar matches results
  const pt = getPlayerTraits(baseTraits || {}, sliders || {});
  const a = (pt.aggression || 50) / 100;
  const t = (pt.teamplay || 50) / 100;
  const c = (pt.complexity || 50) / 100;
  const r = (pt.risk || 50) / 100;
  return {
    aggression:              Math.max(1, Math.min(10, Math.round(a * 9 + 1))),
    mechanical_skill:        Math.max(1, Math.min(10, Math.round((c * 0.7 + r * 0.3) * 9 + 1))),
    game_knowledge:          Math.max(1, Math.min(10, Math.round(((1 - a) * 0.3 + c * 0.4 + t * 0.3) * 9 + 1))),
    team_utility:            Math.max(1, Math.min(10, Math.round(t * 9 + 1))),
    survivability:           Math.max(1, Math.min(10, Math.round(((1 - r) * 0.5 + t * 0.3 + (1 - a) * 0.2) * 9 + 1))),
    positioning_discipline:  Math.max(1, Math.min(10, Math.round(((1 - a) * 0.3 + c * 0.3 + (1 - r) * 0.4) * 9 + 1))),
  };
}

function buildRadarSVG(userProfile, heroProfile, heroColor, heroName) {
  const cx = 130, cy = 130, maxR = 100;
  const n = RADAR_AXES.length;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  function polarToXY(angle, r) {
    return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
  }

  function polyPoints(profile) {
    return RADAR_AXES.map((a, i) => {
      const v = (profile[a.key] || 5) / 10; // 1-10 → 0-1
      const p = polarToXY(startAngle + i * angleStep, v * maxR);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');
  }

  // Normalized 0-1 arrays for drawing
  const uVals = RADAR_AXES.map(a => (userProfile[a.key] || 5) / 10);
  const hVals = heroProfile ? RADAR_AXES.map(a => (heroProfile[a.key] || 5) / 10) : null;

  // Grid rings
  const rings = [0.25, 0.5, 0.75, 1.0];
  const gridLines = rings.map(r => {
    const pts = Array.from({length: n}, (_, i) => {
      const p = polarToXY(startAngle + i * angleStep, r * maxR);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#1a2535" stroke-width="${r === 1 ? 1.5 : 0.5}"/>`;
  }).join('');

  // Game-themed colors
  const isOW = state.game === 'overwatch';
  const isDL = state.game === 'deadlock';
  const uStroke = isOW ? '#f0962a' : isDL ? '#e8734a' : '#4dc9f6';
  const uFill = isOW ? 'rgba(249,158,26,.08)' : isDL ? 'rgba(255,107,53,.08)' : 'rgba(0,212,255,.08)';
  const uHighlight = isOW ? '#f0962a' : isDL ? '#FF8C55' : '#4dc9f6';

  // Axis lines + labels + hit areas
  const axes = RADAR_AXES.map((a, i) => {
    const angle = startAngle + i * angleStep;
    const end = polarToXY(angle, maxR);
    const labelPos = polarToXY(angle, maxR + 18);
    const uVal = uVals[i];
    const hVal = hVals ? hVals[i] : 0;
    const isStrongest = uVal === Math.max(...uVals);
    return `
      <line x1="${cx}" y1="${cy}" x2="${end.x.toFixed(1)}" y2="${end.y.toFixed(1)}" stroke="#1a2535" stroke-width="0.5"/>
      <text x="${labelPos.x.toFixed(1)}" y="${labelPos.y.toFixed(1)}" text-anchor="middle" dominant-baseline="central"
        fill="${isStrongest ? uHighlight : '#5a6a82'}" font-size="9" font-weight="${isStrongest ? '700' : '400'}"
        font-family="JetBrains Mono,monospace" letter-spacing="0.08em">${a.label}</text>
      <circle cx="${end.x.toFixed(1)}" cy="${end.y.toFixed(1)}" r="16" fill="transparent" class="radar-hit"
        data-idx="${i}" data-key="${a.key}" data-full="${a.full}" data-desc="${a.desc}"
        data-uval="${userProfile[a.key] || 5}" data-hval="${heroProfile ? (heroProfile[a.key] || 5) : 0}" style="cursor:pointer"/>
    `;
  }).join('');

  // User polygon
  const userPoly = `<polygon points="${polyPoints(userProfile)}" fill="${uFill}" stroke="${uStroke}" stroke-width="1.8" stroke-linejoin="round"/>`;

  // Hero polygon (dashed overlay)
  const heroPoly = heroProfile
    ? `<polygon points="${polyPoints(heroProfile)}" fill="${heroColor}15" stroke="${heroColor}" stroke-width="1.5" stroke-dasharray="5,3" stroke-linejoin="round"/>`
    : '';

  // User vertex dots
  const uDotHalf = isOW ? 'rgba(249,158,26,.5)' : isDL ? 'rgba(255,107,53,.5)' : 'rgba(0,212,255,.5)';
  const userDots = uVals.map((v, i) => {
    const p = polarToXY(startAngle + i * angleStep, v * maxR);
    const isStrongest = v === Math.max(...uVals);
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isStrongest ? 4 : 2.5}" fill="${isStrongest ? uStroke : uDotHalf}" stroke="${isStrongest ? '#fff' : 'none'}" stroke-width="${isStrongest ? 1 : 0}"/>`;
  }).join('');

  return `
    <div style="position:relative;display:inline-block" class="radar-panel">
      <svg class="radar-svg" width="260" height="260" viewBox="0 0 260 260">
        ${gridLines}${axes}${heroPoly}${userPoly}${userDots}
      </svg>
      <div class="radar-tooltip" id="radarTooltip"></div>
    </div>
  `;
}

function attachRadarEvents() {
  const tooltip = document.getElementById('radarTooltip');
  if (!tooltip) return;
  document.querySelectorAll('.radar-hit').forEach(hit => {
    hit.addEventListener('mouseenter', (e) => {
      const r = e.target.getBoundingClientRect();
      const p = e.target.closest('.radar-panel').getBoundingClientRect();
      tooltip.innerHTML = `
        <div class="rt-name">${e.target.dataset.full}</div>
        <div class="rt-val">You: ${e.target.dataset.uval}/10 · Hero: ${e.target.dataset.hval}/10</div>
        <div class="rt-desc">${e.target.dataset.desc}</div>
      `;
      tooltip.style.opacity = '1';
      tooltip.style.left = (r.left - p.left + r.width/2 - 80) + 'px';
      tooltip.style.top = (r.top - p.top - 60) + 'px';
    });
    hit.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
  });
}

// MATCH EXPLANATION — human-readable "why you matched" sentences
// ═══════════════════════════════════════════════════════════════════════════
const TRAIT_PHRASES = {
  aggression: { high: 'loves picking fights', low: 'plays it safe' },
  burst_window: { high: 'thrives on fast kills', low: 'prefers sustained damage' },
  carry_agency: { high: 'wants to solo carry', low: 'empowers the team' },
  mobility: { high: 'needs constant repositioning', low: 'holds ground' },
  team_fight: { high: 'lives for teamfights', low: 'prefers skirmishes' },
  durability: { high: 'wants to absorb damage', low: 'trades HP for damage' },
  input_density: { high: 'craves mechanical complexity', low: 'values simplicity' },
  patience_req: { high: 'plays the long game', low: 'wants instant impact' },
  sustain: { high: 'outlasts through regen', low: 'relies on burst' },
  peel_strength: { high: 'protects teammates', low: 'focuses on damage' },
  late_power: { high: 'scales into a monster', low: 'dominates early' },
  early_power: { high: 'crushes the early game', low: 'needs time to scale' },
  backline_access: { high: 'hunts the backline', low: 'fights front-to-back' },
  combo_strictness: { high: 'rewards precise combos', low: 'has a flexible kit' },
};

function generateMatchExplanation(userVec, heroVec, heroName, heroRole) {
  const nu = l2norm(userVec);
  const hv = l2norm(heroVec);
  // Find top 2 aligned traits and 1 differentiator
  const alignments = DIMS.map((d, i) => ({
    dim: d, userVal: nu[i] || 0, heroVal: hv[i] || 0,
    alignment: (nu[i] || 0) * (hv[i] || 0),
    diff: Math.abs((nu[i] || 0) - (hv[i] || 0)),
  })).filter(a => TRAIT_PHRASES[a.dim]);

  alignments.sort((a, b) => b.alignment - a.alignment);
  const top2 = alignments.slice(0, 2);

  const phrases = top2.map(a => {
    const p = TRAIT_PHRASES[a.dim];
    return a.userVal > 0.5 ? p.high : p.low;
  });

  const roleClean = heroRole.split('·')[0].trim();
  return `${heroName} fits because you ${phrases[0]} and ${phrases[1]} — a natural match for a ${roleClean}.`;
}

function generateRoleRecs(userVec, topHeroes, game) {
  const roles = ROLE_ARCHETYPES[game] || [];
  // Find roles NOT represented in top 3
  const topRoles = topHeroes.map(h => (h.role || '').split('·')[0].trim().toLowerCase());
  const altRoles = roles.filter(r => !topRoles.some(tr => tr.includes(r.role.toLowerCase())));

  // Score each alt role by user profile alignment
  const roleScores = altRoles.map(r => {
    let score = 0;
    const rLow = r.role.toLowerCase();
    if (rLow === 'assassin') score = (userVec[0]||0)*0.4 + (userVec[1]||0)*0.3 + (userVec[4]||0)*0.3;
    else if (rLow === 'mage') score = (userVec[22]||0)*0.3 + (userVec[1]||0)*0.3 + (userVec[27]||0)*0.2;
    else if (rLow === 'marksman' || rLow === 'carry') score = (userVec[2]||0)*0.3 + (userVec[15]||0)*0.3 + (userVec[29]||0)*0.3;
    else if (rLow === 'tank') score = (userVec[10]||0)*0.4 + (userVec[27]||0)*0.3 + (userVec[3]||0)*0.2;
    else if (rLow === 'fighter') score = (userVec[0]||0)*0.3 + (userVec[8]||0)*0.3 + (userVec[10]||0)*0.2;
    else if (rLow === 'support') score = (userVec[11]||0)*0.4 + (userVec[27]||0)*0.3 + (userVec[8]||0)*0.2;
    else if (rLow === 'dps') score = (userVec[2]||0)*0.4 + (userVec[15]||0)*0.3 + (userVec[0]||0)*0.2;
    return { ...r, score };
  });

  roleScores.sort((a, b) => b.score - a.score);
  return roleScores.slice(0, 2); // return top 2 alt roles
}

function getAvailableFilters(heroPool, game) {
  const roles = new Set();
  const lanes = new Set();
  for (const h of heroPool) {
    const mainRole = (h.role || '').split('·')[0].trim();
    if (mainRole) roles.add(mainRole);
    // LoL: extract lanes from tags
    if (game === 'lol' && h.tags) {
      h.tags.forEach(t => lanes.add(t));
    }
  }
  if (game === 'lol') {
    // Standard LoL lanes
    return { roles: [...roles].sort(), lanes: ['Top','Mid','Bot','Support','Jungle'] };
  }
  return { roles: [...roles].sort(), lanes: [] };
}

function applyFilters(results, filters) {
  return results.filter(h => {
    if (filters.role && filters.role !== 'all') {
      const mainRole = (h.role || '').split('·')[0].trim().toLowerCase();
      if (!mainRole.includes(filters.role.toLowerCase())) return false;
    }
    if (filters.lane && filters.lane !== 'all') {
      // Check role tags for LoL lane matching
      const tags = (h.tags || []).map(t => t.toLowerCase());
      const role = (h.role || '').toLowerCase();
      const laneMap = { top: ['fighter','tank'], mid: ['mage','assassin'], bot: ['marksman'], support: ['support'], jungle: ['fighter','assassin','tank'] };
      const laneRoles = laneMap[filters.lane.toLowerCase()] || [];
      if (!laneRoles.some(lr => role.includes(lr) || tags.some(t => t.includes(lr)))) return false;
    }
    if (filters.maxDiff && filters.maxDiff > 0) {
      if ((h.difficulty || 3) > filters.maxDiff) return false;
    }
    if (filters.dmgType && filters.dmgType !== 'all') {
      if ((h.dmg || '').toLowerCase() !== filters.dmgType.toLowerCase()) return false;
    }
    return true;
  });
}

// ═══ AUTH HELPERS — Supabase GoTrue REST API ═══
async function sbSignUp(email, password) {
  const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.msg || data.error_description || data.message || 'Sign up failed');
  // Check if email confirmation is required (user exists but not confirmed)
  if (data.user && !data.user.confirmed_at && !data.session) {
    return { needsConfirmation: true, email };
  }
  // If autoconfirm is enabled, user is immediately signed in
  if (data.session) {
    state.user = data.user;
    state.accessToken = data.session.access_token;
    localStorage.setItem('fmh_session', JSON.stringify({
      access_token: data.session.access_token,
      refresh_token: data.session.refresh_token
    }));
    return { needsConfirmation: false };
  }
  return { needsConfirmation: true, email };
}

async function sbSignIn(email, password) {
  const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) {
    // Friendly error messages
    const errCode = data.error_code || '';
    if (errCode === 'email_not_confirmed') throw new Error('Please confirm your email first — check your inbox');
    if (errCode === 'invalid_credentials') throw new Error('Incorrect email or password');
    throw new Error(data.msg || data.error_description || data.message || 'Sign in failed');
  }
  state.user = data.user;
  state.accessToken = data.access_token;
  localStorage.setItem('fmh_session', JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token }));
  return data;
}

async function sbRefreshSession() {
  try {
    const stored = JSON.parse(localStorage.getItem('fmh_session') || 'null');
    if (!stored || !stored.refresh_token) return false;
    const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: stored.refresh_token })
    });
    if (!res.ok) { localStorage.removeItem('fmh_session'); return false; }
    const data = await res.json();
    state.user = data.user;
    state.accessToken = data.access_token;
    localStorage.setItem('fmh_session', JSON.stringify({ access_token: data.access_token, refresh_token: data.refresh_token }));
    return true;
  } catch { return false; }
}

// Capture tokens from URL hash after email confirmation redirect
function sbCaptureHashTokens() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token=')) return false;
  try {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type'); // 'signup', 'recovery', 'magiclink'
    if (accessToken && refreshToken) {
      state.accessToken = accessToken;
      localStorage.setItem('fmh_session', JSON.stringify({ access_token: accessToken, refresh_token: refreshToken }));
      // Fetch user data with the token
      fetch(SUPABASE_URL + '/auth/v1/user', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + accessToken }
      }).then(r => r.json()).then(async user => {

  h += '<button class="survey-submit" id="surveySubmit">' + (existing ? 'Update' : 'Save') + '</button>';

  overlay.innerHTML = h;

  // Pre-fill multi selections into the Set
  if (existing) {
    SURVEY_QUESTIONS.forEach(q => {
      if (q.type === 'multi' && existing[q.key]) {
        answers[q.key] = new Set(existing[q.key]);
      }

      const key = opt.dataset.sq;

        if (answers[key].has(val)) { answers[key].delete(val); opt.classList.remove('selected'); }

      } else {
        // Deselect siblings
        overlay.querySelectorAll('[data-sq="' + key + '"]').forEach(s => s.classList.remove('selected'));
        answers[key] = val;
        opt.classList.add('selected');
      }
    });
  });

  document.getElementById('surveySubmit').addEventListener('click', async () => {

function renderEmblem(achId, size) {

async function renderPolls(game){

    var myV=state.user?votes.find(function(v){return v.user_id===state.user.id;}):null;
    var ct={};opts.forEach(function(_,i){ct[i]=votes.filter(function(v){return v.option_index===i;}).length;});

    h+='<div class="poll-card"><div class="poll-hdr"><span class="poll-hdr-icon">📊</span><div class="poll-hdr-info"><div class="poll-hdr-q">'+p.question.replace(/</g,'&lt;')+'</div><div class="poll-hdr-meta">by '+socProfileName(p.user_id)+' · '+socTimeAgo(p.created_at)+'</div></div></div><div class="poll-body">';
    opts.forEach(function(opt,i){
      var c=ct[i]||0,pct=total>0?Math.round(c/total*100):0;
      var isW=c===mx&&c>0;
      h+='<div class="poll-opt'+(myV?' voted':'')+(isW&&myV?' winner':'')+'" data-pollid="'+p.id+'" data-optidx="'+i+'">';
      if(myV)h+='<div class="poll-opt-bar" style="width:'+pct+'%"></div>';
      h+='<div class="poll-opt-content"><span class="poll-opt-label">'+(myV&&myV.option_index===i?'✓ ':'')+opt+'</span>';
      if(myV)h+='<span class="poll-opt-pct">'+pct+'%</span>';
      h+='</div></div>';
    });
    h+='<div class="poll-total">'+total+' vote'+(total!==1?'s':'')+'</div></div></div>';
  });
  return h;
}


// ═══ REUSABLE PARTICLE BACKGROUND ═══
function spawnPageParticles(elId, cleanupKey) {
  // Skip particles on mobile for performance
  if (window.innerWidth <= 768) return;
  if (window[cleanupKey]) { window[cleanupKey](); window[cleanupKey] = null; }
  let el = document.getElementById(elId);
  if (!el) {
    el = document.createElement('div');
    el.id = elId;
    el.className = 'hist-bg';
    el.innerHTML = '<canvas id="' + elId + 'Cvs"></canvas>';
    document.body.appendChild(el);
  }
  const cvs = document.getElementById(elId + 'Cvs');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  let W, H, animId = null, alive = true;
  const colors = [
    { r:77, g:201, b:246 }, { r:167, g:139, b:250 },
    { r:245, g:193, b:97 }, { r:94, g:232, b:176 },
  ];
  const count = window.innerWidth < 540 ? 15 : 25;
  const parts = [];
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cvs.width = W * dpr; cvs.height = H * dpr;
    cvs.style.width = W + 'px'; cvs.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function spawn(stagger) {
    const c = colors[Math.floor(Math.random() * colors.length)];
    return {
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.2, vy: -0.03 - Math.random() * 0.08,
      r: 0.6 + Math.random() * 1.4, c,
      baseA: 0.1 + Math.random() * 0.2, a: 0,
      phase: Math.random() * 6.28, pSpeed: 0.003 + Math.random() * 0.006,
      age: stagger ? Math.random() * 800 | 0 : 0, ttl: 600 + Math.random() * 800 | 0,
    };
  }
  function tick() {
    if (!alive) return;
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < parts.length; i++) {
      const p = parts[i];
      p.x += p.vx; p.y += p.vy; p.age++; p.phase += p.pSpeed;
      const fi = Math.min(p.age / 80, 1);
      const fo = p.age > p.ttl - 80 ? Math.max((p.ttl - p.age) / 80, 0) : 1;
      p.a = p.baseA * fi * fo * (0.6 + 0.4 * Math.sin(p.phase));
      if (p.age >= p.ttl || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) { parts[i] = spawn(false); continue; }
      if (p.r > 0.8) {
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
        g.addColorStop(0, 'rgba(' + p.c.r + ',' + p.c.g + ',' + p.c.b + ',' + (p.a * 0.1).toFixed(3) + ')');
        g.addColorStop(1, 'rgba(' + p.c.r + ',' + p.c.g + ',' + p.c.b + ',0)');
        ctx.fillStyle = g;
        ctx.fillRect(p.x - p.r * 5, p.y - p.r * 5, p.r * 10, p.r * 10);
      }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28);
      ctx.fillStyle = 'rgba(' + p.c.r + ',' + p.c.g + ',' + p.c.b + ',' + p.a.toFixed(3) + ')';
      ctx.fill();
    }
    animId = requestAnimationFrame(tick);
  }
  resize();
  for (let i = 0; i < count; i++) parts.push(spawn(true));
  tick();
  window.addEventListener('resize', resize);
  window[cleanupKey] = function() {
    alive = false;
    if (animId) cancelAnimationFrame(animId);
    window.removeEventListener('resize', resize);
    const e = document.getElementById(elId);
    if (e) e.remove();
  };
}

const FLAME_LEVELS = [
  { key: 'none', points: 0, icon: '', label: '' },
  { key: 'spark', points: 1, icon: '🔸', label: 'Spark' },
  { key: 'burning', points: 3, icon: '🔥', label: 'Burning' },
  { key: 'onfire', points: 6, icon: '🔥', label: 'On Fire' },
  { key: 'blazing', points: 10, icon: '🔥', label: 'Blazing' },
  { key: 'inferno', points: 15, icon: '💜', label: 'Inferno' },
  { key: 'eternal', points: 20, icon: '💎', label: 'Eternal' },
];
const ENGAGEMENT_POINTS = { quiz: 3, post: 2, comment: 1, like: 1 };

function getFlameForPoints(pts) {
  let level = FLAME_LEVELS[0];
  for (const l of FLAME_LEVELS) { if (pts >= l.points) level = l; }
  return level;
}

function flameClass(flameKey) {
  if (!flameKey || flameKey === 'none') return '';

}

// Get streak display for nav/profile
function streakBadgeHTML(streak, flameKey) {
  if (!flameKey || flameKey === 'none') return '';

  const cls = flameKey === 'eternal' ? ' fsb-eternal' : flameKey === 'inferno' ? ' fsb-inferno' : '';
  const streakStr = streak > 0 ? ' ' + streak + 'd' : '';

}

// Track engagement and update streak
async function trackEngagement(actionType) {
  if (!state.user || !state.accessToken) return;
  const pts = ENGAGEMENT_POINTS[actionType] || 1;
  const today = new Date().toISOString().slice(0, 10);
  const MAINTAIN_THRESHOLD = 10; // Points needed daily to keep streak alive
  
  try {
    let rows = await fetch(SUPABASE_URL + '/rest/v1/user_streaks?user_id=eq.' + state.user.id, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken }
    }).then(r => r.json());
    
    let streak = rows[0] || null;
    
    if (!streak) {
      await fetch(SUPABASE_URL + '/rest/v1/user_streaks', {
        method: 'POST', headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({ user_id: state.user.id, today_points: pts, last_active_date: today, flame_level: getFlameForPoints(pts).key })
      }).then(r => r.json()).then(r => { streak = r[0]; });
    } else {
      const lastDate = streak.last_active_date;
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      
      let newPoints, newStreak, longestStreak;
      
      if (lastDate === today) {
        // Same day — add points
        newPoints = streak.today_points + pts;
        newStreak = streak.current_streak;
        longestStreak = streak.longest_streak;
        
        if (streak.current_streak > 0) {
          // Has active streak — hitting maintenance threshold today keeps it going
          if (newPoints >= MAINTAIN_THRESHOLD && streak.today_points < MAINTAIN_THRESHOLD) {
            newStreak = streak.current_streak + 1;
            longestStreak = Math.max(longestStreak, newStreak);
          }
        } else {
          // No active streak — need to reach Eternal (20) to start one
          if (getFlameForPoints(newPoints).key === 'eternal' && getFlameForPoints(streak.today_points).key !== 'eternal') {
            newStreak = 1;
            longestStreak = Math.max(longestStreak, 1);
          }
        }
      } else if (lastDate === yesterday) {
        // New day — check if yesterday met the requirement
        newPoints = pts;
        
        if (streak.current_streak > 0 && streak.today_points >= MAINTAIN_THRESHOLD) {
          // Had active streak AND hit maintenance yesterday — streak lives on
          newStreak = streak.current_streak;
        } else if (streak.current_streak === 0 && streak.flame_level === 'eternal') {
          // Just started streak yesterday by hitting eternal — streak lives on
          newStreak = streak.current_streak;
        } else {
          // Didn't meet threshold yesterday — streak dies
          newStreak = 0;
        }
        longestStreak = streak.longest_streak;
      } else {
        // Missed a day entirely — reset
        newPoints = pts;
        newStreak = 0;
        longestStreak = streak.longest_streak;
      }
      
      const newFlame = getFlameForPoints(newPoints).key;
      
      await fetch(SUPABASE_URL + '/rest/v1/user_streaks?user_id=eq.' + state.user.id, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ today_points: newPoints, last_active_date: today, flame_level: newFlame, current_streak: newStreak, longest_streak: longestStreak, updated_at: new Date().toISOString() })
      });
      
      streak = { ...streak, today_points: newPoints, flame_level: newFlame, current_streak: newStreak, longest_streak: longestStreak };
    }
    
    state._userStreak = streak;
  } catch(e) { console.error('Streak tracking error:', e); }
}

// Fetch streak for current user
async function fetchMyStreak() {
  if (!state.user || !state.accessToken) return null;
  const MAINTAIN_THRESHOLD = 10;
  try {
    const rows = await fetch(SUPABASE_URL + '/rest/v1/user_streaks?user_id=eq.' + state.user.id, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken }
    }).then(r => r.json());
    if (rows.length > 0) {
      const today = new Date().toISOString().slice(0, 10);
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      const s = rows[0];
      if (s.last_active_date !== today && s.last_active_date !== yesterday) {
        // Missed a full day — streak dies
        s.current_streak = 0; s.today_points = 0; s.flame_level = 'none';
      } else if (s.last_active_date === yesterday) {
        // New day, not yet engaged today
        const yesterdayMet = s.current_streak > 0 ? s.today_points >= MAINTAIN_THRESHOLD : s.flame_level === 'eternal';
        if (!yesterdayMet) s.current_streak = 0; // Didn't meet threshold yesterday
        s.today_points = 0; s.flame_level = 'none'; // Reset today's progress
      }
      // If last_active_date === today, keep everything as-is
      state._userStreak = s;
      return s;
    }
    return null;
  } catch { return null; }
}

  submitBtn?.addEventListener('click', async () => {
    const msgEl = document.getElementById('unameMsg');
    const raw = (input?.value || '').trim();
    const username = raw.replace(/[^a-zA-Z0-9_]/g, '');
    if (username.length < 3) { if (msgEl) msgEl.innerHTML = '<div class="auth-error">Username must be at least 3 characters</div>'; return; }
    if (username.length > 20) { if (msgEl) msgEl.innerHTML = '<div class="auth-error">Username must be 20 characters or less</div>'; return; }
    submitBtn.disabled = true; submitBtn.textContent = 'Checking…';
    try {
      // Check if username is taken
      const existing = await fetch(SUPABASE_URL + '/rest/v1/user_profiles?username=eq.' + encodeURIComponent(username) + '&select=user_id', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + state.accessToken }
      }).then(r => r.json());
      if (existing.length > 0 && existing[0].user_id !== state.user.id) {
        if (msgEl) msgEl.innerHTML = '<div class="auth-error">Username "' + username + '" is already taken</div>';
        submitBtn.disabled = false; submitBtn.textContent = 'Set Username'; return;
      }
      // Save username

        method: 'PATCH', headers: { ...sbAuthHeaders(), 'Prefer': 'return=minimal' },
        body: JSON.stringify({ username: username })
      });
      state._userUsername = username;
      overlay.remove();
      render();
    } catch(e) {
      if (msgEl) msgEl.innerHTML = '<div class="auth-error">Something went wrong</div>';
      submitBtn.disabled = false; submitBtn.textContent = 'Set Username';
    }
  });
}

        counts[key].picks++;

      const sorted = Object.values(counts).sort((a, b) => b.picks - a.picks).slice(0, 20);
      cache[activeGame] = sorted;
      renderLbTable(sorted, activeGame);
    })
    .catch(() => {
      document.getElementById('lbContent').innerHTML = '<div class="lb-empty">Could not load leaderboard data.</div>';
    });
  });

  } // end else (non-identity fetch)

  // ── Archetype Leaderboard Renderer ──
  const ARCHETYPE_COLORS = {
    'Relentless Aggressor': { bg: 'rgba(248,113,113,.06)', border: 'rgba(248,113,113,.18)', color: '#f87171', icon: '🔥' },
    'Team Anchor': { bg: 'rgba(77,201,246,.06)', border: 'rgba(77,201,246,.18)', color: '#4dc9f6', icon: '🛡' },
    'Mechanical Prodigy': { bg: 'rgba(245,166,35,.06)', border: 'rgba(245,166,35,.18)', color: '#f5a623', icon: '🎯' },
    'Calculated Carry': { bg: 'rgba(167,139,250,.06)', border: 'rgba(167,139,250,.18)', color: '#a78bfa', icon: '⚡' },
    'Clutch Player': { bg: 'rgba(248,113,113,.06)', border: 'rgba(248,113,113,.18)', color: '#fb923c', icon: '🗡' },
    'Support Pillar': { bg: 'rgba(52,211,153,.06)', border: 'rgba(52,211,153,.18)', color: '#34d399', icon: '💙' },
    'Aggressive Leader': { bg: 'rgba(248,113,113,.05)', border: 'rgba(248,113,113,.14)', color: '#fb7185', icon: '⚔️' },
    'Safe Carry': { bg: 'rgba(148,163,184,.06)', border: 'rgba(148,163,184,.18)', color: '#94a3b8', icon: '🌙' },
    'Adaptive Flex': { bg: 'rgba(234,179,8,.06)', border: 'rgba(234,179,8,.18)', color: '#eab308', icon: '🔄' },
  };

  function renderArchetypeLb(data) {
    const el = document.getElementById('lbContent');
    if (!el) return;
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="lb-empty">No archetype results yet — be the first to take the identity test!</div>';
      return;
    }

    // Aggregate: count per archetype, avg scores
    const agg = {};
    data.forEach(r => {
      if (!agg[r.archetype]) agg[r.archetype] = { name: r.archetype, count: 0, totA: 0, totT: 0, totM: 0, totR: 0 };
      const a = agg[r.archetype];
      a.count++;
      a.totA += r.score_aggression; a.totT += r.score_teamplay;
      a.totM += r.score_mechanics; a.totR += r.score_risk;
    });
    const ranked = Object.values(agg).map(a => ({
      ...a,
      avgA: Math.round(a.totA / a.count),
      avgT: Math.round(a.totT / a.count),
      avgM: Math.round(a.totM / a.count),
      avgR: Math.round(a.totR / a.count),
    })).sort((a, b) => b.count - a.count);

    const totalPicks = ranked.reduce((s, r) => s + r.count, 0);
    const maxCount = ranked[0] ? ranked[0].count : 1;
    const medalCls = ['la-gold', 'la-silver', 'la-bronze'];

    let html = '<div class="lb-archetype-header">';
    html += '<div class="lb-arch-icon">🧬</div>';
    html += '<div class="lb-arch-title">Gaming Archetype Leaderboard</div>';
    html += '<div class="lb-arch-sub">See how your competitive playstyle compares to other players</div>';
    html += '<div class="lb-arch-total">' + totalPicks + ' Players Tested</div>';
    html += '</div>';

    html += '<div class="lb-arch-grid">';
    ranked.forEach((r, i) => {
      const ac = ARCHETYPE_COLORS[r.name] || ARCHETYPE_COLORS['Adaptive Flex'];
      const pct = Math.round((r.count / totalPicks) * 100);
      const barW = Math.round((r.count / maxCount) * 100);
      const topCls = i < 3 ? ' ' + medalCls[i] : '';

      html += '<div class="lb-arch-card' + topCls + '" style="border-color:' + ac.border + '">';

      // Rank column — icon inside a box
      html += '<div class="lb-arch-rank" style="background:' + ac.bg + ';border-color:' + ac.border + '">';
      html += '<div class="lb-arch-rank-icon">' + ac.icon + '</div>';
      html += '<div class="lb-arch-rank-num">#' + (i + 1) + '</div>';
      html += '</div>';

      // Info column
      html += '<div class="lb-arch-info">';
      html += '<div class="lb-arch-name" style="color:' + ac.color + '">' + r.name + '</div>';
      html += '<div class="lb-arch-meta">';
      html += '<span class="lb-arch-picks">' + r.count + ' player' + (r.count !== 1 ? 's' : '') + '</span>';
      html += '<span class="lb-arch-pct" style="background:' + ac.bg + ';color:' + ac.color + '">' + pct + '%</span>';
      html += '</div>';
      html += '<div class="lb-arch-bar-track"><div class="lb-arch-bar-fill" style="width:' + barW + '%;background:linear-gradient(90deg,' + ac.color + ',' + ac.color + '88)"></div></div>';
      html += '</div>';

      // Trait column — 2x2 grid
      html += '<div class="lb-arch-traits">';
      html += '<div class="lb-arch-trait"><span class="lb-arch-trait-label">AGG</span><span class="lb-arch-trait-val" style="color:' + ac.color + '">' + r.avgA + '</span></div>';
      html += '<div class="lb-arch-trait"><span class="lb-arch-trait-label">TEAM</span><span class="lb-arch-trait-val" style="color:' + ac.color + '">' + r.avgT + '</span></div>';
      html += '<div class="lb-arch-trait"><span class="lb-arch-trait-label">MECH</span><span class="lb-arch-trait-val" style="color:' + ac.color + '">' + r.avgM + '</span></div>';
      html += '<div class="lb-arch-trait"><span class="lb-arch-trait-label">RISK</span><span class="lb-arch-trait-val" style="color:' + ac.color + '">' + r.avgR + '</span></div>';
      html += '</div>';

      html += '</div>';
    });
    html += '</div>';

    el.innerHTML = html;
  }

  function renderLbTable(data, game) {
    const el = document.getElementById('lbContent');
    if (!el) return;

    if (!data || data.length === 0) {
      el.innerHTML = '<div class="lb-empty">No quiz results yet — be the first to take a quiz!</div>';
      return;
    }

    // Pre-fetch portrait maps for OW and VAL if not cached
    const needOW = data.some(d => d.game_id === 'overwatch') && !state._lbOwPortraits;
    const needVAL = data.some(d => d.game_id === 'valorant') && !state._lbValPortraits;
    const needLoLVer = data.some(d => d.game_id === 'lol') && !state._lbLolVersion;

    const fetches = [];
    if (needOW) fetches.push(
      fetch('https://overfast-api.tekrop.fr/heroes').then(r => r.json()).then(heroes => {
        state._lbOwPortraits = {};
        for (const h of heroes) state._lbOwPortraits[h.name] = h.portrait;
      }).catch(() => { state._lbOwPortraits = state.owPortraits || {}; })
    );
    if (needVAL) fetches.push(
      fetch('https://valorant-api.com/v1/agents?isPlayableCharacter=true').then(r => r.json()).then(res => {
        state._lbValPortraits = {};
        for (const a of (res.data || [])) state._lbValPortraits[a.displayName] = a.displayIcon;
      }).catch(() => { state._lbValPortraits = state.valPortraits || {}; })
    );
    if (needLoLVer) fetches.push(
      fetch('https://ddragon.leagueoflegends.com/api/versions.json').then(r => r.json()).then(v => {
        state._lbLolVersion = v[0];
      }).catch(() => { state._lbLolVersion = state.lolVersion || '15.6.1'; })
    );

    if (fetches.length > 0) {
      Promise.all(fetches).then(() => renderLbTableInner(data, game, el));
    } else {
      renderLbTableInner(data, game, el);
    }
  }

  function renderLbTableInner(data, game, el) {
    const maxPicks = data[0].picks || 1;
    const totalPicks = data.reduce((s, d) => s + (d.picks || 0), 0);
    const gameColors = { lol:'#c8a44e', overwatch:'#f0962a', valorant:'#fd4556', deadlock:'#e8734a', r6:'#5aaddb', marvel_rivals:'#C41E3A' };
    const gameLabels = { lol:'LoL', overwatch:'OW', valorant:'VAL', deadlock:'DL', r6:'R6', marvel_rivals:'MR' };

    function heroIconUrl(d) {
      // Direct icon_url from DB (MR, R6, DL)
      if (d.icon_url && !d.icon_url.includes('fandom.com')) return d.icon_url;
      // LoL: ddragon CDN
      if (d.game_id === 'lol' && d.slug) {
        const key = d.slug.charAt(0).toUpperCase() + d.slug.slice(1);
        const ver = state._lbLolVersion || state.lolVersion || '15.6.1';
        return 'https://ddragon.leagueoflegends.com/cdn/' + ver + '/img/champion/' + key + '.png';
      }
      // OW: OverFast API portraits
      if (d.game_id === 'overwatch') {
        const owP = state._lbOwPortraits || state.owPortraits || {};
        if (owP[d.hero_name]) return owP[d.hero_name];
      }
      // Valorant: valorant-api.com portraits
      if (d.game_id === 'valorant') {
        const valP = state._lbValPortraits || state.valPortraits || {};
        if (valP[d.hero_name]) return valP[d.hero_name];
      }
      // Deadlock fallback
      if (d.game_id === 'deadlock' && d.slug) {
        return 'https://deadlock.wiki/Special:FilePath/' + encodeURIComponent(d.slug) + '.png';
      }
      return null;
    }

    const rows = data.slice(0, 20).map((d, i) => {
      const pct = Math.round((d.picks / maxPicks) * 100);
      const barColor = game === 'all' ? (gameColors[d.game_id] || 'var(--cyan)') : (gameColors[game] || 'var(--cyan)');
      const initials = d.hero_name.replace(/[^A-Za-z ]/g, '').split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const gameTag = game === 'all' ? '<span style="margin-left:4px;font-size:8px;opacity:.5;letter-spacing:.06em">' + (gameLabels[d.game_id] || '') + '</span>' : '';
      const roleTag = d.role ? '<span style="opacity:.45"> · ' + d.role + '</span>' : '';

      const imgUrl = heroIconUrl(d);
      const iconHTML = imgUrl
        ? '<div class="lb-icon" style="background:' + barColor + '10;border-color:' + barColor + '30;overflow:hidden;padding:0">' +
          '<img src="' + imgUrl + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:7px" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'' + initials + '\';this.parentElement.style.color=\'' + barColor + '\'">' +
          '</div>'
        : '<div class="lb-icon" style="color:' + barColor + ';background:' + barColor + '10;border-color:' + barColor + '25">' + initials + '</div>';

      return `
        <div class="lb-row">
          <div class="lb-rank">#${i + 1}</div>
          ${iconHTML}
          <div class="lb-info">
            <div class="lb-name">${d.hero_name}${gameTag}</div>
            <div class="lb-meta">${d.picks} recommendation${d.picks !== 1 ? 's' : ''}${roleTag}</div>
          </div>
          <div class="lb-bar-wrap">
            <div class="lb-bar"><div class="lb-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          </div>
          <div class="lb-count">${d.picks}</div>
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="lb-table">${rows}</div>
      <div class="lb-total">${totalPicks} total recommendations across all quizzes</div>
    `;

    // Animate bars
    setTimeout(() => {
      el.querySelectorAll('.lb-bar-fill').forEach(bar => {
        const w = bar.style.width;
        bar.style.width = '0%';
        requestAnimationFrame(() => { bar.style.width = w; });
      });
    }, 50);
  }

  // Leaderboard particles
  spawnPageParticles('lbBg', '_lbBgCleanup');
}

  });

  // ── Canvas particle system ──
  const cvs = document.getElementById('particleCanvas');
  if (cvs) {
    const ctx = cvs.getContext('2d');
    let W, H, animId = null, alive = true;

    // Color palette matching site accents
    const COLORS = [
      { r:0,   g:200, b:255 },  // cyan
      { r:120, g:80,  b:230 },  // purple
      { r:255, g:150, b:40  },  // amber/orange
      { r:200, g:160, b:70  },  // gold
      { r:160, g:190, b:220 },  // steel blue
    ];

    const COUNT = window.innerWidth <= 768 ? 0 : window.innerWidth < 860 ? 42 : 60;
    const particles = [];

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      cvs.width  = W * dpr;
      cvs.height = H * dpr;
      cvs.style.width  = W + 'px';
      cvs.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawn(stagger) {
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      const rad = 0.8 + Math.random() * 2;
      const p = {
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -0.05 - Math.random() * 0.15,
        r: rad,
        c,
        baseA: 0.2 + Math.random() * 0.35,
        a: 0,
        phase: Math.random() * 6.28,
        pSpeed: 0.004 + Math.random() * 0.008,
        age: stagger ? Math.random() * 900 | 0 : 0,
        ttl: 500 + Math.random() * 700 | 0,
      };
      return p;
    }

    function tick() {
      if (!alive) return;
      ctx.clearRect(0, 0, W, H);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.age++;
        p.phase += p.pSpeed;

        // Lifecycle alpha: fade-in 60 frames, sustain, fade-out 60 frames
        const fi = Math.min(p.age / 60, 1);
        const fo = p.age > p.ttl - 60 ? Math.max((p.ttl - p.age) / 60, 0) : 1;
        const pulse = 0.65 + 0.35 * Math.sin(p.phase);
        p.a = p.baseA * fi * fo * pulse;

        // Respawn if dead or off-screen
        if (p.age >= p.ttl || p.x < -30 || p.x > W + 30 || p.y < -30 || p.y > H + 30) {
          particles[i] = spawn(false);
          continue;
        }

        const {r: cr, g: cg, b: cb} = p.c;

        // Outer halo — soft glow around each particle
        if (p.r > 1) {
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
          grad.addColorStop(0, `rgba(${cr},${cg},${cb},${(p.a * 0.15).toFixed(3)})`);
          grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
          ctx.fillStyle = grad;
          ctx.fillRect(p.x - p.r * 4, p.y - p.r * 4, p.r * 8, p.r * 8);
        }

        // Core dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, 6.28);
        ctx.fillStyle = `rgba(${cr},${cg},${cb},${p.a.toFixed(3)})`;
        ctx.fill();
      }

      animId = requestAnimationFrame(tick);
    }

    // Init
    resize();
    for (let i = 0; i < COUNT; i++) particles.push(spawn(true));
    tick();

    window.addEventListener('resize', resize);

    // Cleanup function — stored globally so re-entry can kill previous loop
    window._homeBgCleanup = function() {
      alive = false;
      if (animId) cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
    };
  }
  } // end desktop-only bg
}
