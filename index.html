<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1115;--bg2:#1a1f2b;--bg3:#222836;--border:#2a3142;--border2:#363f54;
  --txt:#ffffff;--txt2:#aab0c0;--txt3:#5c6478;
  --cyan:#4dc9f6;--purple:#a78bfa;--green:#34d399;--amber:#f5a623;--red:#f87171;
  --lol-gold:#c8a44e;--lol-blue:#1a2a4a;--dl-orange:#e8734a;--dl-steel:#90a8be;--dl-dark:#14161c;
  --ow-orange:#f0962a;--ow-dark:#1c1810;
  --val-red:#fd4556;--r6-blue:#5aaddb;
  --glow-cyan:0 0 24px rgba(77,201,246,.15);--glow-purple:0 0 24px rgba(167,139,250,.15);
  --card-shadow:0 2px 8px rgba(0,0,0,.28),0 8px 32px rgba(0,0,0,.22);
  --card-hover-shadow:0 8px 32px rgba(0,0,0,.38),0 0 0 1px rgba(255,255,255,.05);
  --card-bg:#1a1f2b;
  --card-bg-grad:linear-gradient(168deg,#1e2433 0%,#1a1f2b 100%);
  --glass:rgba(26,31,43,.75);
  --glass-border:rgba(255,255,255,.07);
  --section-gap:20px;
  --card-gap:16px;
  --section-pad:48px;
  --container:1280px;
}

body{
  background:var(--bg);color:var(--txt);margin:0;touch-action:manipulation;
  font-family:'Chakra Petch','JetBrains Mono',monospace;
  -webkit-font-smoothing:antialiased;min-height:100vh;width:100%;box-sizing:border-box;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(77,201,246,.025) 0%, transparent 55%);
  background-size:100% 100%;
}
button{font-family:'Chakra Petch',monospace;cursor:pointer}
*,*::before,*::after{box-sizing:border-box}

/* ── Layout ── */
#root{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;width:100%;position:relative;z-index:1}
#root.root-home{padding:0;justify-content:flex-start}
#root.root-wide{display:block;padding:68px 24px 32px}
.wrap{max-width:640px;margin:0 auto}
.wrap.wrap-home{max-width:100%;width:100%}
.wrap-wide{max-width:var(--container);margin:0 auto}

/* ── Animations ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scanline{0%{background-position:0 0}100%{background-position:0 100%}}
@keyframes glowPulse{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes subtleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes btnGlow{0%,100%{box-shadow:0 0 0 0 rgba(77,201,246,0)}50%{box-shadow:0 0 16px 2px rgba(77,201,246,.12)}}

.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}

/* ── Home Screen — Game Launcher ── */
.home-wrap{display:flex;flex-direction:column;align-items:center;width:100%;animation:fadeUp .4s ease both;position:relative}

/* ═══════════════════════════════════════════════════════════
   BACKGROUND — gradient base + canvas particles + glow orbs
   Injected into <body> to avoid animation containing-block.
   ═══════════════════════════════════════════════════════════ */
.home-bg{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  pointer-events:none;z-index:0;overflow:hidden;
}

/* Layer 1 — radial glow: center brightness creates focal depth */
.bg-glow{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 50% 40%, rgba(77,201,246,.05) 0%, transparent 70%),
    radial-gradient(ellipse 55% 45% at 25% 60%, rgba(167,139,250,.035) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 75% 45%, rgba(232,115,74,.03) 0%, transparent 55%);
}

/* Layer 2 — vignette: frame the viewport */
.bg-vignette{
  position:absolute;inset:0;z-index:1;
  background:radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,.4) 100%);
}

/* Layer 3 — particle canvas */
.bg-canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;
}

/* Layer 4 — floating glow orbs */
.bg-orbs{position:absolute;inset:0;z-index:3;overflow:hidden}
.bg-orb{
  position:absolute;border-radius:50%;
  filter:blur(70px);opacity:0;
  will-change:transform,opacity;
}
.bg-orb.orb-live{
  transition:opacity 2s ease;opacity:1;
  animation:orbDrift 16s ease-in-out infinite alternate;
}
@keyframes orbDrift{
  0%  {transform:translate(0,0) scale(1)}
  25% {transform:translate(15px,-20px) scale(1.06)}
  50% {transform:translate(-10px,16px) scale(.93)}
  75% {transform:translate(8px,-10px) scale(1.03)}
  100%{transform:translate(-5px,8px) scale(.97)}
}
.bg-orb.orb-1{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(77,201,246,.05) 0%,transparent 70%);
  left:5%;top:10%;animation-duration:19s;
}
.bg-orb.orb-2{
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(167,139,250,.045) 0%,transparent 70%);
  right:5%;top:8%;animation-duration:16s;animation-delay:-5s;
}
.bg-orb.orb-3{
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(240,150,42,.04) 0%,transparent 70%);
  left:30%;bottom:5%;animation-duration:21s;animation-delay:-9s;
}
.bg-orb.orb-4{
  width:250px;height:250px;
  background:radial-gradient(circle,rgba(200,164,78,.035) 0%,transparent 70%);
  right:20%;bottom:18%;animation-duration:14s;animation-delay:-3s;
}

/* Layer 5 — noise texture */
.bg-noise{
  position:absolute;inset:0;z-index:4;
  opacity:.03;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* Responsive — scale orbs for smaller screens */
@media(max-width:860px){
  .bg-orb.orb-1{width:280px;height:280px}
  .bg-orb.orb-2{width:240px;height:240px}
  .bg-orb.orb-3{width:220px;height:220px}
  .bg-orb.orb-4{display:none}
}
@media(max-width:540px){
  .bg-orb{filter:blur(90px)}
  .bg-orb.orb-1{width:200px;height:200px}
  .bg-orb.orb-2{width:180px;height:180px}
  .bg-orb.orb-3{width:160px;height:160px}
}

/* ── Header — polished hero header ── */
.home-header{text-align:center;margin-bottom:36px}
.home-title{
  font-family:'Syne',sans-serif;font-size:clamp(44px,10vw,72px);font-weight:800;
  letter-spacing:-0.05em;line-height:.85;margin-bottom:14px;
  background:linear-gradient(135deg,#fff 10%,var(--cyan) 50%,var(--purple) 95%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(77,201,246,.06));
}
.home-tagline{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:16px;
  color:var(--txt2);line-height:1.5;max-width:360px;margin:0 auto;
}
/* Decorative divider below header */
.home-divider{
  width:120px;height:1px;margin:0 auto 32px;
  background:linear-gradient(90deg,transparent,rgba(77,201,246,.25),rgba(167,139,250,.25),transparent);
}

.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--card-gap);width:100%;max-width:1100px;margin:0 auto 24px}
.home-grid-coming{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--card-gap);width:100%;max-width:500px;margin:0 auto}
@media(max-width:960px){.home-grid{grid-template-columns:repeat(2,1fr);max-width:700px}}
@media(max-width:540px){.home-grid{grid-template-columns:1fr;gap:12px;max-width:400px;margin:0 auto}.home-grid-coming{grid-template-columns:1fr;gap:10px;max-width:400px}}

/* ── Game Card ── */
.game-card{
  position:relative;overflow:hidden;border-radius:18px;
  padding:0;text-align:center;cursor:pointer;
  display:flex;flex-direction:column;align-items:stretch;gap:0;
  border:1px solid var(--border);
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .4s,border-color .35s;
}
.gc-accent{
  height:3px;width:100%;flex-shrink:0;
}
.gc-lol .gc-accent{background:linear-gradient(90deg,transparent 5%,#c89b3c 30%,#f0e6d2 50%,#c89b3c 70%,transparent 95%)}
.gc-dl .gc-accent{background:linear-gradient(90deg,transparent 5%,#e8734a 30%,#ff9060 50%,#e8734a 70%,transparent 95%)}
.gc-ow .gc-accent{background:linear-gradient(90deg,transparent 5%,#f0962a 30%,#ffc966 50%,#f0962a 70%,transparent 95%)}
.gc-val .gc-accent{background:linear-gradient(90deg,transparent 5%,#fd4556 30%,#ff6b77 50%,#fd4556 70%,transparent 95%)}
.gc-r6 .gc-accent{background:linear-gradient(90deg,transparent 5%,#5aaddb 30%,#6ab8e0 50%,#5aaddb 70%,transparent 95%)}
.gc-coming .gc-accent{opacity:.35}
.gc-body{
  padding:24px 20px 22px;display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;
}
.game-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .4s;z-index:0;pointer-events:none;
}
.game-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;opacity:0;
  transition:opacity .35s;z-index:0;pointer-events:none;
}
.game-card>*{position:relative;z-index:1}
.game-card.gc-coming{cursor:default;opacity:.5;filter:grayscale(.3)}
.game-card.gc-coming:hover{transform:none;border-color:var(--border)}
/* LoL — deep navy / gold */
.game-card.gc-lol{
  background:linear-gradient(170deg,#141c2e 0%,#171f30 50%,#1a2236 100%);
  border-color:#2a3450;
}
.game-card.gc-lol::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(200,164,78,.10) 0%,transparent 65%);
}
.game-card.gc-lol::after{
  background:linear-gradient(90deg,transparent,rgba(200,164,78,.3),transparent);
}
.game-card.gc-lol:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(200,164,78,.45);
  box-shadow:0 12px 40px rgba(200,164,78,.08),0 0 0 1px rgba(200,164,78,.06);
}
.game-card.gc-lol:hover::before{opacity:1}
.game-card.gc-lol:hover::after{opacity:1}
/* Deadlock — charcoal / teal-orange */
.game-card.gc-dl{
  background:linear-gradient(170deg,#161412 0%,#1a1816 50%,#1e1c18 100%);
  border-color:#2e2820;
}
.game-card.gc-dl::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(232,115,74,.08) 0%,transparent 65%);
}
.game-card.gc-dl::after{
  background:linear-gradient(90deg,transparent,rgba(232,115,74,.28),transparent);
}
.game-card.gc-dl:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(232,115,74,.40);
  box-shadow:0 12px 40px rgba(232,115,74,.08),0 0 0 1px rgba(232,115,74,.05);
}
.game-card.gc-dl:hover::before{opacity:1}
.game-card.gc-dl:hover::after{opacity:1}
/* Overwatch — warm charcoal / orange */
.game-card.gc-ow{
  background:linear-gradient(170deg,#181614 0%,#1e1c18 50%,#201e18 100%);
  border-color:#302820;
}
.game-card.gc-ow::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(240,150,42,.08) 0%,transparent 65%);
}
.game-card.gc-ow::after{
  background:linear-gradient(90deg,transparent,rgba(240,150,42,.28),transparent);
}
.game-card.gc-ow:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(240,150,42,.40);
  box-shadow:0 12px 40px rgba(240,150,42,.08),0 0 0 1px rgba(240,150,42,.05);
}
.game-card.gc-ow:hover::before{opacity:1}
.game-card.gc-ow:hover::after{opacity:1}
/* Valorant — dark grey / red */
.game-card.gc-val{
  background:linear-gradient(170deg,#161416 0%,#1c191c 40%,#1a171a 100%);
  border-color:#2e2024;
}
.game-card.gc-val::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(253,69,86,.07) 0%,transparent 65%);
}
.game-card.gc-val::after{
  background:linear-gradient(90deg,transparent,rgba(253,69,86,.24),transparent);
}
.game-card.gc-val:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(253,69,86,.40);
  box-shadow:0 12px 40px rgba(253,69,86,.08),0 0 0 1px rgba(253,69,86,.05);
}
.game-card.gc-val:hover::before{opacity:1}
.game-card.gc-val:hover::after{opacity:1}
/* R6 — dark navy / blue */
.game-card.gc-r6{
  background:linear-gradient(170deg,#121620 0%,#161a26 40%,#181c28 100%);
  border-color:#222e44;
}
.game-card.gc-r6::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(90,173,219,.07) 0%,transparent 65%);
}
.game-card.gc-r6::after{
  background:linear-gradient(90deg,transparent,rgba(90,173,219,.24),transparent);
}
.game-card.gc-r6:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(90,173,219,.40);
  box-shadow:0 12px 40px rgba(90,173,219,.08),0 0 0 1px rgba(90,173,219,.05);
}
.game-card.gc-r6:hover::before{opacity:1}
.game-card.gc-r6:hover::after{opacity:1}
.gc-r6 .gc-title{color:#7ec0e0}
.gc-r6 .gc-cta{color:var(--r6-blue);border-color:rgba(90,173,219,.15);background:rgba(90,173,219,.06)}
.gc-r6:hover .gc-cta{background:rgba(90,173,219,.14);box-shadow:0 0 16px rgba(90,173,219,.08)}
/* Marvel Rivals — deep red / maroon */
.gc-mr .gc-accent{background:linear-gradient(90deg,transparent 5%,#C41E3A 25%,#D4A24E 50%,#C41E3A 75%,transparent 95%)}
.game-card.gc-mr{
  background:linear-gradient(170deg,#180C12 0%,#1C0E16 50%,#1A0C14 100%);
  border-color:#3A1C28;
}
.game-card.gc-mr::before{
  background:radial-gradient(ellipse at 50% -20%,rgba(196,30,58,.10) 0%,transparent 65%);
}
.game-card.gc-mr::after{
  background:linear-gradient(90deg,transparent,rgba(196,30,58,.25),rgba(212,162,78,.12),transparent);
}
.game-card.gc-mr:hover{
  transform:translateY(-5px) scale(1.015);
  border-color:rgba(196,30,58,.50);
  box-shadow:0 12px 40px rgba(196,30,58,.10),0 0 0 1px rgba(196,30,58,.08),0 0 24px rgba(212,162,78,.04);
}
.game-card.gc-mr:hover::before{opacity:1}
.game-card.gc-mr:hover::after{opacity:1}
.gc-mr .gc-title{color:#E8606E}
.gc-mr .gc-cta{color:#E8606E;border-color:rgba(196,30,58,.22);background:rgba(196,30,58,.08)}
.gc-mr:hover .gc-cta{background:rgba(196,30,58,.18);box-shadow:0 0 20px rgba(196,30,58,.12)}
.gc-logo-svg.mr-svg{filter:drop-shadow(0 0 12px rgba(196,30,58,.20))}
.gc-mr .gc-logo-img{filter:brightness(1.0) drop-shadow(0 0 12px rgba(196,30,58,.18))}

/* Logo area */
.gc-logo-area{
  height:44px;display:flex;align-items:center;justify-content:center;
  margin-bottom:0;position:relative;width:100%;
}
.gc-logo-img{
  max-height:44px;max-width:200px;width:auto;height:auto;
  object-fit:contain;transition:filter .3s,transform .3s;
}
.gc-lol .gc-logo-img{filter:brightness(1.0) drop-shadow(0 0 12px rgba(200,155,60,.15));max-height:52px}
.gc-lol .gc-logo-area{height:52px}
.gc-dl .gc-logo-img{filter:brightness(1.0) drop-shadow(0 0 12px rgba(255,107,53,.12))}
.gc-ow .gc-logo-img{filter:brightness(1.0) drop-shadow(0 0 14px rgba(249,158,26,.20));max-height:52px}
.gc-ow .gc-logo-area{height:52px}
.game-card:hover .gc-logo-img{filter:brightness(1.15) drop-shadow(0 0 16px rgba(255,255,255,.08));transform:scale(1.03)}
/* Fallback SVG icons */
.gc-logo-svg{width:auto;max-width:120px;height:36px}
.gc-logo-svg.lol-svg{filter:drop-shadow(0 0 14px rgba(200,155,60,.25));height:48px;width:48px}
.gc-logo-svg.dl-svg{filter:drop-shadow(0 0 12px rgba(255,107,53,.16))}
.gc-logo-svg.ow-svg{filter:drop-shadow(0 0 12px rgba(249,158,26,.20));height:48px;width:48px}
.gc-logo-svg.val-svg{filter:drop-shadow(0 0 10px rgba(255,70,85,.14))}
.gc-logo-svg.r6-svg{filter:drop-shadow(0 0 10px rgba(64,156,205,.14))}
/* Game title — uniform across all cards */
.gc-title{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:.06em;text-align:center;line-height:1.2;
  margin:2px 0 0;
}
.gc-lol .gc-title{color:#d4be82}
.gc-dl .gc-title{color:#e8a870}
.gc-ow .gc-title{color:#f0b840}
.gc-val .gc-title{color:#e0606a}
.gc-r6 .gc-title{color:#6ab0d0}
.gc-subtitle{font-size:13.5px;color:var(--txt2);letter-spacing:.02em;font-weight:500;line-height:1.45}
.gc-meta{font-size:10.5px;color:var(--txt3);letter-spacing:.04em;font-weight:500;margin-top:0}
.gc-coming-badge{
  display:inline-block;padding:3px 10px;border-radius:4px;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;
  background:rgba(255,255,255,.04);color:var(--txt3);border:1px solid var(--border);margin-top:4px;
}
.gc-cta{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:4px;padding:10px 26px;border-radius:10px;
  font-family:'Chakra Petch',monospace;font-size:12px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;border:none;
  transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.gc-cta:active{transform:scale(.97)}
.gc-lol .gc-cta{
  background:rgba(200,155,60,.10);color:var(--lol-gold);border:1px solid rgba(200,155,60,.22);
}
.gc-lol:hover .gc-cta{background:rgba(200,155,60,.18);box-shadow:0 0 24px rgba(200,155,60,.14)}
.gc-dl .gc-cta{
  background:rgba(255,107,53,.08);color:var(--dl-orange);border:1px solid rgba(255,107,53,.20);
}
.gc-dl:hover .gc-cta{background:rgba(255,107,53,.16);box-shadow:0 0 24px rgba(255,107,53,.14)}
.gc-ow .gc-cta{

/* ── Identity Results Page ── */
.id-results{width:100%;max-width:660px;margin:0 auto;padding:72px var(--side-pad) 40px;animation:fadeUp .5s ease both}

}

.id-overtitle{

}
.id-icon{font-size:48px;margin-bottom:8px;display:block;position:relative;z-index:1}
.id-name{

}
.id-desc{

}
.id-trait-grid{
  display:flex;justify-content:center;gap:20px;flex-wrap:wrap;

}
.id-trait{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:60px}
.id-trait-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:#fff}
.id-trait-label{font-size:8px;letter-spacing:.10em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.id-cross-section{
  position:relative;z-index:1;margin:20px 0;
  padding:16px 20px;border-radius:12px;
  background:rgba(167,139,250,.03);border:1px solid rgba(167,139,250,.10);text-align:left;
}
.id-cross-title{
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
  color:var(--purple);margin-bottom:10px;
}
.id-cross-desc{font-size:11px;color:var(--txt2);line-height:1.5;margin-bottom:12px}
.id-hero-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.id-hero-game{
  font-size:8px;letter-spacing:.08em;font-weight:700;color:var(--txt3);
  text-transform:uppercase;min-width:70px;
}
.id-hero-name{font-size:11px;color:var(--txt);font-weight:600}
.id-share{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 24px;border-radius:10px;font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  background:rgba(167,139,250,.06);color:var(--purple);border:1px solid rgba(167,139,250,.20);

}
.id-share:hover{background:rgba(167,139,250,.14);transform:translateY(-1px)}
.id-restart{

}
.id-restart:hover{color:#fff;border-color:var(--border2)}

.home-footer{
  display:flex;align-items:center;justify-content:center;gap:18px;
  font-size:9.5px;color:var(--txt3);letter-spacing:.06em;font-weight:500;
  padding:10px 20px;border-radius:20px;

}
.home-footer span{display:flex;align-items:center;gap:5px}
.home-footer svg{width:11px;height:11px;opacity:.45}

/* ── Leaderboard Page ── */
.lb-page{max-width:900px;margin:0 auto;padding-top:12px;animation:fadeUp .4s ease both;position:relative;z-index:1}
.lb-header{text-align:center;margin-bottom:28px}
.lb-title{
  font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,30px);font-weight:800;
  color:#fff;letter-spacing:-.02em;margin-bottom:4px;
}
.lb-sub{font-size:12px;color:var(--txt2);letter-spacing:.02em}
.lb-tabs{
  display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-bottom:24px;
}
.lb-tab{
  padding:7px 16px;border-radius:8px;font-size:11px;font-weight:600;
  letter-spacing:.04em;color:var(--txt2);cursor:pointer;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  transition:all .2s;font-family:'Chakra Petch',monospace;
}
.lb-tab:hover{color:var(--txt);background:rgba(255,255,255,.04);border-color:var(--border2)}
.lb-tab.active{color:var(--cyan);background:rgba(77,201,246,.06);border-color:rgba(77,201,246,.18)}
.lb-loading{text-align:center;padding:40px 0;color:var(--txt3);font-size:12px}
.lb-loading .spinner{margin:0 auto 10px}
.lb-table{width:100%}
.lb-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;border-radius:10px;
  border:1px solid transparent;
  transition:all .2s;
}
.lb-row:nth-child(odd){background:rgba(255,255,255,.015)}
.lb-row:hover{background:rgba(255,255,255,.03);border-color:var(--border)}
.lb-rank{
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  color:var(--txt3);width:28px;text-align:center;flex-shrink:0;
}
.lb-row:nth-child(1) .lb-rank{color:#C8AA6E;font-size:15px}
.lb-row:nth-child(2) .lb-rank{color:#97A5B8}
.lb-row:nth-child(3) .lb-rank{color:#CD7F32}
.lb-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  background:var(--card-bg);border:1px solid var(--border);
}
.lb-info{flex:1;min-width:0}
.lb-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff}
.lb-meta{font-size:9px;color:var(--txt3);letter-spacing:.04em;margin-top:1px}
.lb-bar-wrap{width:120px;flex-shrink:0}
.lb-bar{height:6px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden}
.lb-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.lb-count{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  color:var(--txt2);width:50px;text-align:right;flex-shrink:0;
}
.lb-empty{text-align:center;padding:40px 0;color:var(--txt3);font-size:13px}
.lb-total{text-align:center;padding:16px 0 0;font-size:10px;color:var(--txt3);letter-spacing:.06em}
@media(max-width:540px){
  .lb-bar-wrap{width:60px}
  .lb-row{padding:8px 10px;gap:8px}
  .lb-name{font-size:12px}
  .lb-tab{padding:6px 12px;font-size:10px}
}
/* ── Identity tab accent ── */
.lb-tab[data-lb-game="identity"]{color:var(--purple)}
.lb-tab[data-lb-game="identity"].active{color:var(--purple);background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.18)}

/* ── Archetype Leaderboard ── */
.lb-archetype-header{text-align:center;margin-bottom:20px;position:relative;padding-top:6px}
.lb-arch-icon{font-size:28px;margin-bottom:4px;display:block;opacity:.8}
.lb-arch-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:5px;letter-spacing:-.02em}
.lb-arch-sub{font-size:10px;color:var(--txt3);letter-spacing:.04em;line-height:1.5;max-width:400px;margin:0 auto}
.lb-arch-total{
  display:inline-block;margin-top:8px;
  padding:4px 12px;border-radius:6px;font-size:9px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  background:rgba(167,139,250,.06);color:var(--purple);border:1px solid rgba(167,139,250,.14);
  font-family:'Chakra Petch',monospace;
}
.lb-arch-grid{display:flex;flex-direction:column;gap:10px}

/* Card */
.lb-arch-card{
  display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:14px;
  padding:14px 18px;border-radius:14px;
  background:var(--card-bg);border:1px solid var(--border);
  transition:border-color .25s,transform .18s,box-shadow .25s;position:relative;overflow:hidden;
}
.lb-arch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent)}
.lb-arch-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}

/* Top 3 medals */
.lb-arch-card.la-gold{border-color:rgba(234,179,8,.22);background:linear-gradient(135deg,rgba(234,179,8,.03),var(--card-bg))}
.lb-arch-card.la-gold::before{background:linear-gradient(90deg,transparent,rgba(234,179,8,.20),transparent)}
.lb-arch-card.la-silver{border-color:rgba(148,163,184,.22);background:linear-gradient(135deg,rgba(148,163,184,.03),var(--card-bg))}
.lb-arch-card.la-silver::before{background:linear-gradient(90deg,transparent,rgba(148,163,184,.18),transparent)}
.lb-arch-card.la-bronze{border-color:rgba(205,127,50,.20);background:linear-gradient(135deg,rgba(205,127,50,.03),var(--card-bg))}
.lb-arch-card.la-bronze::before{background:linear-gradient(90deg,transparent,rgba(205,127,50,.16),transparent)}

/* Rank column */
.lb-arch-rank{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:10px;flex-shrink:0;
  font-family:'Syne',sans-serif;font-weight:800;font-size:15px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
}
.lb-arch-rank-icon{font-size:18px;line-height:1}
.lb-arch-rank-num{font-size:8px;letter-spacing:.06em;color:var(--txt3);margin-top:1px}

/* Info column */
.lb-arch-info{min-width:0}
.lb-arch-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:3px;letter-spacing:-.01em}
.lb-arch-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.lb-arch-picks{font-size:9px;color:var(--txt3);letter-spacing:.03em;font-weight:500}
.lb-arch-pct{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:4px;
}
.lb-arch-bar-track{height:5px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden}
.lb-arch-bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.22,1,.36,1)}

/* Trait column */
.lb-arch-traits{
  display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;flex-shrink:0;
  font-size:9px;font-family:'JetBrains Mono',monospace;
}
.lb-arch-trait{
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.lb-arch-trait-label{color:var(--txt3);font-size:7px;letter-spacing:.06em;text-transform:uppercase;min-width:26px}
.lb-arch-trait-val{font-weight:700;color:var(--txt2);font-size:10px}

@media(max-width:540px){
  .lb-arch-card{grid-template-columns:36px 1fr;padding:12px 14px;gap:10px}
  .lb-arch-traits{display:none}
  .lb-arch-rank{width:36px;height:36px}
}

/* ── Auth Modal ── */
.auth-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.auth-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:32px 28px;width:100%;max-width:380px;position:relative;
  box-shadow:0 16px 48px rgba(0,0,0,.4);
}
.auth-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--txt3);font-size:18px;cursor:pointer;padding:4px}
.auth-close:hover{color:#fff}
.auth-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.auth-sub{font-size:11px;color:var(--txt3);margin-bottom:18px}
.auth-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.auth-field label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.auth-field input{
  padding:10px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);
  color:#fff;font-size:13px;font-family:'Chakra Petch',monospace;outline:none;transition:border-color .2s;
}
.auth-field input:focus{border-color:var(--cyan)}
.auth-btn{
  width:100%;padding:11px;border-radius:8px;font-size:12px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  background:rgba(77,201,246,.08);color:var(--cyan);border:1px solid rgba(77,201,246,.20);
  font-family:'Chakra Petch',monospace;transition:all .2s;margin-top:4px;
}
.auth-btn:hover{background:rgba(77,201,246,.16)}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-toggle{font-size:10px;color:var(--txt3);text-align:center;margin-top:12px}
.auth-toggle span{color:var(--cyan);cursor:pointer;font-weight:600}
.auth-toggle span:hover{text-decoration:underline}
.auth-error{font-size:10px;color:var(--red);margin-top:8px;text-align:center}
.auth-success{font-size:10px;color:var(--green);margin-top:8px;text-align:center}

/* ── Save Banner (results page) ── */
.save-banner{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:14px 20px;border-radius:12px;margin-bottom:16px;
  background:linear-gradient(135deg,rgba(28,34,52,.8),rgba(24,30,46,.85));

}

.save-banner-btn{
  padding:6px 16px;border-radius:7px;font-size:9px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  background:rgba(167,139,250,.08);color:#c4b5fd;border:1px solid rgba(167,139,250,.20);
  font-family:'Chakra Petch',monospace;transition:all .2s;white-space:nowrap;
}
.save-banner-btn:hover{background:rgba(167,139,250,.16)}
.save-banner-share{
  padding:6px 16px;border-radius:7px;font-size:9px;font-weight:700;

  background:rgba(77,201,246,.08);color:#6dd8f8;border:1px solid rgba(77,201,246,.20);

}
.save-banner-share:hover{background:rgba(77,201,246,.16)}

.save-banner.saved .save-banner-text{color:#5ee8b0}
.save-banner-signup{

.save-banner-signup-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#f0f2f7}
.save-banner-signup-sub{font-size:11px;color:#9aa3b8;text-align:center;line-height:1.5}
.save-banner-signup-btns{display:flex;gap:8px;margin-top:4px}

/* ── Playstyle Evolution Insight (Profile Page) ── */

.prof-game-hdr{

.prof-game-icon{font-size:20px}
.prof-game-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;flex:1}

/* ═══ COMMON — Cool Steel ═══ */

/* ═══ RARE — Electric Blue ═══ */
.emblem-rare{width:46px;height:46px}
.emblem-rare .emblem-core{width:40px;height:40px;
  background:radial-gradient(circle at 45% 40%,#1a5090,#0c3060 55%,#061830);
  border:2.5px solid #38a0f0;

}
.emblem-rare::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;z-index:0;

}
@keyframes rareRingPulse{0%,100%{border-color:rgba(56,160,240,.15);box-shadow:0 0 6px rgba(56,160,240,.1)}50%{border-color:rgba(56,160,240,.4);box-shadow:0 0 14px rgba(56,160,240,.2)}}
.emblem-rare .emblem-core::after{
  content:'';position:absolute;top:0;left:8%;right:8%;height:40%;border-radius:50%;
  background:linear-gradient(180deg,rgba(56,160,240,.15),transparent);pointer-events:none;z-index:1;
}
.emblem-rare .emblem-icon{font-size:18px;filter:drop-shadow(0 0 4px rgba(56,160,240,.4))}
.emblem-rare .emblem-name{color:#50b8ff;text-shadow:0 0 8px rgba(56,160,240,.5),0 1px 3px rgba(0,0,0,.8)}
.emblem-rare:hover{filter:drop-shadow(0 0 16px rgba(56,160,240,.45))}

/* ═══ EPIC — Vivid Purple ═══ */
.emblem-epic{width:50px;height:50px}
.emblem-epic .emblem-core{width:42px;height:42px;
  background:radial-gradient(circle at 45% 38%,#5020a0,#30106a 55%,#180840);
  border:2.5px solid #a855f7;
  box-shadow:0 0 0 1px rgba(168,85,247,.2),0 0 20px rgba(168,85,247,.25),0 0 40px rgba(168,85,247,.08),inset 0 1px 8px rgba(168,85,247,.2),inset 0 -2px 6px rgba(0,0,0,.35),0 4px 14px rgba(0,0,0,.45);
}
.emblem-epic::before{
  content:'';position:absolute;inset:-5px;border-radius:50%;z-index:0;
  background:conic-gradient(from 0deg,rgba(168,85,247,.35),transparent 25%,rgba(139,92,246,.25) 50%,transparent 75%,rgba(168,85,247,.35));
  animation:epicRingRotate 4s linear infinite;
}
.emblem-epic::after{
  content:'';position:absolute;inset:-2px;border-radius:50%;z-index:1;
  border:1px solid rgba(168,85,247,.25);
  box-shadow:0 0 8px rgba(168,85,247,.15);
  animation:epicGlowPulse 2.5s ease-in-out infinite;
}
@keyframes epicRingRotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes epicGlowPulse{0%,100%{box-shadow:0 0 8px rgba(168,85,247,.1)}50%{box-shadow:0 0 22px rgba(168,85,247,.3)}}
.emblem-epic .emblem-core::after{
  content:'';position:absolute;top:0;left:5%;right:5%;height:38%;border-radius:50%;
  background:linear-gradient(180deg,rgba(168,85,247,.18),transparent);pointer-events:none;z-index:1;
}
.emblem-epic .emblem-icon{font-size:20px;filter:drop-shadow(0 0 6px rgba(168,85,247,.5))}
.emblem-epic .emblem-name{color:#c084fc;text-shadow:0 0 10px rgba(168,85,247,.6),0 1px 3px rgba(0,0,0,.8)}
.emblem-epic:hover{filter:drop-shadow(0 0 22px rgba(168,85,247,.5))}

/* ═══ LEGENDARY — Blazing Gold ═══ */
.emblem-legendary{width:52px;height:52px}
.emblem-legendary .emblem-core{width:44px;height:44px;
  background:radial-gradient(circle at 45% 35%,#a06800,#6a3f00 50%,#3a2000);
  border:3px solid #fbbf24;
  box-shadow:0 0 0 1px rgba(251,191,36,.2),0 0 25px rgba(251,191,36,.3),0 0 50px rgba(251,191,36,.1),inset 0 2px 10px rgba(251,191,36,.2),inset 0 -2px 8px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.45);
}
.emblem-legendary::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;z-index:0;
  background:conic-gradient(from 0deg,rgba(251,191,36,.45),rgba(245,158,11,.15) 25%,rgba(251,191,36,.45) 50%,rgba(245,158,11,.15) 75%,rgba(251,191,36,.45));
  animation:epicRingRotate 5s linear infinite;
}
.emblem-legendary::after{
  content:'';position:absolute;inset:-10px;border-radius:50%;z-index:-1;
  background:radial-gradient(circle,rgba(251,191,36,.15),transparent 65%);
  animation:legendAuraPulse 2.5s ease-in-out infinite;
}
@keyframes legendAuraPulse{0%,100%{transform:scale(.9);opacity:.5}50%{transform:scale(1.15);opacity:1}}
.emblem-legendary .emblem-core::before{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:4;overflow:hidden;pointer-events:none;
  background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.18) 48%,rgba(255,255,255,.06) 52%,transparent 58%);
  animation:legendShimmer 3s ease-in-out infinite;
}
@keyframes legendShimmer{0%{transform:translateX(-80%)}100%{transform:translateX(80%)}}
.emblem-legendary .emblem-core::after{
  content:'';position:absolute;top:0;left:5%;right:5%;height:35%;border-radius:50%;
  background:linear-gradient(180deg,rgba(251,191,36,.2),transparent);pointer-events:none;z-index:1;
}
.emblem-legendary .emblem-icon{font-size:22px;filter:drop-shadow(0 0 8px rgba(251,191,36,.6))}
.emblem-legendary .emblem-name{color:#fbbf24;text-shadow:0 0 12px rgba(251,191,36,.6),0 1px 3px rgba(0,0,0,.8)}
.emblem-legendary:hover{filter:drop-shadow(0 0 28px rgba(251,191,36,.55))}

/* ═══ MYTHIC — Cosmic Rainbow ═══ */
.emblem-mythic{width:56px;height:56px}
.emblem-mythic .emblem-core{width:46px;height:46px;
  background:radial-gradient(circle at 42% 35%,#3a1060,#1a0838 55%,#0a0420);
  border:3px solid transparent;border-radius:50%;
  box-shadow:0 0 30px rgba(168,85,247,.2),0 0 60px rgba(56,189,248,.1),0 0 10px rgba(251,191,36,.1),inset 0 2px 12px rgba(168,85,247,.15),inset 0 -3px 10px rgba(0,0,0,.4),0 4px 18px rgba(0,0,0,.5);
}
/* Rainbow border via background-clip trick */
.emblem-mythic .emblem-border{
  position:absolute;inset:0;border-radius:50%;z-index:1;padding:3px;
  background:conic-gradient(from 0deg,#ff4080,#ff8c00,#fbbf24,#34d399,#38bdf8,#a855f7,#ff4080);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:epicRingRotate 3s linear infinite;
}
.emblem-mythic::before{
  content:'';position:absolute;inset:-7px;border-radius:50%;z-index:0;
  background:conic-gradient(from 180deg,rgba(255,64,128,.25),rgba(255,140,0,.15) 17%,rgba(251,191,36,.25) 33%,rgba(52,211,153,.15) 50%,rgba(56,189,248,.25) 67%,rgba(168,85,247,.15) 83%,rgba(255,64,128,.25));
  animation:epicRingRotate 4s linear infinite reverse;
  -webkit-mask:radial-gradient(transparent 58%,#000 60%);mask:radial-gradient(transparent 58%,#000 60%);
}
.emblem-mythic::after{
  content:'';position:absolute;inset:-14px;border-radius:50%;z-index:-1;
  background:radial-gradient(circle,rgba(168,85,247,.12),rgba(56,189,248,.06) 40%,transparent 65%);
  animation:mythicAura 2s ease-in-out infinite;
}
@keyframes mythicAura{0%,100%{transform:scale(.85);opacity:.4}50%{transform:scale(1.2);opacity:1}}
.emblem-mythic .emblem-core::before{
  content:'';position:absolute;inset:0;border-radius:50%;z-index:4;overflow:hidden;pointer-events:none;
  background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.15) 47%,rgba(255,255,255,.05) 53%,transparent 60%);
  animation:legendShimmer 2.5s ease-in-out infinite;
}
.emblem-mythic .emblem-core::after{
  content:'';position:absolute;top:0;left:5%;right:5%;height:35%;border-radius:50%;
  background:linear-gradient(180deg,rgba(168,85,247,.2),transparent);pointer-events:none;z-index:1;
}
.emblem-mythic .emblem-icon{font-size:24px;filter:drop-shadow(0 0 8px rgba(168,85,247,.5)) drop-shadow(0 0 4px rgba(56,189,248,.3))}
.emblem-mythic .emblem-name{
  font-size:8px;color:#e0b0ff;
  animation:mythicNameColor 4s ease-in-out infinite;
  text-shadow:0 0 12px rgba(168,85,247,.6),0 1px 3px rgba(0,0,0,.8);
}
@keyframes mythicNameColor{0%,100%{color:#e0b0ff}25%{color:#fbbf24}50%{color:#38bdf8}75%{color:#ff6090}}
.emblem-mythic:hover{filter:drop-shadow(0 0 30px rgba(168,85,247,.5)) drop-shadow(0 0 15px rgba(56,189,248,.3))}

/* Mythic floating particles */
.emblem-mythic .mp{
  position:absolute;border-radius:50%;pointer-events:none;z-index:5;
  animation:mpFloat var(--dur) ease-in-out infinite;animation-delay:var(--del);
}
@keyframes mpFloat{
  0%,100%{transform:translate(0,0) scale(0);opacity:0}
  15%{opacity:1;transform:translate(0,0) scale(1)}
  85%{opacity:.5;transform:translate(var(--tx),var(--ty)) scale(.5)}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

.prof-email{font-size:12px;color:#9aa3b8;letter-spacing:.03em}

/* ── Player Identity Card ── */
.pid-card{
  background:linear-gradient(168deg,rgba(30,28,52,.95),rgba(28,36,56,.85));

.prof-empty{text-align:center;padding:44px 0;color:#9aa3b8;font-size:13px}

}

/* ═══ STREAK FLAME SYSTEM ═══ */
.flame-wrap{position:relative;display:inline-flex;z-index:0}
.flame-ring{
  position:absolute;inset:-3px;border-radius:50%;pointer-events:none;z-index:0;
  opacity:0;
}
.flame-ring::before,.flame-ring::after{
  content:'';position:absolute;inset:0;border-radius:50%;
}

/* ── SPARK: subtle warm pulse ring ── */
.flame-wrap.flame-spark .flame-ring{opacity:1}
.flame-wrap.flame-spark .flame-ring::before{
  border:2px solid rgba(255,160,60,.4);
  animation:sparkPulse 2s ease-in-out infinite;
}
@keyframes sparkPulse{0%,100%{border-color:rgba(255,160,60,.3);box-shadow:0 0 4px rgba(255,140,50,.15)}50%{border-color:rgba(255,140,50,.5);box-shadow:0 0 8px rgba(255,120,30,.25)}}

/* ── BURNING: spinning gradient border ── */
.flame-wrap.flame-burning .flame-ring{opacity:1}
.flame-wrap.flame-burning .flame-ring::before{
  inset:-1px;
  background:conic-gradient(from 0deg,rgba(255,120,30,.6),rgba(255,80,10,.1),rgba(255,160,50,.5),rgba(255,80,10,.1),rgba(255,120,30,.6));
  animation:flameRotate 3s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
}
.flame-wrap.flame-burning .flame-ring::after{
  box-shadow:0 -4px 12px rgba(255,120,30,.3),0 0 6px rgba(255,80,10,.2);
  animation:burnGlow 1.5s ease-in-out infinite;
}
@keyframes flameRotate{to{transform:rotate(360deg)}}
@keyframes burnGlow{0%,100%{opacity:.6}50%{opacity:1}}

/* ── ON FIRE: faster spin + outer glow ring ── */
.flame-wrap.flame-onfire .flame-ring{opacity:1}
.flame-wrap.flame-onfire .flame-ring::before{
  inset:-2px;
  background:conic-gradient(from 0deg,rgba(255,100,20,.8),rgba(255,200,60,.2),rgba(255,60,10,.7),rgba(255,180,40,.2),rgba(255,100,20,.8));
  animation:flameRotate 2s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
}
.flame-wrap.flame-onfire .flame-ring::after{
  inset:-4px;border-radius:50%;
  box-shadow:0 -6px 16px rgba(255,100,20,.35),0 0 10px rgba(255,60,10,.2);
  animation:onfireGlow 1s ease-in-out infinite;
}
@keyframes onfireGlow{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

/* ── BLAZING: dual counter-rotating rings + intense glow ── */
.flame-wrap.flame-blazing .flame-ring{opacity:1}
.flame-wrap.flame-blazing .flame-ring::before{
  inset:-2px;
  background:conic-gradient(from 0deg,rgba(255,80,10,.9),transparent 30%,rgba(255,160,40,.7),transparent 60%,rgba(255,40,0,.8),transparent 85%,rgba(255,80,10,.9));
  animation:flameRotate 1.5s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
}
.flame-wrap.flame-blazing .flame-ring::after{
  inset:-3px;
  background:conic-gradient(from 180deg,rgba(255,200,60,.6),transparent 25%,rgba(255,120,20,.5),transparent 55%,rgba(255,200,60,.6));
  animation:flameRotate 2.5s linear infinite reverse;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
}
.flame-wrap.flame-blazing{filter:drop-shadow(0 -4px 10px rgba(255,80,10,.3)) drop-shadow(0 0 6px rgba(255,120,30,.2))}

/* ── INFERNO: purple spinning fire ring ── */
.flame-wrap.flame-inferno .flame-ring{opacity:1}
.flame-wrap.flame-inferno .flame-ring::before{
  inset:-2px;
  background:conic-gradient(from 0deg,rgba(167,139,250,.9),rgba(120,80,255,.2),rgba(192,132,252,.8),rgba(100,60,220,.2),rgba(167,139,250,.9));
  animation:flameRotate 1.8s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
}
.flame-wrap.flame-inferno .flame-ring::after{
  inset:-3px;
  background:conic-gradient(from 180deg,rgba(192,132,252,.5),transparent 20%,rgba(139,92,246,.4),transparent 50%,rgba(192,132,252,.5));
  animation:flameRotate 3s linear infinite reverse;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
}
.flame-wrap.flame-inferno{filter:drop-shadow(0 -4px 12px rgba(167,139,250,.3)) drop-shadow(0 0 8px rgba(120,80,255,.2))}

/* ── ETERNAL: rainbow cycling spinning ring + outer halo ── */
.flame-wrap.flame-eternal .flame-ring{opacity:1}
.flame-wrap.flame-eternal .flame-ring::before{
  inset:-2px;
  background:conic-gradient(from 0deg,#ff6b35,#ffd700,#5ee8b0,#6dd8f8,#c4b5fd,#ff6b9d,#ff6b35);
  animation:flameRotate 2s linear infinite;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 5px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 5px),#000 calc(100% - 3px));
}
.flame-wrap.flame-eternal .flame-ring::after{
  inset:-4px;
  background:conic-gradient(from 180deg,rgba(255,215,0,.4),transparent 15%,rgba(167,139,250,.35),transparent 40%,rgba(77,201,246,.3),transparent 65%,rgba(255,107,53,.35),transparent 85%,rgba(255,215,0,.4));
  animation:flameRotate 4s linear infinite reverse;
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2px));
}
.flame-wrap.flame-eternal{animation:eternalHalo 3s ease-in-out infinite}
@keyframes eternalHalo{
  0%,100%{filter:drop-shadow(0 -4px 10px rgba(255,215,0,.3)) drop-shadow(0 0 6px rgba(255,140,50,.2))}
  33%{filter:drop-shadow(0 -4px 10px rgba(167,139,250,.3)) drop-shadow(0 0 6px rgba(192,132,252,.2))}
  66%{filter:drop-shadow(0 -4px 10px rgba(77,201,246,.3)) drop-shadow(0 0 6px rgba(109,216,248,.2))}
}

/* ── Questions ── */
.q-cat{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan);opacity:.6;margin-bottom:8px;font-weight:600}
.q-text{font-family:'Instrument Serif',serif;font-size:clamp(17px,4vw,22px);font-style:italic;color:#fff;line-height:1.35;margin-bottom:24px}
.ans-btn{
  background:var(--card-bg);border:1px solid var(--border);border-radius:10px;
  padding:12px 15px;text-align:left;display:flex;align-items:center;gap:11px;
  width:100%;margin-bottom:8px;color:var(--txt);
  transition:all .22s cubic-bezier(.22,1,.36,1);
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
.ans-btn:hover{border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.04);transform:translateX(2px);box-shadow:0 4px 18px rgba(0,0,0,.3),0 0 0 1px rgba(0,212,255,.06)}
.ans-btn.selected{border-color:var(--cyan);background:rgba(0,212,255,.07);transform:none;pointer-events:none;box-shadow:0 0 20px rgba(0,212,255,.08);opacity:1}
.ans-btn.disabled{pointer-events:none;opacity:.35}
.ans-letter{
  width:24px;height:24px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;
  color:var(--txt2);transition:all .18s;font-weight:600;
}
.ans-btn:hover .ans-letter{background:rgba(77,201,246,.08);border-color:var(--cyan);color:var(--cyan)}
.ans-btn.selected .ans-letter{background:var(--cyan);border-color:var(--cyan);color:var(--bg);font-weight:700}
.ans-text{font-size:12px;color:var(--txt);line-height:1.4;text-align:left}

/* ── Calculating Step ── */
.calc-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.calc-sub{font-size:10px;color:var(--txt2);letter-spacing:.1em;margin-bottom:28px;font-weight:500}
.trait-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.trait-name{width:120px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);flex-shrink:0;font-weight:600}
.trait-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.trait-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:2px;width:0;transition:width .6s ease}
.trait-val{width:30px;font-size:10px;color:var(--cyan);text-align:right;font-weight:500}

/* ── Results Header ── */
.results-header{text-align:center;margin-bottom:var(--section-gap)}
.results-game{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan);opacity:.7;margin-bottom:6px;font-weight:600}
.results-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;letter-spacing:-.02em}
.results-subtitle{font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;color:var(--txt2);margin-top:4px}
.profile-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(77,201,246,.05);border:1px solid rgba(77,201,246,.18);
  border-radius:5px;padding:3px 9px;font-size:9px;color:var(--cyan);
  letter-spacing:.1em;margin-bottom:12px;font-weight:600;
}
.archetype-label{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#fff;margin-bottom:3px}

/* ── Playstyle Identity Card ── */
.psi-card{
  background:linear-gradient(168deg,rgba(30,36,51,.9),rgba(26,31,43,.95));
  border:1px solid rgba(77,201,246,.15);border-radius:16px;
  padding:24px 28px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.25),0 0 0 1px rgba(255,255,255,.02);
}
.psi-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 5%,rgba(77,201,246,.4) 30%,rgba(167,139,250,.3) 70%,transparent 95%);
}
.psi-card::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:300px;height:200px;
  background:radial-gradient(ellipse at 50% 0%,rgba(77,201,246,.04),transparent 70%);
  pointer-events:none;
}
.psi-overtitle{
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;
  color:var(--cyan);opacity:.6;margin-bottom:8px;position:relative;z-index:1;
}
.psi-icon{font-size:36px;margin-bottom:4px;display:block;position:relative;z-index:1}
.psi-name{
  font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,30px);font-weight:800;
  color:#fff;letter-spacing:-.02em;margin-bottom:8px;position:relative;z-index:1;
}
.psi-desc{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;
  color:var(--txt2);line-height:1.55;max-width:480px;margin:0 auto 14px;position:relative;z-index:1;
}
.psi-hero-fit{
  font-size:10px;color:var(--txt3);line-height:1.45;max-width:420px;margin:0 auto 14px;
  padding:8px 14px;border-radius:8px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
  position:relative;z-index:1;
}
.psi-hero-fit strong{color:var(--cyan);font-weight:700;letter-spacing:.03em}
.psi-cross{
  font-size:9px;color:var(--txt3);line-height:1.5;max-width:400px;margin:0 auto 12px;
  position:relative;z-index:1;
}
.psi-cross::before{
  content:'';display:block;width:40px;height:1px;margin:0 auto 8px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,.3),transparent);
}
.psi-trait-bar{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
  margin-bottom:14px;position:relative;z-index:1;
}
.psi-trait{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px}
.psi-trait-val{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#fff;
}
.psi-trait-label{font-size:7px;letter-spacing:.10em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.psi-share-panel{
  display:flex;flex-direction:column;gap:10px;margin-top:14px;
  padding:16px;border-radius:14px;position:relative;z-index:1;
  background:linear-gradient(135deg,rgba(28,34,52,.7),rgba(24,30,46,.75));
  border:1px solid rgba(255,255,255,.08);
}
.psi-share-title{font-size:8px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#8890a4;text-align:center}
.psi-share-row{display:flex;gap:10px}
@media(max-width:480px){.psi-share-row{flex-direction:column}}
.psi-share-card{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 12px;border-radius:10px;cursor:pointer;transition:all .2s;
  border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);
}
.psi-share-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.psi-share-card-icon{font-size:22px}
.psi-share-card-label{font-size:10px;font-weight:700;color:#f0f2f7;letter-spacing:.03em}
.psi-share-card-sub{font-size:8px;color:#8890a4}
.psi-share-card.sc-download{border-color:rgba(167,139,250,.15)}
.psi-share-card.sc-download:hover{border-color:rgba(167,139,250,.30);background:rgba(167,139,250,.04)}
.psi-share-card.sc-community{border-color:rgba(77,201,246,.15)}
.psi-share-card.sc-community:hover{border-color:rgba(77,201,246,.30);background:rgba(77,201,246,.04)}
.psi-share-card.sc-done{border-color:rgba(52,211,153,.20);background:rgba(52,211,153,.04);cursor:default}
.psi-share-card.sc-done .psi-share-card-label{color:#5ee8b0}
.psi-share-platforms{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}
.psi-plat-btn{
  display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;
  font-size:9px;font-weight:600;cursor:pointer;transition:all .15s;
  font-family:'Chakra Petch',monospace;letter-spacing:.03em;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#9aa3b8;
}
.psi-plat-btn:hover{color:#f0f2f7;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12)}
.psi-plat-btn.plat-x:hover{color:#1da1f2;border-color:rgba(29,161,242,.3)}
.psi-plat-btn.plat-reddit:hover{color:#ff4500;border-color:rgba(255,69,0,.3)}
.psi-plat-btn.plat-copied{color:#5ee8b0;border-color:rgba(52,211,153,.2)}
@media(max-width:540px){
  .psi-card{padding:18px 16px}
  .psi-name{font-size:22px}
  .psi-trait-bar{gap:8px}
}

/* ── Hero Cards ── */
.card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;opacity:0;transform:translateY(14px);
  transition:opacity .35s ease,transform .35s ease;position:relative;overflow:hidden;
  box-shadow:var(--card-shadow);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(77,201,246,.3),transparent);opacity:.5;
}
.card.visible{opacity:1;transform:translateY(0)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.rank-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:2px;font-weight:700}
.hero-row{display:flex;align-items:center;gap:9px}
.champ-img{width:46px;height:46px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.hero-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.1}
.hero-role{font-size:9px;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase;margin-top:1px;font-weight:500}
.diff-row{display:flex;align-items:center;gap:5px;margin-top:3px}
.diff-label{font-size:8px;color:var(--txt3);letter-spacing:.1em;font-weight:600}
.pips{display:flex;gap:2px}
.pip{width:14px;height:2px;border-radius:1px;background:var(--border)}
.pip.on{background:var(--amber)}
.score-box{text-align:right;flex-shrink:0}
.score-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1}
.score-sub{font-size:8px;color:var(--txt2);letter-spacing:.12em;font-weight:600}

/* ── Card Content ── */
.summary{font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;color:var(--txt2);line-height:1.5;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.match-explain{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;color:#7a8aa0;
  line-height:1.45;margin-bottom:10px;padding:8px 12px;
  background:rgba(77,201,246,.02);border-left:2px solid rgba(77,201,246,.2);border-radius:0 6px 6px 0;
}
.match-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);opacity:.6;margin-bottom:5px;font-weight:700}
.match-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.match-trait{width:100px;font-size:9px;color:var(--txt2);text-transform:capitalize;flex-shrink:0;font-weight:500}
.match-track{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.match-fill{height:100%;border-radius:1px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0}
.tag{padding:2px 7px;border-radius:3px;font-size:9px;letter-spacing:.04em;font-weight:500}
.tag.str{background:rgba(52,211,153,.08);color:var(--green);border:1px solid rgba(52,211,153,.18)}
.tag.wk{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.18)}
.tips-section{margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.tips-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);opacity:.6;margin-bottom:5px;font-weight:700}
.tip-row{font-size:11px;color:var(--txt2);padding:3px 0;border-bottom:1px solid rgba(21,29,46,.5);font-weight:400}

/* ── Restart ── */
.restart-btn{
  width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;
  padding:13px;color:var(--txt2);font-size:11px;letter-spacing:.1em;margin-top:8px;font-weight:600;
  box-shadow:0 2px 10px rgba(0,0,0,.2);transition:all .25s cubic-bezier(.22,1,.36,1);
}
.restart-btn:hover{border-color:var(--border2);color:var(--txt);transform:translateY(-2px);box-shadow:var(--card-shadow)}

/* ── Radar Chart ── */
.radar-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--card-shadow)}
.radar-panel-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);opacity:.7;margin-bottom:8px;text-align:left;font-weight:700}
.radar-svg{display:block;margin:0 auto;max-width:100%;height:auto}
.radar-tooltip{position:absolute;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:10px;color:var(--txt);pointer-events:none;z-index:10;max-width:180px;opacity:0;transition:opacity .15s;line-height:1.4}
.radar-tooltip .rt-name{color:var(--cyan);font-weight:700;font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.radar-tooltip .rt-val{color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.radar-tooltip .rt-desc{color:var(--txt2);font-size:9px;margin-top:2px}
.radar-legend{display:flex;justify-content:center;gap:14px;margin-top:8px}
.radar-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--txt2);font-weight:500}
.radar-legend-dot{width:7px;height:7px;border-radius:50%}

/* ── Role Recommendations ── */
.role-rec-panel{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:10px;box-shadow:var(--card-shadow)}
.role-rec-title{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);opacity:.8;margin-bottom:8px;font-weight:700}
.role-rec-item{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  margin-bottom:6px;cursor:pointer;transition:all .18s;
}
.role-rec-item:hover{border-color:rgba(167,139,250,.3);transform:translateX(3px)}
.role-rec-item:last-child{margin-bottom:0}
.role-rec-icon{font-size:16px;width:24px;text-align:center}
.role-rec-text{flex:1}
.role-rec-main{font-size:11px;color:var(--txt);font-weight:600}
.role-rec-sub{font-size:9px;color:var(--txt2);margin-top:1px}
.role-rec-arrow{color:var(--txt3);font-size:11px}

/* ── Role Discovery Section ── */
.role-disc{margin-top:4px;margin-bottom:16px}
.role-disc-title{
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;
  color:var(--purple);margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.role-disc-title::after{content:'';flex:1;height:1px;background:var(--border)}
.role-disc-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;
}
@media(max-width:540px){.role-disc-grid{grid-template-columns:1fr 1fr}}
@media(max-width:360px){.role-disc-grid{grid-template-columns:1fr}}
.role-disc-card{
  background:var(--card-bg);border:1px solid var(--border);border-radius:14px;
  padding:16px;display:flex;flex-direction:column;align-items:center;text-align:center;
  gap:8px;position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.22,1,.36,1);cursor:default;
  opacity:0;transform:translateY(12px);
  box-shadow:var(--card-shadow);
}
.role-disc-card.visible{opacity:1;transform:translateY(0)}
.role-disc-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);opacity:.3;
}
.role-disc-card:hover{border-color:var(--border2);transform:translateY(-3px) scale(1.02);box-shadow:var(--card-hover-shadow)}
.role-disc-card:hover.visible{transform:translateY(-3px) scale(1.02)}
.role-disc-role{
  font-size:8px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
  color:var(--txt3);padding:2px 8px;border-radius:3px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
}
.role-disc-img{
  width:52px;height:52px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border2);box-shadow:0 0 12px rgba(0,0,0,.3);
}
.role-disc-name{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff;letter-spacing:-.01em;
}
.role-disc-score{
  font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;
}
.role-disc-score-label{
  font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);margin-top:-4px;
}
.role-disc-traits{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.role-disc-trait{
  font-size:8px;padding:2px 6px;border-radius:3px;
  background:rgba(167,139,250,.06);color:var(--purple);border:1px solid rgba(167,139,250,.10);
  letter-spacing:.03em;
}
.role-disc-empty{
  font-size:10px;color:var(--txt3);text-align:center;padding:16px;
  font-style:italic;
}
.role-disc-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:8px;letter-spacing:.06em;font-weight:700;
  padding:3px 9px;border-radius:4px;margin-top:2px;
}
.role-disc-badge.rdb-top{
  background:rgba(77,201,246,.06);color:var(--cyan);border:1px solid rgba(77,201,246,.14);
}
.role-disc-badge.rdb-role{
  background:rgba(167,139,250,.06);color:var(--purple);border:1px solid rgba(167,139,250,.14);
}
.role-disc-badges{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:2px}
.role-disc-sub{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;
  color:var(--txt3);margin-bottom:16px;line-height:1.5;max-width:520px;
}
/* Game-specific role card accents */
.role-disc-card.rd-lol::before{background:linear-gradient(90deg,transparent,rgba(200,155,60,.4),transparent)}
.role-disc-card.rd-lol .role-disc-score{color:var(--lol-gold)}
.role-disc-card.rd-dl::before{background:linear-gradient(90deg,transparent,rgba(200,155,60,.4),transparent)}
.role-disc-card.rd-dl .role-disc-score{color:#C8AA6E}
.role-disc-card.rd-ow::before{background:linear-gradient(90deg,transparent,rgba(200,155,60,.4),transparent)}
.role-disc-card.rd-ow .role-disc-score{color:#C8AA6E}

/* ── Overwatch Role Section — interactive bubbles + reveal panel ── */
.ow-roles{margin-top:var(--section-gap);margin-bottom:var(--section-gap)}
.ow-roles-header{text-align:center;margin-bottom:20px}
.ow-roles-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;
  letter-spacing:-.01em;margin-bottom:4px;
}
.ow-roles-sub{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;
  color:var(--txt3);line-height:1.5;max-width:480px;margin:0 auto;
}

/* ── Role Bubbles — circular selectors ── */
.ow-bubbles{display:flex;justify-content:center;gap:24px;margin-bottom:6px}
@media(max-width:400px){.ow-bubbles{gap:16px}}
.ow-bubble{
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  opacity:0;transform:translateY(10px);
  transition:opacity .4s ease,transform .4s ease;
}
.ow-bubble.visible{opacity:1;transform:translateY(0)}
.ow-bubble-circle{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  border:2px solid var(--border);
  background:var(--card-bg);
  position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.ow-bubble-circle::after{
  content:'';position:absolute;inset:0;border-radius:50%;opacity:0;
  transition:opacity .3s;pointer-events:none;
}
.ow-bubble:hover .ow-bubble-circle{transform:scale(1.08)}
.ow-bubble.active .ow-bubble-circle{transform:scale(1.06)}

/* Tank bubble */
.ow-bubble.owb-tank .ow-bubble-circle{border-color:rgba(231,163,62,.25)}
.ow-bubble.owb-tank .ow-bubble-circle::after{background:radial-gradient(circle,rgba(231,163,62,.12),transparent 70%)}
.ow-bubble.owb-tank:hover .ow-bubble-circle,.ow-bubble.owb-tank.active .ow-bubble-circle{
  border-color:rgba(231,163,62,.55);box-shadow:0 0 20px rgba(231,163,62,.15);
}
.ow-bubble.owb-tank:hover .ow-bubble-circle::after,.ow-bubble.owb-tank.active .ow-bubble-circle::after{opacity:1}

.ow-bubble.owb-damage:hover .ow-bubble-circle,.ow-bubble.owb-damage.active .ow-bubble-circle{

.ow-bubble.owb-damage:hover .ow-bubble-circle::after,.ow-bubble.owb-damage.active .ow-bubble-circle::after{opacity:1}
.ow-bubble.owb-damage .ow-bubble-label{color:#d45050}

/* Support bubble */

.ow-bubble.owb-support:hover .ow-bubble-circle,.ow-bubble.owb-support.active .ow-bubble-circle{

.ow-bubble.owb-support:hover .ow-bubble-circle::after,.ow-bubble.owb-support.active .ow-bubble-circle::after{opacity:1}

.ow-bubble-label{

/* Active indicator dot */

/* ── Role Reveal Panel — hidden until bubble clicked ── */

.ow-reveal-inner.rev-damage::before{background:linear-gradient(90deg,transparent,#d45050,transparent)}

.ow-reveal-title{

.ow-reveal-list{display:flex;flex-direction:column;gap:10px}
.ow-reveal-row{

}

.ow-reveal-rank{

}
.ow-reveal-img{

}
.ow-reveal-info{flex:1;min-width:0}
.ow-reveal-name{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;
}
.ow-reveal-meta{font-size:10px;color:var(--txt2);margin-top:1px}
.ow-reveal-score{
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;

}
.ow-reveal-badge{

}
.ow-reveal-badge.orb-top{

}
.ow-reveal-badge.orb-role{
  background:rgba(255,255,255,.03);color:var(--txt2);border:1px solid var(--border);
}
/* Per-role score colors */
.rev-tank .ow-reveal-score{color:#daa040}
.rev-damage .ow-reveal-score{color:#d45050}
.rev-support .ow-reveal-score{color:#c4a040}

/* OW portrait sizing for reveal rows */
.ow-portrait-wrap.ow-reveal-img{width:44px;height:44px;border-radius:50%}
.ow-portrait-wrap.ow-reveal-img .ow-avatar-fb{font-size:13px}
.ow-avatar-fb.ow-reveal-img{width:44px;height:44px;border-radius:50%;font-size:13px}

/* ── Old static card classes — kept for LoL/DL ── */
.owrc-role-tag{

  padding:3px 10px;border-radius:4px;border:1px solid var(--border);
}
.owrc-img{
  width:60px;height:60px;border-radius:50%;object-fit:cover;
  border:2px solid var(--border2);transition:box-shadow .3s;
}
.owrc-name{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em;
}
.owrc-score{

}
.owrc-score-label{

}

}
.owrc-badge.ob-role{
  background:rgba(255,255,255,.03);color:var(--txt2);border:1px solid var(--border);
}
/* ── Deadlock — Explore Other Games section ── */
.dl-explore{margin-top:var(--section-gap);margin-bottom:var(--section-gap);text-align:center}
.dl-explore-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;
  letter-spacing:-.01em;margin-bottom:4px;
}
.dl-explore-sub{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;
  color:var(--txt3);line-height:1.5;max-width:440px;margin:0 auto 20px;
}
.dl-explore-grid{
  display:flex;justify-content:center;gap:16px;flex-wrap:wrap;
}
.dl-explore-card{
  width:160px;padding:22px 16px;border-radius:16px;
  background:var(--card-bg);border:1px solid var(--border);

}
.dl-explore-card.visible{opacity:1;transform:translateY(0)}
.dl-explore-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.5;
}
.dl-explore-card::after{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;pointer-events:none;
}
.dl-explore-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:var(--card-hover-shadow)}
.dl-explore-card:hover.visible{transform:translateY(-4px)}

.dl-explore-card.dlx-lol::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.dl-explore-card.dlx-lol::after{background:radial-gradient(ellipse at 50% -30%,rgba(200,155,60,.10),transparent 70%)}
.dl-explore-card.dlx-lol:hover{border-color:rgba(200,155,60,.40);box-shadow:0 0 24px rgba(200,155,60,.10)}
.dl-explore-card.dlx-lol .dlx-icon{color:var(--lol-gold);background:rgba(200,155,60,.08);border-color:rgba(200,155,60,.20)}
.dl-explore-card.dlx-lol .dlx-name{color:#d4be82}

/* OW card */
.dl-explore-card.dlx-ow::before{background:linear-gradient(90deg,transparent,#f0962a,transparent)}
.dl-explore-card.dlx-ow::after{background:radial-gradient(ellipse at 50% -30%,rgba(249,158,26,.10),transparent 70%)}
.dl-explore-card.dlx-ow:hover{border-color:rgba(249,158,26,.40);box-shadow:0 0 24px rgba(249,158,26,.10)}
.dl-explore-card.dlx-ow .dlx-icon{color:var(--ow-orange);background:rgba(249,158,26,.08);border-color:rgba(249,158,26,.20)}
.dl-explore-card.dlx-ow .dlx-name{color:#f0b840}

.dlx-icon{
  width:56px;height:56px;border-radius:50%;

  font-size:24px;border:2px solid var(--border);
  transition:transform .3s,box-shadow .3s;
}
.dl-explore-card:hover .dlx-icon{transform:scale(1.08)}
.dlx-name{
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.02em;color:var(--txt);
}
.dlx-arrow{
  font-size:10px;color:var(--txt3);transition:transform .3s;
}
.dl-explore-card:hover .dlx-arrow{transform:translateX(3px)}
.dl-explore-divider{
  width:80px;height:1px;margin:0 auto 20px;
  background:linear-gradient(90deg,transparent,rgba(255,107,53,.25),transparent);
}
@media(max-width:500px){
  .dl-explore-grid{gap:10px}
  .dl-explore-card{width:140px;padding:18px 12px}

}

/* Deadlock card (for OW explore) */
.dl-explore-card.dlx-dl::before{background:linear-gradient(90deg,transparent,#e8734a,transparent)}
.dl-explore-card.dlx-dl::after{background:radial-gradient(ellipse at 50% -30%,rgba(255,107,53,.10),transparent 70%)}
.dl-explore-card.dlx-dl:hover{border-color:rgba(255,107,53,.40);box-shadow:0 0 24px rgba(255,107,53,.10)}
.dl-explore-card.dlx-dl .dlx-icon{color:var(--dl-orange);background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.20)}
.dl-explore-card.dlx-dl .dlx-name{color:#e8a870}

/* R6 Siege card */
.dl-explore-card.dlx-r6::before{background:linear-gradient(90deg,transparent,#5aaddb,transparent)}
.dl-explore-card.dlx-r6::after{background:radial-gradient(ellipse at 50% -30%,rgba(64,156,205,.10),transparent 70%)}
.dl-explore-card.dlx-r6:hover{border-color:rgba(64,156,205,.40);box-shadow:0 0 24px rgba(64,156,205,.10)}
.dl-explore-card.dlx-r6 .dlx-icon{color:#5aaddb;background:rgba(64,156,205,.08);border-color:rgba(64,156,205,.20)}
.dl-explore-card.dlx-r6 .dlx-name{color:#6ab0d0}
/* Marvel Rivals — red */
.dl-explore-card.dlx-mr::before{background:linear-gradient(90deg,transparent,#C41E3A,#D4A24E,transparent)}
.dl-explore-card.dlx-mr::after{background:radial-gradient(ellipse at 50% -30%,rgba(196,30,58,.10),transparent 70%)}
.dl-explore-card.dlx-mr:hover{border-color:rgba(196,30,58,.40);box-shadow:0 0 24px rgba(196,30,58,.10)}
.dl-explore-card.dlx-mr .dlx-icon{color:#C41E3A;background:rgba(196,30,58,.08);border-color:rgba(196,30,58,.20)}
.dl-explore-card.dlx-mr .dlx-name{color:#E8606E}

/* OW explore divider — warm orange theme */
.ow-explore-divider{
  width:80px;height:1px;margin:24px auto 20px;
  background:linear-gradient(90deg,transparent,rgba(249,158,26,.25),transparent);
}

/* ── Explore Bubble — collapsible "Explore Other Games" ── */
.explore-bubble{
  margin:var(--section-gap) auto 0;max-width:420px;text-align:center;
}
.explore-trigger{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 24px;border-radius:14px;cursor:pointer;
  background:var(--card-bg);border:1px solid var(--border);
  box-shadow:var(--card-shadow);
  transition:all .3s cubic-bezier(.22,1,.36,1);
}
.explore-trigger:hover{
  border-color:rgba(200,155,60,.30);
  box-shadow:var(--card-hover-shadow),0 0 20px rgba(200,155,60,.05);
  transform:translateY(-2px);
}
.explore-trigger-icon{
  font-size:18px;transition:transform .3s;
}
.explore-trigger-text{display:flex;flex-direction:column;gap:1px;text-align:left}
.explore-trigger-title{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  color:var(--txt);letter-spacing:.02em;
}
.explore-trigger-sub{
  font-size:10px;color:var(--txt3);letter-spacing:.01em;
}
.explore-trigger-arrow{
  font-size:11px;color:var(--txt3);transition:transform .3s;margin-left:auto;
}

.explore-trigger.open{border-color:rgba(200,155,60,.20)}
.explore-panel{

}
.explore-panel.open{

}
.explore-list{

}
.explore-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;border-radius:10px;
  background:var(--card-bg);border:1px solid var(--border);

  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.explore-item:hover{
  border-color:rgba(200,155,60,.28);

}

.explore-item-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;

}
.explore-item-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}

}

.explore-item-arrow{font-size:10px;color:var(--txt3);transition:transform .2s}
.explore-item:hover .explore-item-arrow{transform:translateX(3px);color:#C8AA6E}
.explore-item.coming-soon{opacity:.45;cursor:default;pointer-events:none}
.explore-item.coming-soon .explore-item-arrow{display:none}
.explore-coming-tag{
  font-size:7px;letter-spacing:.10em;text-transform:uppercase;font-weight:700;

  padding:2px 6px;border-radius:3px;
}

/* ── Hero Detail Modal ── */
.hero-modal-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(15,17,21,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .25s ease;
  pointer-events:none;padding:16px;
}
.hero-modal-backdrop.open{opacity:1;pointer-events:auto}
.hero-modal{
  background:linear-gradient(168deg,#1e2433 0%,#1a1f2b 100%);
  border:1px solid var(--glass-border);border-radius:20px;
  max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
  position:relative;
  transform:translateY(18px) scale(.96);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 40px rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.05);
}
.hero-modal-backdrop.open .hero-modal{transform:translateY(0) scale(1)}
.hero-modal::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:18px 18px 0 0;
}
.hero-modal.hm-lol::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.hero-modal.hm-dl::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.hero-modal.hm-ow::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.hero-modal.hm-val::before{background:linear-gradient(90deg,transparent,#c89b3c,transparent)}
.hero-modal::-webkit-scrollbar{width:5px}
.hero-modal::-webkit-scrollbar-track{background:transparent}
.hero-modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.hero-modal-close{
  position:sticky;top:0;float:right;z-index:3;margin:12px 12px 0 0;
  width:32px;height:32px;border-radius:50%;
  background:rgba(10,12,16,.85);border:1px solid var(--border);
  color:var(--txt2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(4px);
}
.hero-modal-close:hover{background:rgba(255,255,255,.10);color:#fff;border-color:var(--border2)}
.hero-modal-header{
  display:flex;align-items:center;gap:16px;
  padding:20px 24px 14px;
}
.hero-modal-portrait{
  width:72px;height:72px;border-radius:14px;object-fit:cover;
  border:2px solid var(--border2);box-shadow:0 0 20px rgba(0,0,0,.4);
  flex-shrink:0;
}
.hero-modal-title{flex:1;min-width:0}
.hero-modal-name{
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:#fff;letter-spacing:-.02em;line-height:1.1;
}
.hero-modal-role{font-size:11px;color:var(--txt2);margin-top:4px;font-weight:500}
.hero-modal-score{
  font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;
  flex-shrink:0;line-height:1;text-align:right;
}
.hero-modal-score-sub{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3)}
.hero-modal-score.hms-lol{color:var(--lol-gold)}
.hero-modal-score.hms-dl{color:#C8AA6E}
.hero-modal-score.hms-ow{color:#C8AA6E}
.hero-modal-score.hms-val{color:#C8AA6E}
.hero-modal-body{padding:0 24px 24px}
.hero-modal-section{margin-bottom:18px}
.hero-modal-section:last-child{margin-bottom:0}
.hero-modal-label{
  font-size:8px;letter-spacing:.20em;text-transform:uppercase;font-weight:700;
  color:var(--txt3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.hero-modal-label::after{content:'';flex:1;height:1px;background:var(--border)}
.hero-modal-analysis{font-size:13px;color:var(--txt);line-height:1.7}
.hero-modal-tip{
  font-size:12.5px;color:var(--txt);line-height:1.65;
  padding:12px 14px 12px 38px;border-radius:10px;
  background:rgba(77,201,246,.03);border:1px solid rgba(77,201,246,.08);

}
.hero-modal-tip::before{content:'💡';position:absolute;left:12px;top:12px;font-size:14px}
.hero-modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hero-modal-stat{
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);

}
.hero-modal-stat-label{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);font-weight:600}
.hero-modal-stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--txt);margin-top:3px}
/* YouTube Section */
.hero-modal-yt{
  display:block;text-decoration:none;color:inherit;
  border-radius:12px;overflow:hidden;border:1px solid var(--border);
  transition:all .25s;cursor:pointer;position:relative;
}
.hero-modal-yt:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.hero-modal-yt-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg3)}
.hero-modal-yt-play{
  position:absolute;top:calc(50% - 20px);left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,0,0,.85);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .2s,background .2s;

/* Details button on cards */
.pod-details-btn{

}

/* ── LoL Lane-Based Results Section ── */

.lol-lanes-header{text-align:center;margin-bottom:18px}

}

}

@media(max-width:440px){.lol-lanes-grid{grid-template-columns:repeat(2,1fr)}}
.lol-lane-card{

.lol-lane-tag{

}
.lol-lane-img{

}
.lol-lane-name{
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;
}
.lol-lane-score{

}
.lol-lane-badge{

}
.lol-lane-score-sub{
  font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:-3px;
}
.lol-lane-details{
  font-size:8px;color:var(--txt3);font-family:'Chakra Petch',monospace;
  letter-spacing:.04em;transition:color .2s;
}
.lol-lane-card:hover .lol-lane-details{color:var(--txt)}
.lol-lane-divider{
  width:80px;height:1px;margin:0 auto 18px;
  background:linear-gradient(90deg,transparent,rgba(200,155,60,.25),transparent);
}

/* ── Valorant Role-Based Results Section ── */
.val-roles{margin-top:var(--section-gap);margin-bottom:var(--section-gap)}
.val-roles-header{text-align:center;margin-bottom:18px}
.val-roles-title{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;
  letter-spacing:-.01em;margin-bottom:4px;
}
.val-roles-sub{
  font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;
  color:var(--txt3);line-height:1.5;max-width:480px;margin:0 auto;
}
.val-roles-divider{

  background:linear-gradient(90deg,transparent,rgba(255,70,85,.25),transparent);
}
.val-role-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:600px){.val-role-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:380px){.val-role-row{grid-template-columns:1fr}}
.val-role-tag{
  font-size:8px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
